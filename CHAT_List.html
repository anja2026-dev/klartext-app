<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>KLARTEXT · KLARapp</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="chat.css">
<script>(function(){try{if(sessionStorage.getItem('klartext_login')!=='true')window.location.href='KLARTEXT_Login.html';}catch(e){}})();</script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="firebase.js?v=2"></script>
<script src="chat.js"></script>
<style>
body{font-family:"DM Sans",sans-serif;background:#F5F0E8;margin:0;}
/* CHAT-NAV (identisch zu CHAT_View) */
.chat-appnav{background:#1B3A4B;height:52px;display:flex;align-items:center;padding:0 1rem;gap:.25rem;position:sticky;top:0;z-index:200;border-bottom:3px solid #6EC6A0;}
.chat-appnav-logo{font-family:"Playfair Display",serif;font-size:.95rem;font-weight:700;color:#fff;margin-right:.75rem;white-space:nowrap;}
.chat-appnav-links{display:flex;gap:.1rem;flex:1;overflow-x:auto;scrollbar-width:none;}
.chat-appnav-links::-webkit-scrollbar{display:none;}
.nav-link{color:rgba(255,255,255,.65);text-decoration:none;font-size:.72rem;font-weight:600;padding:.35rem .55rem;border-radius:8px;white-space:nowrap;transition:all .15s;}
.nav-link:hover,.nav-link.aktiv{background:rgba(255,255,255,.12);color:#fff;}
/* Auf Desktop sofort zu CHAT_View weiterleiten (Zwei-Spalten ist dort) */
@media(min-width:701px){body{display:none;}}
/* Ungelesene Konversationen: fett hervorgehoben + grüner Punkt vor dem Namen */
.chat-eintrag-ungelesen{background:#F0F9F4;}
.chat-eintrag-ungelesen .chat-eintrag-vorschau{font-weight:700;color:#1B3A4B;}
.chat-eintrag-punkt{width:8px;height:8px;border-radius:50%;background:#3B8A68;flex-shrink:0;display:inline-block;}
</style>
</head>
<body>

<!-- GLOBALE HAUPTNAVIGATION -->
<nav id="global-nav" style="background:#0F2230;border-bottom:1px solid rgba(110,198,160,.2);position:sticky;top:0;z-index:111;display:flex;align-items:center;overflow-x:auto;scrollbar-width:none;flex-shrink:0;">
  <style>#global-nav::-webkit-scrollbar{display:none;}.gnav-link{display:inline-flex;align-items:center;gap:.3rem;padding:.55rem .8rem;color:rgba(255,255,255,.6);text-decoration:none;font-size:.72rem;font-weight:600;white-space:nowrap;transition:all .15s;border-bottom:2px solid transparent;}.gnav-link:hover{color:#fff;background:rgba(255,255,255,.07);}.gnav-link.aktiv{color:#6EC6A0;border-bottom-color:#6EC6A0;}</style>
  <a class="gnav-link" href="DASHBOARD.html">🏠 Dashboard</a>
  <a class="gnav-link aktiv" href="CHAT_View.html">💬 KLARapp<span id="gnav-chat-badge" style="display:none;background:#C62828;color:#fff;font-size:10px;font-weight:700;border-radius:10px;padding:1px 6px;margin-left:4px;">0</span></a>
  <a class="gnav-link" href="KLARTEXT_Weiterleitungen.html">📤 Weiterleitungen</a>
  <a class="gnav-link" href="KLARTEXT_Listen.html">📋 To-do-Liste</a>
  <a class="gnav-link" href="#sek-fk">🚒 Feuerwehrkarten</a>
  <a class="gnav-link" href="KLARTEXT_Notizblock.html">📝 Notizblock</a>
</nav>

<div class="chat-liste-shell" id="chat-liste"></div>
<a class="chat-fab" href="CHAT_New.html" title="Neue Nachricht">＋</a>

<script>
// Desktop → sofort zur Zwei-Spalten-Ansicht in CHAT_View.html weiterleiten
if (window.innerWidth > 700) {
  window.location.replace('CHAT_View.html');
}

const kinderNamenCache = {};

// Brainy-Sticker-Token in der Vorschau als lesbares Label zeigen (gleiche Mappings wie CHAT_View.html)
const BRAINY_LABELS = { freu:'Freu 🧠', top:'Top! 🧠', denk:'Hmm… 🧠', erschoepft:'Erschöpft 🧠', cheer:'Du schaffst das! 🧠' };
function brainyVorschauText(text) {
  const re = /\[\[brainy:(freu|top|denk|erschoepft|cheer)\]\]/g;
  const ersetzt = text.replace(re, function(_, mood){ return BRAINY_LABELS[mood] || '🧠'; }).trim();
  return ersetzt || 'Noch keine Nachrichten';
}

// INGRA-Austausch: automatische Mitgliedschaft, gleiche Logik wie in CHAT_View.html
const INGRA_GRUPPE_ID = 'ingra-austausch';
const INGRA_ROLLEN = ['ingra','springer_ingra','pool_ingra','vertretung_ingra'];
function ingraGruppeSicherstellen() {
  const user = chatAktuellerUser();
  if (!INGRA_ROLLEN.includes(user.role) || !user.id) return Promise.resolve();
  const ref = db.ref('conversations/' + INGRA_GRUPPE_ID);
  return ref.once('value').then(function(snapshot){
    const bereitsMitglied = snapshot.exists() && snapshot.val().members && snapshot.val().members[user.id];
    if (bereitsMitglied) return;
    const updates = {};
    updates['members/' + user.id] = true;
    updates['memberNames/' + user.id] = user.name;
    updates['memberRoles/' + user.id] = user.role;
    if (!snapshot.exists()) {
      updates['type'] = 'group';
      updates['groupName'] = '💬 INGRA-Austausch';
      updates['lastMessage'] = '';
      updates['lastTimestamp'] = Date.now();
    }
    return ref.update(updates);
  }).catch(function(){});
}

function renderChatListe(conversations) {
  const wrap = document.getElementById('chat-liste');
  const ids = Object.keys(conversations||{});
  if (ids.length === 0) {
    wrap.innerHTML = '<div class="chat-liste-leer">Noch keine Nachrichten.<br>Klicke auf „＋ Neu".</div>';
    return;
  }

  // Erst für ALLE Konversationen die Anzahl ungelesener Nachrichten ermitteln,
  // bevor sortiert/gerendert wird - nötig, damit ungelesene Konversationen
  // oben in der Liste stehen können.
  const ungelesenByCid = {};
  let ausstehend = ids.length;
  ids.forEach(function(cid){
    chatZaehleUngelesen(cid, function(anzahl){
      ungelesenByCid[cid] = anzahl;
      ausstehend--;
      if (ausstehend === 0) chatListeRendern(conversations, ids, ungelesenByCid);
    });
  });
}

function chatListeRendern(conversations, ids, ungelesenByCid) {
  const wrap = document.getElementById('chat-liste');
  const user = chatAktuellerUser();

  // Ungelesene Konversationen zuerst, innerhalb jeder Gruppe nach Zeit sortiert
  ids.sort(function(a,b){
    const ungelesenA = ungelesenByCid[a] > 0 ? 1 : 0;
    const ungelesenB = ungelesenByCid[b] > 0 ? 1 : 0;
    if (ungelesenA !== ungelesenB) return ungelesenB - ungelesenA;
    return (conversations[b].lastTimestamp||0) - (conversations[a].lastTimestamp||0);
  });

  wrap.innerHTML = ids.map(function(cid){
    const conv = conversations[cid];
    const anzahl = ungelesenByCid[cid] || 0;
    const istUngelesen = anzahl > 0;
    const name = chatKonversationsName(conv, kinderNamenCache);
    const initiale = (name||'?').charAt(0).toUpperCase();
    let avatarFarbe='#6A6878';
    let avatarInhalt = initiale;
    if (conv.type === 'group') {
      avatarFarbe = '#6EC6A0';
      avatarInhalt = '<img src="brainy.png" alt="INGRA-Austausch" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">';
    } else {
      const andereId = Object.keys(conv.members||{}).find(function(id){return id!==user.id;});
      if (andereId&&conv.memberRoles&&conv.memberRoles[andereId]) avatarFarbe=chatRollenfarbe(conv.memberRoles[andereId]);
    }
    let vorschau = brainyVorschauText((conv.lastMessage||'').substring(0,60));
    // Absender der letzten Nachricht voranstellen, wenn ungelesen und nicht
    // von einem selbst - vor allem bei der Gruppe relevant, wo der Name in
    // der Kopfzeile der Gruppenname ist, nicht der einzelne Absender.
    if (istUngelesen && conv.lastSenderName && conv.lastSenderId !== user.id) {
      vorschau = '<b>' + conv.lastSenderName + ':</b> ' + vorschau;
    }
    return `<a class="chat-eintrag${istUngelesen ? ' chat-eintrag-ungelesen' : ''}" href="CHAT_View.html?cid=${cid}">
      <div class="chat-avatar" style="background:${avatarFarbe};">${avatarInhalt}</div>
      <div class="chat-eintrag-inhalt">
        <div class="chat-eintrag-kopf">
          ${istUngelesen ? '<span class="chat-eintrag-punkt"></span>' : ''}
          <span class="chat-eintrag-name">${name}</span>
          <span class="chat-eintrag-zeit">${chatFormatZeitKurz(conv.lastTimestamp)}</span>
        </div>
        <div class="chat-eintrag-zeile2">
          <span class="chat-eintrag-vorschau">${vorschau}</span>
          <span class="chat-badge" id="badge-${cid}" style="${anzahl > 0 ? '' : 'display:none;'}">${anzahl > 0 ? anzahl : ''}</span>
        </div>
      </div>
    </a>`;
  }).join('');
}

(window.firebaseAuthReady || Promise.resolve()).then(function(){
  ingraGruppeSicherstellen().then(function(){
    db.ref('children').once('value').then(function(snapshot){
      const kinder=snapshot.val()||{};
      Object.keys(kinder).forEach(function(cid){kinderNamenCache[cid]=kinder[cid].name;});
      chatLadeConversations(renderChatListe);
    }).catch(function(){chatLadeConversations(renderChatListe);});
  });
});

// Ungelesene-Nachrichten-Badge auf dem "💬 KLARapp"-Link in der globalen
// Navigation - gleicher Mechanismus wie chatBadgeAktualisieren() in
// DASHBOARD.html/DASHBOARD_mobile.html (chat.js: chatZaehleUngelesen()).
function chatBadgeAktualisieren(){
  var badge = document.getElementById('gnav-chat-badge');
  if (!badge) return;
  chatLadeConversations(function(conversations){
    var ids = Object.keys(conversations || {});
    if (!ids.length) { badge.style.display = 'none'; return; }
    var gesamt = 0;
    var ausstehend = ids.length;
    ids.forEach(function(cid){
      chatZaehleUngelesen(cid, function(anzahl){
        gesamt += anzahl;
        ausstehend--;
        if (ausstehend === 0) {
          if (gesamt > 0) { badge.textContent = gesamt; badge.style.display = 'inline-block'; }
          else { badge.style.display = 'none'; }
        }
      });
    });
  });
}
(window.firebaseAuthReady || Promise.resolve()).then(chatBadgeAktualisieren);
</script>
</body>
</html>
