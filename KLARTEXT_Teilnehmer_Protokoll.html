<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>KLARTEXT · Teilnehmer-Protokoll</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--navy:#1B3A4B;--acc:#6EC6A0;--paper:#F5F0E8;--surface:#fff;--border:#DDD8CE;--muted:#6A6878;--gold:#C47A00;}
body{font-family:"DM Sans",sans-serif;background:var(--paper);color:#1A1A2E;min-height:100vh;}
.kt-header{background:var(--navy);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 1.25rem;position:sticky;top:0;z-index:100;border-bottom:3px solid var(--acc);}
.kt-logo{font-family:"Playfair Display",serif;font-size:1.05rem;font-weight:700;color:#fff;display:flex;align-items:center;gap:.5rem;}
.kt-logo img{width:32px;height:32px;object-fit:contain;}
.kt-logo span{color:var(--acc);font-size:.62rem;display:block;font-family:"DM Sans",sans-serif;font-weight:400;}
.back-btn{color:var(--acc);text-decoration:none;font-size:.72rem;font-weight:700;border:1.5px solid var(--acc);border-radius:20px;padding:.25rem .65rem;}
.shell{max-width:760px;margin:0 auto;padding:1.5rem 1rem 4rem;}

.hero{background:var(--navy);border-radius:16px;padding:1.4rem 1.5rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:1.1rem;}
.hero img{width:56px;height:56px;object-fit:contain;flex-shrink:0;}
.hero-titel{font-family:"Playfair Display",serif;font-size:1.15rem;color:#fff;}
.hero-sub{font-size:.78rem;color:rgba(255,255,255,.65);margin-top:.15rem;}

.toolbar{display:flex;gap:.5rem;margin-bottom:1.25rem;flex-wrap:wrap;align-items:center;justify-content:space-between;}
.ctrl{padding:.5rem 1.1rem;border-radius:8px;font-size:.8rem;font-weight:700;cursor:pointer;border:none;text-decoration:none;display:inline-flex;align-items:center;gap:.4rem;}
.ctrl-new{background:var(--navy);color:#fff;}
.ctrl-print{background:var(--gold);color:#fff;}

.editor{background:var(--surface);border-radius:14px;padding:1.25rem;box-shadow:0 1px 8px rgba(0,0,0,.06);margin-bottom:1.5rem;display:none;}
.editor.aktiv{display:block;}
.editor-row{display:flex;gap:.6rem;margin-bottom:.7rem;flex-wrap:wrap;}
.editor-row input,.editor-row select{flex:1;min-width:140px;padding:.55rem .7rem;border:1.5px solid var(--border);border-radius:8px;font-family:"DM Sans",sans-serif;font-size:.82rem;background:#FAFAFA;}
.editor-label{font-size:.65rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.3rem;display:block;}
.editor-text{width:100%;min-height:100px;border:1.5px solid var(--border);border-radius:10px;padding:.7rem .85rem;font-family:"DM Sans",sans-serif;font-size:.84rem;line-height:1.6;background:#FFFEFA;resize:vertical;margin-bottom:.7rem;}
.editor-text:focus,.editor-row input:focus{outline:none;border-color:var(--acc);}
.editor-actions{display:flex;gap:.5rem;}
.ctrl-blank{background:#fff;color:var(--navy);border:1.5px solid var(--navy);}

.liste-titel{font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.6rem;}
.tn-eintrag{background:var(--surface);border-radius:12px;padding:1rem 1.1rem;margin-bottom:.6rem;box-shadow:0 1px 6px rgba(0,0,0,.05);}
.te-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.5rem;gap:.5rem;flex-wrap:wrap;}
.te-name{font-weight:700;color:var(--navy);font-size:.92rem;}
.te-datum{font-size:.68rem;color:var(--muted);}
.te-feld{margin-bottom:.5rem;}
.te-feld-label{font-size:.62rem;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.15rem;}
.te-feld-text{font-size:.82rem;color:#3A3A4A;line-height:1.55;white-space:pre-wrap;}
.te-actions{display:flex;gap:.5rem;margin-top:.5rem;}
.te-btn{font-size:.68rem;font-weight:700;background:none;border:none;cursor:pointer;color:var(--muted);}
.te-btn:hover{color:var(--navy);}
.te-btn.del:hover{color:#C62828;}
.leer-hinweis{text-align:center;padding:2rem 1rem;color:var(--muted);font-size:.82rem;background:#fff;border-radius:12px;}

@media print{
  .kt-header,.toolbar,.editor,.te-actions{display:none!important;}
  body{background:white;}
  .tn-eintrag{box-shadow:none;border:1.5px solid #999;page-break-inside:avoid;}
}
</style>
<script>(function(){try{
  if(window.location.protocol==='file:') return;
  var login = sessionStorage.getItem('klartext_login');
  var role  = sessionStorage.getItem('klartext_role') || '';
  if(login!=='true' || !['ingra','ingra-beta','admin'].includes(role)){
    window.location.href='KLARTEXT_Login.html';
  }
}catch(e){}})();</script>
</head>
<body>

<header class="kt-header">
  <div class="kt-logo"><img src="brainy.png" alt="Brainy">KLARTEXT <span>Teilnehmer-Protokoll</span></div>
  <a class="back-btn" href="DASHBOARD.html">← Dashboard</a>
</header>

<div class="shell">

<div class="hero">
  <img src="brainy.png" alt="Brainy">
  <div>
    <div class="hero-titel">Teilnehmer-Protokoll</div>
    <div class="hero-sub">Für Schulungen, Vorstellungen, Feedbackrunden — Name, Datum, Anmerkungen festhalten</div>
  </div>
</div>

<div class="toolbar">
  <button class="ctrl ctrl-new" onclick="neuerEintrag()">＋ Neuer Eintrag</button>
  <button class="ctrl ctrl-print" onclick="window.print()">🖨️ Liste drucken</button>
</div>

<div class="editor" id="editor">
  <span class="editor-label">Name der Teilnehmerin / des Teilnehmers</span>
  <div class="editor-row">
    <input type="text" id="tn-name" placeholder="Name">
    <select id="tn-kind"><option value="">Kein Kind / Allgemein</option></select>
    <input type="text" id="tn-datum" placeholder="Datum">
    <input type="text" id="tn-einrichtung" placeholder="Einrichtung / Träger (optional)">
  </div>
  <span class="editor-label">Vorschläge / Wünsche</span>
  <textarea class="editor-text" id="tn-vorschlaege" placeholder="Was wurde vorgeschlagen oder gewünscht?"></textarea>
  <span class="editor-label">Anmerkungen / Sonstiges</span>
  <textarea class="editor-text" id="tn-anmerkungen" placeholder="Weitere Notizen …"></textarea>
  <div class="editor-actions">
    <button class="ctrl ctrl-new" onclick="speichern()">💾 Speichern</button>
    <button class="ctrl ctrl-blank" onclick="abbrechen()">Abbrechen</button>
  </div>
</div>

<div class="liste-titel">📋 Teilnehmer-Liste</div>
<div id="tn-liste"></div>

</div>

<script type="module">
import { supabase } from './supabase/auth_client.js';

let bearbeiteId = null;

function heute() {
  return new Date().toLocaleDateString('de-DE', {weekday:'short', day:'2-digit', month:'2-digit', year:'numeric'});
}
function heuteISO(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
// teilnehmer_protokoll.datum ist in Supabase eine "date"-Spalte (ISO YYYY-MM-DD);
// das Eingabefeld zeigt weiterhin das deutsche Format aus heute() - diese zwei
// Helfer wandeln zwischen beiden Darstellungen um, ohne das Feld selbst
// oder sein Format zu ändern.
function datumFeldZuISO(text){
  const m = (text || '').match(/(\d{2})\.(\d{2})\.(\d{4})/);
  if (!m) return heuteISO();
  return m[3] + '-' + m[2] + '-' + m[1];
}
function datumAnzeigeVonISO(iso){
  if (!iso) return heute();
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('de-DE', {weekday:'short', day:'2-digit', month:'2-digit', year:'numeric'});
}

async function aktuellerUserId(){
  const { data } = await supabase.auth.getUser();
  return data.user ? data.user.id : null;
}

// Neues Schema: INGRA/TK/Kinder statt profiles/kinder/kinder_zuordnung. Die
// INGRA-Tabelle hat keine auth.users-Verknüpfung - die eingeloggte Person
// wird daher über die Login-E-Mail (sessionStorage.klartext_name, trotz
// des Namens tatsächlich die E-Mail) mit ihrer Zeile in "INGRA" abgeglichen.
async function aktuelleIngraId(){
  const email = sessionStorage.getItem('klartext_name') || '';
  if (!email) return null;
  const { data, error } = await supabase.from('INGRA').select('id').eq('email', email).maybeSingle();
  if (error || !data) return null;
  return data.id;
}

// Kind (optional) - teilnehmer_protokoll.kind_id ist neu (0031_neues_schema_kind_fk.sql),
// das bestehende name-Feld bleibt unabhängig davon nutzbar (z.B. bei
// Teilnehmenden, die kein erfasstes Kind sind).
const tnKinderNamen = {}; // id -> name, für lesbare Anzeige in der Liste
async function kinderDropdownLaden(){
  const ingraId = await aktuelleIngraId();
  const { data: kinder, error } = await supabase
    .from('Kinder')
    .select('id, name, klasse')
    .eq('ingra_id', ingraId)
    .eq('aktiv', true)
    .order('name');
  if (error) return;
  const select = document.getElementById('tn-kind');
  (kinder || []).forEach(function(kind) {
    const option = document.createElement('option');
    option.value = kind.id;
    option.textContent = kind.name + (kind.klasse ? ' (' + kind.klasse + ')' : '');
    select.appendChild(option);
    tnKinderNamen[kind.id] = kind.name;
  });
}

// Ersetzt localStorage['kt_tn_protokoll']
async function ladeListe() {
  const userId = await aktuellerUserId();
  const { data, error } = await supabase
    .from('teilnehmer_protokoll')
    .select('id, ersteller_id, name, kind_id, datum, einrichtung, vorschlaege, anmerkungen, created_at')
    .eq('ersteller_id', userId)
    .order('created_at', { ascending: false });
  if (error) { console.error('Liste laden fehlgeschlagen:', error); return []; }
  return data || [];
}

function neuerEintrag() {
  bearbeiteId = null;
  document.getElementById('tn-name').value = '';
  document.getElementById('tn-kind').value = '';
  document.getElementById('tn-datum').value = heute();
  document.getElementById('tn-einrichtung').value = '';
  document.getElementById('tn-vorschlaege').value = '';
  document.getElementById('tn-anmerkungen').value = '';
  document.getElementById('editor').classList.add('aktiv');
  document.getElementById('tn-name').focus();
  document.getElementById('editor').scrollIntoView({behavior:'smooth', block:'start'});
}

// SELECT * FROM teilnehmer_protokoll WHERE id = ...
async function bearbeiten(id) {
  const { data: n, error } = await supabase
    .from('teilnehmer_protokoll')
    .select('id, ersteller_id, name, kind_id, datum, einrichtung, vorschlaege, anmerkungen, created_at')
    .eq('id', id)
    .single();
  if (error || !n) { console.error('Eintrag laden fehlgeschlagen:', error); return; }
  bearbeiteId = id;
  document.getElementById('tn-name').value = n.name;
  document.getElementById('tn-kind').value = n.kind_id || '';
  document.getElementById('tn-datum').value = datumAnzeigeVonISO(n.datum);
  document.getElementById('tn-einrichtung').value = n.einrichtung || '';
  document.getElementById('tn-vorschlaege').value = n.vorschlaege || '';
  document.getElementById('tn-anmerkungen').value = n.anmerkungen || '';
  document.getElementById('editor').classList.add('aktiv');
  document.getElementById('editor').scrollIntoView({behavior:'smooth'});
}

// INSERT oder UPDATE in teilnehmer_protokoll
async function speichern() {
  const name = document.getElementById('tn-name').value.trim();
  if (!name) { alert('Bitte einen Namen eingeben.'); return; }

  const eintrag = {
    name: name,
    kind_id: document.getElementById('tn-kind').value || null,
    datum: datumFeldZuISO(document.getElementById('tn-datum').value),
    einrichtung: document.getElementById('tn-einrichtung').value.trim(),
    vorschlaege: document.getElementById('tn-vorschlaege').value.trim(),
    anmerkungen: document.getElementById('tn-anmerkungen').value.trim()
  };

  let error;
  if (bearbeiteId) {
    ({ error } = await supabase.from('teilnehmer_protokoll').update(eintrag).eq('id', bearbeiteId));
  } else {
    const userId = await aktuellerUserId();
    ({ error } = await supabase.from('teilnehmer_protokoll').insert({ ...eintrag, ersteller_id: userId }));
  }

  if (error) { alert('Fehler beim Speichern: ' + error.message); return; }

  abbrechen();
  await renderListe();
}

function abbrechen() {
  bearbeiteId = null;
  document.getElementById('editor').classList.remove('aktiv');
}

// DELETE FROM teilnehmer_protokoll WHERE id = ...
async function loeschen(id) {
  if (!confirm('Diesen Eintrag löschen?')) return;
  const { error } = await supabase.from('teilnehmer_protokoll').delete().eq('id', id);
  if (error) { alert('Fehler beim Löschen: ' + error.message); return; }
  await renderListe();
}

async function renderListe() {
  const liste = await ladeListe();
  const el = document.getElementById('tn-liste');
  if (liste.length === 0) {
    el.innerHTML = '<div class="leer-hinweis">Noch keine Einträge — klick oben auf „＋ Neuer Eintrag"</div>';
    return;
  }
  el.innerHTML = liste.map(n => `
    <div class="tn-eintrag">
      <div class="te-head">
        <span class="te-name">${n.name}${n.kind_id && tnKinderNamen[n.kind_id] ? ' (' + tnKinderNamen[n.kind_id] + ')' : ''}${n.einrichtung ? ' · ' + n.einrichtung : ''}</span>
        <span class="te-datum">${datumAnzeigeVonISO(n.datum)}</span>
      </div>
      ${n.vorschlaege ? `<div class="te-feld"><div class="te-feld-label">Vorschläge / Wünsche</div><div class="te-feld-text">${n.vorschlaege}</div></div>` : ''}
      ${n.anmerkungen ? `<div class="te-feld"><div class="te-feld-label">Anmerkungen</div><div class="te-feld-text">${n.anmerkungen}</div></div>` : ''}
      <div class="te-actions">
        <button class="te-btn" onclick="bearbeiten('${n.id}')">✏️ Bearbeiten</button>
        <button class="te-btn del" onclick="loeschen('${n.id}')">🗑️ Löschen</button>
      </div>
    </div>`).join('');
}

window.neuerEintrag = neuerEintrag;
window.bearbeiten = bearbeiten;
window.speichern = speichern;
window.abbrechen = abbrechen;
window.loeschen = loeschen;

document.addEventListener('DOMContentLoaded', async function(){
  await kinderDropdownLaden();
  await renderListe();
});
</script>
</body>
</html>
