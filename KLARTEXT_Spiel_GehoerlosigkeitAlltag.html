<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KLARTEXT · Gehörlosigkeit im Alltag</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<script>(function(){try{if(sessionStorage.getItem('klartext_login')!=='true')window.location.href='KLARTEXT_Login.html';}catch(e){}})();</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--m:#1B3A4B;--acc:#3B8A68;--paper:#F5F0E8;--surface:#fff;--border:#DDD8CE;--ink:#2D2D2D;--muted:#7A7060;}
body{font-family:"DM Sans",sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;}
.header{background:var(--m);height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 clamp(1rem,4vw,2rem);border-bottom:3px solid var(--acc);position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:.6rem;text-decoration:none;}
.logo-mark{width:32px;height:32px;border:2px solid var(--acc);border-radius:6px;display:flex;align-items:center;justify-content:center;}
.logo-mark span{font-family:"Playfair Display",serif;font-size:12px;font-weight:700;color:#fff;}
.logo-text{font-family:"Playfair Display",serif;font-size:1rem;font-weight:700;color:#fff;}
.back-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.3rem .7rem;border:1.5px solid var(--acc);border-radius:20px;color:var(--acc);font-size:.7rem;font-weight:700;text-decoration:none;}
.hero{background:linear-gradient(135deg,var(--m) 0%,#2A5570 100%);padding:1.75rem clamp(1rem,4vw,2rem);text-align:center;}
.hero-icon{font-size:2.2rem;margin-bottom:.4rem;}
.hero-titel{font-family:"Playfair Display",serif;font-size:clamp(1.3rem,3vw,1.8rem);font-weight:700;color:#fff;margin-bottom:.3rem;}
.hero-sub{font-size:.82rem;color:rgba(255,255,255,.6);max-width:560px;margin:0 auto;}
.shell{max-width:620px;margin:0 auto;padding:1.75rem clamp(.75rem,3vw,2rem) 5rem;}

/* Szenario-Auswahl */
.szenario-grid{display:flex;flex-direction:column;gap:1rem;}
.szenario-kachel{display:flex;align-items:center;gap:1rem;background:var(--surface);border:2.5px solid var(--border);border-radius:18px;padding:1.2rem 1.4rem;cursor:pointer;text-align:left;font-family:inherit;transition:all .15s;}
.szenario-kachel:hover{border-color:var(--acc);transform:translateY(-2px);box-shadow:0 4px 16px rgba(27,58,75,.1);}
.szenario-emoji{font-size:2.2rem;flex-shrink:0;}
.szenario-titel{font-family:"Playfair Display",serif;font-size:1.1rem;font-weight:700;color:var(--m);margin-bottom:.2rem;}
.szenario-sub{font-size:.8rem;color:var(--muted);}

/* Spiel-Bereich */
.fortschritt-wrap{margin-bottom:1.2rem;}
.fortschritt-label{font-size:.74rem;font-weight:700;color:var(--muted);margin-bottom:.4rem;text-align:center;}
.fortschritt-bar{height:10px;background:var(--border);border-radius:20px;overflow:hidden;}
.fortschritt-fill{height:100%;background:var(--acc);border-radius:20px;transition:width .3s ease;}

.hinweis-banner{background:#FFF4E0;color:#8A5A00;border-radius:12px;padding:.7rem .9rem;font-size:.82rem;font-weight:600;text-align:center;margin-bottom:1rem;}

.szene-card{background:var(--surface);border:2px solid var(--border);border-radius:20px;padding:1.6rem 1.4rem;box-shadow:0 2px 10px rgba(27,58,75,.08);}
.szene-text{font-size:1.02rem;line-height:1.6;color:var(--ink);margin-bottom:1.3rem;}
.szene-text.konsequenz{font-style:italic;color:#2E6E52;}
.option-grid{display:flex;flex-direction:column;gap:.7rem;}
.option-btn{display:block;width:100%;text-align:left;padding:.9rem 1.1rem;border:2.5px solid var(--border);border-radius:16px;background:var(--surface);color:var(--ink);font-family:inherit;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .15s;line-height:1.4;}
.option-btn:hover{border-color:var(--acc);transform:translateY(-1px);}
.weiter-solo-btn{display:inline-flex;align-items:center;gap:.4rem;padding:.75rem 1.7rem;border:none;border-radius:22px;background:var(--m);color:#fff;font-weight:700;font-size:.9rem;cursor:pointer;font-family:inherit;}
.weiter-solo-row{display:flex;justify-content:center;}

/* Ende-Bildschirm */
.ende-card{background:var(--surface);border:2px solid var(--border);border-radius:20px;padding:1.8rem 1.5rem;text-align:center;box-shadow:0 2px 10px rgba(27,58,75,.08);}
.ende-sterne{font-size:1.8rem;margin-bottom:.7rem;}
.ende-text{font-size:.95rem;line-height:1.6;color:var(--ink);margin-bottom:1.1rem;}
.brainy-box{display:flex;gap:.7rem;align-items:center;background:var(--paper);border-radius:14px;padding:.8rem 1rem;margin-bottom:1.3rem;text-align:left;}
.brainy-emoji{font-size:1.6rem;flex-shrink:0;}
.brainy-msg{font-size:.85rem;color:var(--ink);line-height:1.5;}
.ende-knopf-row{display:flex;gap:.7rem;justify-content:center;flex-wrap:wrap;}
.ende-btn{display:inline-flex;align-items:center;gap:.4rem;padding:.7rem 1.5rem;border:none;border-radius:22px;font-weight:700;font-size:.86rem;cursor:pointer;font-family:inherit;}
.ende-btn.nochmal{background:var(--acc);color:#fff;}
.ende-btn.anderes{background:var(--surface);color:var(--m);border:1.5px solid var(--border);}
.ende-btn:hover{opacity:.9;}
</style>
</head>
<body>

<header class="header">
  <a class="logo" href="KLARTEXT_Spiele.html">
    <div class="logo-mark"><span>K</span></div>
    <div class="logo-text">KLARTEXT · Spiele</div>
  </a>
  <a class="back-btn" href="KLARTEXT_Spiele.html">← Spiele</a>
</header>

<div class="hero">
  <div class="hero-icon">👂</div>
  <h1 class="hero-titel">Gehörlosigkeit im Alltag</h1>
  <p class="hero-sub">Für INGRAs und Lehrkräfte: typische Situationen mit schwerhörigen und gehörlosen Kindern erkennen und passend reagieren.</p>
</div>

<div class="shell" id="shell">

  <div id="auswahl-bereich">
    <div class="szenario-grid" id="szenario-grid"></div>
  </div>

  <div id="spiel-bereich" style="display:none;">
    <div class="fortschritt-wrap">
      <div class="fortschritt-label" id="fortschritt-label">Schritt 1 von 3</div>
      <div class="fortschritt-bar"><div class="fortschritt-fill" id="fortschritt-fill" style="width:33%;"></div></div>
    </div>
    <div class="hinweis-banner" id="hinweis-banner" style="display:none;"></div>
    <div class="szene-card">
      <div class="szene-text" id="szene-text"></div>
      <div class="option-grid" id="option-grid"></div>
      <div class="weiter-solo-row" id="weiter-solo-row" style="display:none;">
        <button class="weiter-solo-btn" id="weiter-solo-btn">Weiter →</button>
      </div>
    </div>
  </div>

  <div id="ende-bereich" style="display:none;">
    <div class="ende-card">
      <div class="ende-sterne" id="ende-sterne"></div>
      <div class="ende-text" id="ende-text"></div>
      <div class="brainy-box">
        <span class="brainy-emoji">🧠</span>
        <span class="brainy-msg" id="ende-brainy"></span>
      </div>
      <div class="ende-knopf-row">
        <button class="ende-btn nochmal" onclick="nochmalSpielen()">↺ Nochmal</button>
        <button class="ende-btn anderes" onclick="zurZurAuswahl()">👂 Anderes Szenario</button>
      </div>
    </div>
  </div>

</div>

<script>
var SZENARIEN = [
  {
    id: 's1', emoji: '📢', titel: 'Von hinten angesprochen', sub: 'Eine wichtige Ansage quer durch den Raum …',
    knoten: {
      start: {
        text: 'Du rufst einem gehörlosen Schüler von hinten quer durch den Raum eine wichtige Ansage zu.',
        optionen: [
          { label: 'Ich rufe einfach lauter, damit er mich hört', ziel: 'endeC' },
          { label: 'Ich gehe zu ihm, stelle mich vor ihn und spreche ihn von vorne an', ziel: 'endeAplus' },
          { label: 'Ich winke kurz und hoffe, er sieht es', ziel: 'stufe2a' }
        ]
      },
      stufe2a: {
        text: 'Er bemerkt die Ansage nicht und verpasst eine wichtige Information.',
        optionen: [
          { label: 'Ich gehe jetzt zu ihm und wiederhole es von vorne', ziel: 'endeB' },
          { label: 'Ich lasse es dabei bewenden', ziel: 'endeC' }
        ]
      }
    },
    enden: {
      endeC: { text: 'Der Schüler verpasst die Information vollständig — lauter rufen hilft bei Gehörlosigkeit ohnehin nicht.', brainy: 'Immer von vorne ansprechen, nie von hinten oder seitlich. Blickkontakt ist die Voraussetzung dafür, dass Kommunikation überhaupt ankommt.', bewertung: 'schlecht' },
      endeB: { text: 'Die Wiederholung von vorne kommt an — auch wenn der erste Versuch nicht funktioniert hat.', brainy: 'Gut, dass du es noch nachgeholt hast. Am besten fängst du gleich von vorne an, statt zu rufen oder zu winken und zu hoffen.', bewertung: 'mittel' },
      endeAplus: { text: 'Der Schüler sieht dich kommen, hat Blickkontakt und Mimik zur Verfügung — die Ansage kommt vollständig an.', brainy: 'Genau richtig: von vorne ansprechen, Blickkontakt halten, Mimik als Teil der Kommunikation nutzen. So kommt Kommunikation wirklich an.', bewertung: 'sehr gut' }
    }
  },
  {
    id: 's2', emoji: '🦻', titel: 'Hörgerät ohne Erlaubnis', sub: 'Ein Kollege greift ungefragt zu …',
    knoten: {
      start: {
        text: 'Ein Schüler mit Hörgerät scheint nicht richtig zu hören. Ein Kollege greift ungefragt danach, um die Lautstärke zu regeln, und sagt: „Stell dein Hörgerät lauter!"',
        optionen: [
          { label: 'Ich mache es genauso — kurz nachregeln, dann ist es erledigt', ziel: 'endeC' },
          { label: 'Ich frage ihn stattdessen: „Wie kann ich mich am besten mit dir verständigen?"', ziel: 'endeAplus' },
          { label: 'Ich sage in dem Moment nichts dazu', ziel: 'stufe2a' }
        ]
      },
      stufe2a: {
        text: 'Der Kollege reguliert das Hörgerät weiterhin ungefragt, wenn ihm danach ist.',
        optionen: [
          { label: 'Ich weise jetzt darauf hin, dass man Hörgeräte nicht ohne Erlaubnis berührt', ziel: 'endeB' },
          { label: 'Ich lasse es weiterlaufen', ziel: 'endeC' }
        ]
      }
    },
    enden: {
      endeC: { text: 'Das Hörgerät wird wiederholt ohne Erlaubnis angefasst — der Schüler hat keine Kontrolle über sein eigenes Hilfsmittel.', brainy: 'Nie das Hörgerät oder CI ohne Erlaubnis berühren. „Stell dein Hörgerät lauter" ist zudem oft ein Missverständnis — lauter macht Sprache nicht automatisch verständlicher.', bewertung: 'schlecht' },
      endeB: { text: 'Der späte Hinweis sorgt dafür, dass der Kollege sein Verhalten überdenkt.', brainy: 'Gut, dass du es angesprochen hast. Am besten ist die richtige Frage gleich im ersten Moment: „Wie kann ich mich am besten mit dir verständigen?"', bewertung: 'mittel' },
      endeAplus: { text: 'Der Schüler erklärt selbst, was ihm hilft — und bleibt dabei die Person, die über ihr eigenes Hilfsmittel entscheidet.', brainy: 'Genau richtig: nie „Stell dein Hörgerät lauter" oder Zweifel am Hörstatus äußern, sondern fragen, wie Verständigung am besten funktioniert.', bewertung: 'sehr gut' }
    }
  },
  {
    id: 's3', emoji: '📝', titel: 'Tafel und Sprechen gleichzeitig', sub: 'Erklären, während man schreibt …',
    knoten: {
      start: {
        text: 'Du erklärst etwas an der Tafel und sprichst dabei weiter, während du schreibst und der Klasse den Rücken zuwendest.',
        optionen: [
          { label: 'Ich mache weiter wie gewohnt', ziel: 'endeC' },
          { label: 'Ich schreibe erst fertig, drehe mich um und erkläre dann mit sichtbarem Mund', ziel: 'endeAplus' },
          { label: 'Ich spreche etwas langsamer, drehe mich aber nicht um', ziel: 'stufe2a' }
        ]
      },
      stufe2a: {
        text: 'Der gehörlose Schüler verpasst einen Teil der Erklärung, weil er die Mundbewegungen nicht sehen konnte.',
        optionen: [
          { label: 'Ich wiederhole die Erklärung jetzt mit Blickkontakt', ziel: 'endeB' },
          { label: 'Ich gehe davon aus, es hat schon gereicht', ziel: 'endeC' }
        ]
      }
    },
    enden: {
      endeC: { text: 'Der Schüler verpasst einen Teil der Erklärung, weil weder Mundbild noch Blickkontakt verfügbar waren.', brainy: 'Nie gleichzeitig an die Tafel schreiben und sprechen — das Kind kann nicht beides gleichzeitig verfolgen. Erst schreiben, dann erklären.', bewertung: 'schlecht' },
      endeB: { text: 'Die Wiederholung mit Blickkontakt füllt die Lücke — auch wenn ein Teil vorher verloren ging.', brainy: 'Gut, dass du es nachgeholt hast. Am wirksamsten ist es, von Anfang an nicht gleichzeitig zu schreiben und zu sprechen.', bewertung: 'mittel' },
      endeAplus: { text: 'Der Schüler kann der ganzen Erklärung folgen, weil Mundbild und Blickkontakt durchgehend verfügbar waren.', brainy: 'Genau richtig: Mundpartie sichtbar lassen, deutlich sprechen, kurze Sätze mit Pausen zum Verarbeiten. So bleibt niemand außen vor.', bewertung: 'sehr gut' }
    }
  },
  {
    id: 's4', emoji: '🔊', titel: 'Laute Gruppenarbeit', sub: 'Mehrere Kleingruppen sprechen gleichzeitig …',
    knoten: {
      start: {
        text: 'Bei einer lauten Gruppenarbeit mit mehreren gleichzeitig sprechenden Kleingruppen wirkt ein Schüler mit Hörgerät zunehmend erschöpft und zieht sich zurück.',
        optionen: [
          { label: 'Ich erwarte, dass er sich einfach mehr anstrengt zuzuhören', ziel: 'endeC' },
          { label: 'Ich biete ihm einen ruhigeren Platz oder eine kurze Pause vom Lärm an', ziel: 'endeAplus' },
          { label: 'Ich mache nur die übliche Pause für die ganze Klasse', ziel: 'stufe2a' }
        ]
      },
      stufe2a: {
        text: 'Die übliche Pause reicht nicht — die Erschöpfung bleibt bestehen.',
        optionen: [
          { label: 'Ich biete ihm jetzt gezielt einen ruhigeren Ort an', ziel: 'endeB' },
          { label: 'Ich gehe davon aus, dass es schon irgendwie geht', ziel: 'endeC' }
        ]
      }
    },
    enden: {
      endeC: { text: 'Der Schüler bleibt erschöpft — Lärm und viele gleichzeitige Stimmen sind für ihn deutlich anstrengender als für hörende Kinder.', brainy: 'Lärm ist das größte Problem: Hörgeräte verstärken alles, auch Hintergrundgeräusche. Hörerschöpfung ist real und wird oft unterschätzt — Pausen einplanen.', bewertung: 'schlecht' },
      endeB: { text: 'Der ruhigere Ort hilft, auch wenn er erst spät angeboten wurde.', brainy: 'Gut, dass du reagiert hast. Am besten wirkt ein ruhigerer Rückzugsort, bevor sich die Erschöpfung aufbaut.', bewertung: 'mittel' },
      endeAplus: { text: 'Der ruhigere Platz hilft dem Schüler, sich zu erholen — danach kann er wieder besser mitarbeiten.', brainy: 'Genau richtig: Hintergrundlärm minimieren und Pausen einplanen. Hörerschöpfung ist genauso real wie körperliche Erschöpfung.', bewertung: 'sehr gut' }
    }
  },
  {
    id: 's5', emoji: '🤟', titel: 'Der Gebärdensprachdolmetscher', sub: 'Mit wem spricht man eigentlich?',
    knoten: {
      start: {
        text: 'In einem Gespräch mit einem gehörlosen Schüler und seinem Gebärdensprachdolmetscher wendest du dich automatisch an den Dolmetscher, wenn du etwas sagen möchtest.',
        optionen: [
          { label: 'Ich spreche weiter mit dem Dolmetscher, das ist doch praktischer', ziel: 'endeC' },
          { label: 'Ich richte meine Sprache und meinen Blick direkt an den Schüler', ziel: 'endeAplus' },
          { label: 'Ich wechsle unsicher zwischen beiden hin und her', ziel: 'stufe2a' }
        ]
      },
      stufe2a: {
        text: 'Der Schüler merkt, dass er im Gespräch nicht wirklich als direkter Gesprächspartner wahrgenommen wird.',
        optionen: [
          { label: 'Ich richte mich jetzt bewusst direkt an ihn', ziel: 'endeB' },
          { label: 'Ich mache weiter wie bisher', ziel: 'endeC' }
        ]
      }
    },
    enden: {
      endeC: { text: 'Der Schüler bleibt im eigenen Gespräch eine Randfigur, obwohl er der eigentliche Gesprächspartner ist.', brainy: 'Bei einem Gebärdensprachdolmetscher immer direkt mit dem Kind sprechen, nicht mit dem Dolmetscher. Der Dolmetscher überträgt — das Gespräch führst du mit dem Kind.', bewertung: 'schlecht' },
      endeB: { text: 'Die späte Umstellung sorgt noch dafür, dass der Schüler als Gesprächspartner ernst genommen wird.', brainy: 'Gut, dass du es korrigiert hast. Am besten ist es, von Anfang an Blick und Sprache direkt an das Kind zu richten.', bewertung: 'mittel' },
      endeAplus: { text: 'Der Schüler ist von Anfang an vollwertiger Teil des Gesprächs — der Dolmetscher überträgt im Hintergrund.', brainy: 'Genau richtig: du musst keine Gebärdensprache können, aber du musst bereit sein, dich anzupassen. Das Wie liegt beim Kind, nicht bei dir.', bewertung: 'sehr gut' }
    }
  }
];

var STERNE_NACH_BEWERTUNG = { schlecht: '⭐', mittel: '⭐⭐', gut: '⭐⭐', 'sehr gut': '⭐⭐⭐' };

var aktuellesSzenario = null;
var aktuellerKnoten = null;
var schrittZaehler = 1;
var ausstehenderHinweis = null;

function szenarioAuswahlRendern(){
  var grid = document.getElementById('szenario-grid');
  grid.innerHTML = '';
  SZENARIEN.forEach(function(sz){
    var btn = document.createElement('button');
    btn.className = 'szenario-kachel';
    btn.innerHTML = '<span class="szenario-emoji">' + sz.emoji + '</span>' +
      '<span><span class="szenario-titel" style="display:block;">' + sz.titel + '</span>' +
      '<span class="szenario-sub">' + sz.sub + '</span></span>';
    btn.addEventListener('click', function(){ szenarioStarten(sz.id); });
    grid.appendChild(btn);
  });
}

function szenarioStarten(id){
  aktuellesSzenario = SZENARIEN.filter(function(s){ return s.id === id; })[0];
  aktuellerKnoten = 'start';
  schrittZaehler = 1;
  ausstehenderHinweis = null;

  document.getElementById('auswahl-bereich').style.display = 'none';
  document.getElementById('ende-bereich').style.display = 'none';
  document.getElementById('spiel-bereich').style.display = 'block';

  knotenRendern();
}

function knotenRendern(){
  document.getElementById('fortschritt-label').textContent = 'Schritt ' + schrittZaehler + ' von 3';
  document.getElementById('fortschritt-fill').style.width = Math.min(schrittZaehler / 3 * 100, 100) + '%';

  var hinweisBanner = document.getElementById('hinweis-banner');
  if (ausstehenderHinweis) {
    hinweisBanner.textContent = '💡 ' + ausstehenderHinweis;
    hinweisBanner.style.display = 'block';
    ausstehenderHinweis = null;
  } else {
    hinweisBanner.style.display = 'none';
  }

  var knoten = aktuellesSzenario.knoten[aktuellerKnoten];
  var szeneText = document.getElementById('szene-text');
  szeneText.textContent = knoten.text;
  szeneText.classList.toggle('konsequenz', aktuellerKnoten !== 'start' || schrittZaehler > 1);

  var optionGrid = document.getElementById('option-grid');
  var weiterRow = document.getElementById('weiter-solo-row');
  optionGrid.innerHTML = '';

  if (knoten.optionen) {
    weiterRow.style.display = 'none';
    knoten.optionen.forEach(function(opt){
      var btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.textContent = opt.label;
      btn.addEventListener('click', function(){ zuKnotenWechseln(opt.ziel, opt.hinweisFuerZiel); });
      optionGrid.appendChild(btn);
    });
  } else {
    weiterRow.style.display = 'flex';
    var weiterBtn = document.getElementById('weiter-solo-btn');
    weiterBtn.onclick = function(){ zuKnotenWechseln(knoten.ziel, knoten.hinweisFuerZiel); };
  }
}

function zuKnotenWechseln(ziel, hinweis){
  schrittZaehler++;
  ausstehenderHinweis = hinweis || null;

  if (ziel.indexOf('ende') === 0) {
    endeAnzeigen(ziel);
    return;
  }
  aktuellerKnoten = ziel;
  knotenRendern();
}

function endeAnzeigen(endeId){
  var ende = aktuellesSzenario.enden[endeId];
  document.getElementById('ende-sterne').textContent = STERNE_NACH_BEWERTUNG[ende.bewertung] || '⭐';
  document.getElementById('ende-text').textContent = ende.text;
  document.getElementById('ende-brainy').textContent = ende.brainy;

  document.getElementById('spiel-bereich').style.display = 'none';
  document.getElementById('ende-bereich').style.display = 'block';
}

function nochmalSpielen(){
  szenarioStarten(aktuellesSzenario.id);
}

function zurZurAuswahl(){
  aktuellesSzenario = null;
  document.getElementById('ende-bereich').style.display = 'none';
  document.getElementById('spiel-bereich').style.display = 'none';
  document.getElementById('auswahl-bereich').style.display = 'block';
}

szenarioAuswahlRendern();
</script>

</body>
</html>
