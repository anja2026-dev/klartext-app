<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KLARTEXT · Stärken-Check</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--m:#1B3A4B;--acc:#6EC6A0;--paper:#F5F0E8;--surface:#fff;--border:#DDD8CE;--ink:#2D2D2D;--muted:#7A7060;}
body{font-family:"DM Sans",sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;}
.header{background:var(--m);height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 clamp(1rem,4vw,2rem);border-bottom:3px solid var(--acc);position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:.6rem;text-decoration:none;}
.logo-mark{width:32px;height:32px;border:2px solid var(--acc);border-radius:6px;display:flex;align-items:center;justify-content:center;}
.logo-mark span{font-family:"Playfair Display",serif;font-size:12px;font-weight:700;color:#fff;}
.logo-text{font-family:"Playfair Display",serif;font-size:1rem;font-weight:700;color:#fff;}
.back-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.3rem .7rem;border:1.5px solid var(--acc);border-radius:20px;color:var(--acc);font-size:.7rem;font-weight:700;text-decoration:none;}
.hero{background:linear-gradient(135deg,var(--m) 0%,#2A5570 100%);padding:1.75rem clamp(1rem,4vw,2rem);text-align:center;}
.hero-icon{font-size:2.2rem;margin-bottom:.4rem;}
.hero-titel{font-family:"Playfair Display",serif;font-size:clamp(1.3rem,3vw,1.8rem);font-weight:700;color:#fff;margin-bottom:.3rem;}
.hero-sub{font-size:.82rem;color:rgba(255,255,255,.6);max-width:560px;margin:0 auto;}
.shell{max-width:620px;margin:0 auto;padding:1.75rem clamp(.75rem,3vw,2rem) 5rem;}

.fortschritt-wrap{margin-bottom:1.2rem;}
.fortschritt-label{font-size:.74rem;font-weight:700;color:var(--muted);margin-bottom:.4rem;text-align:center;}
.fortschritt-bar{height:10px;background:var(--border);border-radius:20px;overflow:hidden;}
.fortschritt-fill{height:100%;background:var(--acc);border-radius:20px;transition:width .3s ease;}

.frage-card{background:var(--surface);border:2px solid var(--border);border-radius:20px;padding:1.6rem 1.4rem;box-shadow:0 2px 10px rgba(27,58,75,.08);}
.frage-titel{font-family:"Playfair Display",serif;font-size:1.25rem;font-weight:700;color:var(--m);margin-bottom:1.2rem;text-align:center;line-height:1.35;}
.antwort-grid{display:flex;flex-direction:column;gap:.75rem;}
.antwort-btn{display:block;width:100%;text-align:left;padding:.95rem 1.15rem;border:2.5px solid var(--border);border-radius:16px;background:var(--surface);color:var(--ink);font-family:inherit;font-size:.92rem;font-weight:600;cursor:pointer;transition:all .15s;line-height:1.4;}
.antwort-btn:hover{border-color:var(--acc);transform:translateY(-1px);}
.antwort-btn.gewaehlt{border-color:var(--acc);background:#EAF7F1;box-shadow:0 0 0 3px rgba(110,198,160,.25);}

.weiter-row{display:flex;justify-content:center;margin-top:1.4rem;}
.weiter-btn{display:none;align-items:center;gap:.4rem;padding:.7rem 1.8rem;border:none;border-radius:22px;background:var(--m);color:#fff;font-weight:700;font-size:.9rem;cursor:pointer;font-family:inherit;}
.weiter-btn.zeigen{display:inline-flex;}
.weiter-btn:hover{opacity:.9;}

.ergebnis-card{background:var(--surface);border:2px solid var(--border);border-radius:20px;padding:1.8rem 1.5rem;text-align:center;box-shadow:0 2px 10px rgba(27,58,75,.08);}
.ergebnis-icon{font-size:2.4rem;margin-bottom:.6rem;}
.ergebnis-titel{font-family:"Playfair Display",serif;font-size:1.35rem;font-weight:700;color:var(--m);margin-bottom:.5rem;}
.ergebnis-berufe{font-size:.92rem;color:var(--ink);line-height:1.7;margin-bottom:1.1rem;}
.brainy-box{display:flex;gap:.7rem;align-items:center;background:var(--paper);border-radius:14px;padding:.8rem 1rem;margin-bottom:1.3rem;text-align:left;}
.brainy-emoji{font-size:1.6rem;flex-shrink:0;}
.brainy-msg{font-size:.85rem;color:var(--ink);line-height:1.5;}
.nochmal-btn{display:inline-flex;align-items:center;gap:.4rem;padding:.7rem 1.6rem;border:none;border-radius:22px;background:var(--acc);color:var(--m);font-weight:700;font-size:.9rem;cursor:pointer;font-family:inherit;}
.nochmal-btn:hover{opacity:.9;}
</style>
</head>
<body>

<header class="header">
  <a class="logo" href="KLARTEXT_Spiele.html">
    <div class="logo-mark"><span>K</span></div>
    <div class="logo-text">KLARTEXT · Spiele</div>
  </a>
  <a class="back-btn" href="KLARTEXT_Spiele.html">← Spiele</a>
</header>

<div class="hero">
  <div class="hero-icon">🌟</div>
  <h1 class="hero-titel">Stärken-Check</h1>
  <p class="hero-sub">10 kurze Fragen — am Ende bekommst du Berufsfelder vorgeschlagen, die zu dir passen könnten.</p>
</div>

<div class="shell" id="shell">
  <div id="quiz-bereich">
    <div class="fortschritt-wrap">
      <div class="fortschritt-label" id="fortschritt-label">Frage 1 von 10</div>
      <div class="fortschritt-bar"><div class="fortschritt-fill" id="fortschritt-fill" style="width:10%;"></div></div>
    </div>

    <div class="frage-card">
      <div class="frage-titel" id="frage-titel"></div>
      <div class="antwort-grid" id="antwort-grid"></div>
      <div class="weiter-row">
        <button class="weiter-btn" id="weiter-btn" onclick="naechsteFrage()">Weiter →</button>
      </div>
    </div>
  </div>

  <div id="ergebnis-bereich" style="display:none;">
    <div class="ergebnis-card">
      <div class="ergebnis-icon">🌟</div>
      <div class="ergebnis-titel" id="ergebnis-titel"></div>
      <div class="ergebnis-berufe" id="ergebnis-berufe"></div>
      <div class="brainy-box">
        <span class="brainy-emoji">🧠</span>
        <span class="brainy-msg">Das passt gut zu dir! 🌟</span>
      </div>
      <button class="nochmal-btn" onclick="nochmalSpielen()">↺ Nochmal spielen</button>
    </div>
  </div>
</div>

<script>
var FRAGEN = [
  { frage: 'Was machst du am liebsten in der Freizeit?', antworten: [
    { text: 'Draußen sein, Sport, Bewegen', kategorie: 'natur' },
    { text: 'Basteln, Bauen, Reparieren', kategorie: 'technik' },
    { text: 'Mit Menschen reden, helfen', kategorie: 'soziale' },
    { text: 'Am Computer, Technik, Spiele', kategorie: 'technik' }
  ]},
  { frage: 'Wenn jemand traurig ist, was tust du?', antworten: [
    { text: 'Ich höre zu und tröste', kategorie: 'soziale' },
    { text: 'Ich lenke ihn ab mit etwas Lustigem', kategorie: 'kreativ' },
    { text: 'Ich weiß nicht genau was tun', kategorie: null },
    { text: 'Ich gebe praktische Tipps', kategorie: 'technik' }
  ]},
  { frage: 'Was liegt dir in der Schule am meisten?', antworten: [
    { text: 'Rechnen, Logik, Naturwissenschaften', kategorie: 'technik' },
    { text: 'Sprachen, Lesen, Schreiben', kategorie: 'kreativ' },
    { text: 'Kunst, Musik, Werken', kategorie: 'kreativ' },
    { text: 'Sport, Pausen, Gruppenarbeit', kategorie: 'natur' }
  ]},
  { frage: 'Wie arbeitest du am liebsten?', antworten: [
    { text: 'Alleine, in Ruhe, konzentriert', kategorie: 'technik' },
    { text: 'Im Team, mit anderen zusammen', kategorie: 'soziale' },
    { text: 'Draußen, mit den Händen', kategorie: 'natur' },
    { text: 'Egal, Hauptsache abwechslungsreich', kategorie: null }
  ]},
  { frage: 'Was würdest du an einem freien Tag tun?', antworten: [
    { text: 'Etwas bauen oder reparieren', kategorie: 'technik' },
    { text: 'Mit Freunden oder Familie zusammen sein', kategorie: 'soziale' },
    { text: 'Etwas Kreatives: malen, schreiben, musik', kategorie: 'kreativ' },
    { text: 'Natur, Tiere, draußen unterwegs', kategorie: 'natur' }
  ]},
  { frage: 'Was nervt dich am meisten?', antworten: [
    { text: 'Lange stillsitzen müssen', kategorie: 'natur' },
    { text: 'Alleine sein, kein Austausch', kategorie: 'soziale' },
    { text: 'Unordnung und Chaos', kategorie: 'technik' },
    { text: 'Wenn ich nichts mit den Händen machen kann', kategorie: 'technik' }
  ]},
  { frage: 'Welche Aussage passt am besten zu dir?', antworten: [
    { text: 'Ich erkläre anderen gerne Sachen', kategorie: 'soziale' },
    { text: 'Ich löse lieber Probleme als zu reden', kategorie: 'technik' },
    { text: 'Ich kümmere mich gerne um andere', kategorie: 'soziale' },
    { text: 'Ich mag es wenn Dinge schön aussehen', kategorie: 'kreativ' }
  ]},
  { frage: 'Was wärst du gerne in einem Film?', antworten: [
    { text: 'Der Held der alle rettet', kategorie: 'soziale' },
    { text: 'Der kluge Tüftler im Hintergrund', kategorie: 'technik' },
    { text: 'Der Freund dem alle vertrauen', kategorie: 'soziale' },
    { text: 'Der Künstler der alles gestaltet', kategorie: 'kreativ' }
  ]},
  { frage: 'Wie gehst du mit Stress um?', antworten: [
    { text: 'Ich mache Sport oder bewege mich', kategorie: 'natur' },
    { text: 'Ich rede mit jemandem darüber', kategorie: 'soziale' },
    { text: 'Ich ziehe mich zurück und denke nach', kategorie: 'technik' },
    { text: 'Ich lenke mich mit Kreativem ab', kategorie: 'kreativ' }
  ]},
  { frage: 'Was ist dir bei einem Job wichtig?', antworten: [
    { text: 'Anderen Menschen helfen', kategorie: 'soziale' },
    { text: 'Gutes Gehalt und Sicherheit', kategorie: null },
    { text: 'Spaß und Abwechslung', kategorie: null },
    { text: 'Mit den Händen arbeiten, etwas erschaffen', kategorie: 'technik' }
  ]}
];

var BERUFSFELDER = {
  soziale: { titel: 'Soziale Berufe', berufe: 'Erzieher, Pflege, Sozialarbeit, Pädagogik' },
  technik: { titel: 'Technische Berufe', berufe: 'Mechatronik, IT, Elektro, Handwerk' },
  kreativ: { titel: 'Kreative Berufe', berufe: 'Mediengestaltung, Tischlerei, Mode, Grafikdesign' },
  natur:   { titel: 'Outdoor-Berufe', berufe: 'Garten/Landschaftsbau, Tierpflege, Forstwirtschaft, Sport' }
};

var aktuelleFrage = 0;
var antwortenGewaehlt = [];
var ausgewaehlteKategorie = null;
var antwortAusgewaehlt = false;

function frageAnzeigen(){
  var frage = FRAGEN[aktuelleFrage];
  document.getElementById('fortschritt-label').textContent = 'Frage ' + (aktuelleFrage + 1) + ' von ' + FRAGEN.length;
  document.getElementById('fortschritt-fill').style.width = ((aktuelleFrage + 1) / FRAGEN.length * 100) + '%';
  document.getElementById('frage-titel').textContent = frage.frage;

  var grid = document.getElementById('antwort-grid');
  grid.innerHTML = '';
  ausgewaehlteKategorie = null;
  antwortAusgewaehlt = false;
  document.getElementById('weiter-btn').classList.remove('zeigen');

  frage.antworten.forEach(function(antwort, idx){
    var btn = document.createElement('button');
    btn.className = 'antwort-btn';
    btn.textContent = antwort.text;
    btn.addEventListener('click', function(){
      grid.querySelectorAll('.antwort-btn').forEach(function(b){ b.classList.remove('gewaehlt'); });
      btn.classList.add('gewaehlt');
      ausgewaehlteKategorie = antwort.kategorie;
      antwortAusgewaehlt = true;
      document.getElementById('weiter-btn').classList.add('zeigen');
    });
    grid.appendChild(btn);
  });
}

function naechsteFrage(){
  if (!antwortAusgewaehlt) return;
  antwortenGewaehlt.push(ausgewaehlteKategorie);

  if (aktuelleFrage < FRAGEN.length - 1) {
    aktuelleFrage++;
    frageAnzeigen();
  } else {
    auswertungAnzeigen();
  }
}

function auswertungAnzeigen(){
  var zaehler = { soziale: 0, technik: 0, kreativ: 0, natur: 0 };
  antwortenGewaehlt.forEach(function(kategorie){
    if (kategorie && zaehler.hasOwnProperty(kategorie)) zaehler[kategorie]++;
  });

  var kategorien = Object.keys(zaehler);
  var maxWert = Math.max.apply(null, kategorien.map(function(k){ return zaehler[k]; }));
  var fuehrende = kategorien.filter(function(k){ return zaehler[k] === maxWert; });

  var ergebnis;
  if (maxWert === 0 || fuehrende.length >= 3) {
    ergebnis = { titel: 'Du bist vielseitig!', berufe: 'Schau dir Berufe an, die Abwechslung bieten.' };
  } else if (fuehrende.length === 2) {
    var a = BERUFSFELDER[fuehrende[0]];
    var b = BERUFSFELDER[fuehrende[1]];
    ergebnis = { titel: a.titel + ' & ' + b.titel, berufe: a.berufe + ' — sowie: ' + b.berufe };
  } else {
    var top = BERUFSFELDER[fuehrende[0]];
    ergebnis = { titel: top.titel, berufe: top.berufe };
  }

  document.getElementById('ergebnis-titel').textContent = ergebnis.titel;
  document.getElementById('ergebnis-berufe').textContent = ergebnis.berufe;

  document.getElementById('quiz-bereich').style.display = 'none';
  document.getElementById('ergebnis-bereich').style.display = 'block';

  try {
    localStorage.setItem('staerken_ergebnis', JSON.stringify({
      kategorien: zaehler,
      ergebnis: ergebnis,
      datum: new Date().toISOString()
    }));
  } catch(e) {}
}

function nochmalSpielen(){
  aktuelleFrage = 0;
  antwortenGewaehlt = [];
  document.getElementById('quiz-bereich').style.display = 'block';
  document.getElementById('ergebnis-bereich').style.display = 'none';
  frageAnzeigen();
}

frageAnzeigen();
</script>

</body>
</html>
