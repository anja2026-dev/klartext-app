<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KLARTEXT · Anmeldung</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"DM Sans",sans-serif;background:linear-gradient(135deg,#0F2230 0%,#1B3A4B 60%,#2A5570 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;}
.logo-wrap{text-align:center;margin-bottom:2rem;}
.logo-mark{width:56px;height:56px;border:2.5px solid #6EC6A0;border-radius:11px;display:flex;align-items:center;justify-content:center;margin:0 auto .75rem;}
.logo-mark span{font-family:"Playfair Display",serif;font-size:20px;font-weight:700;color:#fff;}
.logo-name{font-family:"Playfair Display",serif;font-size:1.5rem;font-weight:700;color:#fff;}
.logo-sub{font-size:.62rem;color:rgba(255,255,255,.4);letter-spacing:.2em;text-transform:uppercase;margin-top:3px;}
.card{background:#fff;border-radius:16px;padding:2rem;width:100%;max-width:440px;box-shadow:0 24px 60px rgba(0,0,0,.35);}
.card-titel{font-family:"Playfair Display",serif;font-size:1.15rem;font-weight:700;color:#1B3A4B;margin-bottom:.25rem;text-align:center;}
.card-sub{font-size:.8rem;color:#7A7060;text-align:center;margin-bottom:1.5rem;}
.feld{margin-bottom:1rem;}
.feld-label{font-size:.7rem;font-weight:700;color:#1B3A4B;letter-spacing:.1em;text-transform:uppercase;margin-bottom:.4rem;display:block;}
.pw-row{display:flex;gap:.5rem;}
.feld-input{flex:1;padding:.6rem .85rem;border:1.5px solid #DDD8CE;border-radius:8px;font-family:"DM Sans",sans-serif;font-size:.9rem;outline:none;color:#1B3A4B;width:100%;}
.feld-input:focus{border-color:#1B3A4B;}
.pw-toggle{background:none;border:none;cursor:pointer;color:#7A7060;font-size:1rem;padding:.4rem;}
.login-btn{width:100%;padding:.75rem;border-radius:10px;border:none;font-family:"DM Sans",sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;color:#fff;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:.4rem;background:#1B3A4B;margin-top:.5rem;}
.login-btn:hover{opacity:.9;transform:translateY(-1px);}
.login-btn:disabled{opacity:.6;cursor:default;transform:none;}
.err{display:none;font-size:.78rem;color:#C62828;text-align:center;margin-top:.75rem;padding:.4rem;background:#FDECEA;border-radius:6px;}
.err.show{display:block;}
.hint{text-align:center;margin-top:1.25rem;}
.hint a{font-size:.72rem;color:#7A7060;text-decoration:none;}
.hint a:hover{color:#1B3A4B;}
</style>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KLARTEXT">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#1B3A4B">
</head>
<body>

<div class="logo-wrap">
  <div class="logo-mark"><span>K</span></div>
  <div class="logo-name">KLARTEXT</div>
  <div class="logo-sub">Mentoring-System</div>
</div>

<div class="card">
  <div class="card-titel">Willkommen</div>
  <div class="card-sub">Bitte melde dich mit deinem persönlichen Konto an.</div>

  <div class="feld">
    <span class="feld-label">E-Mail</span>
    <input class="feld-input" type="email" id="email-input" placeholder="name@beispiel.de" autocomplete="username"
      onkeydown="if(event.key==='Enter')document.getElementById('pw-input').focus();">
  </div>

  <div class="feld">
    <span class="feld-label">Passwort</span>
    <div class="pw-row">
      <input class="feld-input" type="password" id="pw-input" placeholder="Passwort eingeben …" autocomplete="current-password"
        onkeydown="if(event.key==='Enter')login();">
      <button class="pw-toggle" onclick="togglePw()" type="button" aria-label="Passwort anzeigen">👁️</button>
    </div>
  </div>

  <button class="login-btn" id="login-btn" onclick="login()" type="button">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#fff" stroke-width="2.5"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg>
    Einloggen
  </button>

  <div class="err" id="err">Anmeldung fehlgeschlagen — bitte E-Mail und Passwort prüfen.</div>

  <div class="hint">
    <a href="KLARTEXT_Landing.html">← Zurück zur Startseite</a>
  </div>
</div>

<script type="module">
  import { supabase } from './supabase/auth_client.js';
  // neuer Login-Code kommt hier rein

// Ziel-Seite je Rolle nach erfolgreichem Login (unverändert gegenüber dem bisherigen Modell)
var ZIELE = {
  ingra: 'DASHBOARD.html', admin: 'DASHBOARD.html',
  lk: 'KLARTEXT_Lehrerkurs.html', eltern: 'KLARTEXT_Elternkurs.html',
  tk: 'DASHBOARD.html', trainer: 'DASHBOARD.html'
};

function togglePw() {
  var inp = document.getElementById('pw-input');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function zeigeFehler(text) {
  var err = document.getElementById('err');
  err.textContent = text;
  err.classList.add('show');
}

// Übergangs-Kompatibilität: die übrigen, noch nicht migrierten Seiten
// prüfen weiterhin sessionStorage['klartext_login']/['klartext_role'].
// Sobald jede Seite direkt gegen Supabase-Sessions prüft, kann dieser
// Block entfallen.
function setzeUebergangsSession(profil, userId) {
  try {
    sessionStorage.setItem('klartext_login', 'true');
    sessionStorage.setItem('klartext_role', profil.rolle);
    sessionStorage.setItem('klartext_user_id', userId);
    sessionStorage.setItem('klartext_name', [profil.vorname, profil.nachname].filter(Boolean).join(' ') || profil.rolle);
  } catch (e) {}
}

function weiterleiten(rolle) {
  window.location.href = ZIELE[rolle] || 'DASHBOARD.html';
}

async function login() {
  var email = document.getElementById('email-input').value.trim();
  var passwort = document.getElementById('pw-input').value;
  document.getElementById('err').classList.remove('show');

  if (!email || !passwort) {
    zeigeFehler('Bitte E-Mail und Passwort eingeben.');
    return;
  }

  var btn = document.getElementById('login-btn');
  btn.disabled = true;
  try {
    var anmeldung = await supabase.auth.signInWithPassword({ email: email, password: passwort });
    if (anmeldung.error) throw anmeldung.error;

    var profilAbfrage = await supabase
      .from('profiles')
      .select('rolle, vorname, nachname')
      .eq('id', anmeldung.data.user.id)
      .single();
    if (profilAbfrage.error) throw profilAbfrage.error;

    setzeUebergangsSession(profilAbfrage.data, anmeldung.data.user.id);
    weiterleiten(profilAbfrage.data.rolle);
  } catch (e) {
    zeigeFehler('Anmeldung fehlgeschlagen — bitte E-Mail und Passwort prüfen.');
    btn.disabled = false;
  }
}

// Module-Skripte sind nicht global sichtbar — für die inline onclick/onkeydown-
// Attribute im HTML oben müssen die Funktionen explizit an window gehängt werden.
window.login = login;
window.togglePw = togglePw;

// Auto-Login, falls bereits eine gültige Supabase-Session besteht
(async function(){
  try {
    var sitzung = await supabase.auth.getSession();
    if (!sitzung.data.session) return;
    var profilAbfrage = await supabase
      .from('profiles')
      .select('rolle, vorname, nachname')
      .eq('id', sitzung.data.session.user.id)
      .single();
    if (profilAbfrage.data) {
      setzeUebergangsSession(profilAbfrage.data, sitzung.data.session.user.id);
      weiterleiten(profilAbfrage.data.rolle);
    }
  } catch (e) {}
})();
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('sw.js')
      .then(r => console.log('SW registered'))
      .catch(e => console.log('SW failed:', e));
  });
}
</script></body>
</html>
