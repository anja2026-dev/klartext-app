<div class="chat-new-shell">
  <div class="chat-new-hinweis">Wähle eine Person, um eine neue Konversation zu starten. Falls bereits eine Konversation existiert, wird diese geöffnet statt eine neue zu erstellen.</div>

  <div class="chat-new-abschnitt-titel">Direktnachricht</div>
  <div id="partner-liste"></div>
</div>

<script type="module">
import { supabase } from './supabase/auth_client.js';

// Echte Kontaktliste (siehe supabase/migrations/0036_person_auth_map.sql):
// person_auth_map enthält bereits für JEDEN Login (unabhängig von der
// Rolle) eine Zeile mit E-Mail, echter Auth-UID, Anzeigename und Rolle -
// jede Person, die dort auftaucht, hat sich mindestens einmal
// eingeloggt, ist also automatisch Firebase-chat-fähig. Kein separater
// Join gegen die "ingra"-Tabelle nötig, und kein "noch nie eingeloggt"-
// Ausblenden mehr, da person_auth_map selbst schon nur eingeloggte
// Personen enthält. Anzeigename kommt aus person_auth_map.name, bei
// leerem Namen Fallback auf die E-Mail - niemals die UUID anzeigen.
// Gruppen/Broadcast folgen später.
//
// In EINEM type="module"-Script zusammengefasst statt auf zwei Scripts
// verteilt: ein normales (nicht-Modul-)Script läuft synchron beim
// Parsen und damit immer VOR jedem type="module"-Script (Module sind
// wie defer immer nachgelagert) - eine spätere Übergabe per window-
// Promise würde daher genau das Race-Problem aus window.firebaseAuthReady
// wiederholen. db/chatAktuellerUser/chatRollenfarbe/chatNeueConversation/
// window.firebaseAuthReady stammen aus firebase.js/chat.js (klassische
// Scripts weiter oben) und sind daher beim Start dieses Moduls bereits
// sicher vorhanden.

const aktuellerUser = chatAktuellerUser();

function partnerKarteHtml(partner) {
  const farbe = chatRollenfarbe(partner.role);
  const initiale = partner.name.charAt(0).toUpperCase();
  return `<div class="chat-partner-karte" onclick="chatPartnerWaehlen('${partner.id}','${partner.name.replace(/'/g, "\\'")}','${partner.role}')">
    <div class="chat-new-avatar" style="background:${farbe};">${initiale}</div>
    <div>
      <div class="chat-partner-name">${partner.name}</div>
      <div class="chat-partner-rolle">${partner.role}</div>
    </div>
  </div>`;
}

async function ladeKontakte() {
  const { data, error } = await supabase.from('person_auth_map').select('email, auth_uid, name, role');

  if (error) {
    console.error('Kontaktliste konnte nicht geladen werden:', error);
    return null;
  }

  return (data || []).map(function(zeile) {
    return { id: zeile.auth_uid, name: zeile.name || zeile.email, role: zeile.role || '' };
  });
}

(async function(){
  const liste = document.getElementById('partner-liste');
  const kontakte = await ladeKontakte();

  if (kontakte === null) {
    liste.innerHTML = '<div class="chat-liste-leer">Kontaktliste konnte nicht geladen werden.</div>';
    return;
  }

  // eigene Identität ausschließen — man kann sich nicht selbst anschreiben
  const sichtbarePartner = kontakte.filter(function(p) { return p.id !== aktuellerUser.id; });

  if (sichtbarePartner.length === 0) {
    liste.innerHTML = '<div class="chat-liste-leer">Keine weiteren Chatpartner verfügbar.</div>';
  } else {
    liste.innerHTML = sichtbarePartner.map(partnerKarteHtml).join('');
  }
})();

// Ungelesene-Nachrichten-Badge auf dem "💬 KLARapp"-Link in der globalen
// Navigation - gleicher Mechanismus wie chatBadgeAktualisieren() in
// DASHBOARD.html/DASHBOARD_mobile.html (chat.js: chatZaehleUngelesen()).
function chatBadgeAktualisieren(){
  const badge = document.getElementById('gnav-chat-badge');
  if (!badge) return;
  chatLadeConversations(function(conversations){
    const ids = Object.keys(conversations || {});
    if (!ids.length) { badge.style.display = 'none'; return; }
    let gesamt = 0;
    let ausstehend = ids.length;
    ids.forEach(function(cid){
      chatZaehleUngelesen(cid, function(anzahl){
        gesamt += anzahl;
        ausstehend--;
        if (ausstehend === 0) {
          if (gesamt > 0) { badge.textContent = gesamt; badge.style.display = 'inline-block'; }
          else { badge.style.display = 'none'; }
        }
      });
    });
  });
}
(window.firebaseAuthReady || Promise.resolve()).then(chatBadgeAktualisieren);

function chatPartnerWaehlen(partnerId, partnerName, partnerRole) {
  // Prüfen, ob bereits eine direct-Konversation mit dieser Person existiert.
  // Defensiv erst nach window.firebaseAuthReady starten, falls jemand direkt
  // nach dem Laden der Seite klickt, bevor signInAnonymously() fertig ist.
  (window.firebaseAuthReady || Promise.resolve()).then(function(){
    db.ref('conversations').once('value').then(function(snapshot) {
      const alle = snapshot.val() || {};
      let bestehendeId = null;

      Object.keys(alle).forEach(function(cid) {
        const conv = alle[cid];
        if (conv.type === 'direct' && conv.members &&
            conv.members[aktuellerUser.id] && conv.members[partnerId]) {
          bestehendeId = cid;
        }
      });

      if (bestehendeId) {
        window.location.href = 'CHAT_View.html?cid=' + bestehendeId;
      } else {
        chatNeueConversation({ id: partnerId, name: partnerName, role: partnerRole }, 'direct')
          .then(function(neueId) {
            window.location.href = 'CHAT_View.html?cid=' + neueId;
          });
      }
    });
  });
}
// Modul-Scripts sind nicht global sichtbar — für das inline onclick-Attribut
// in partnerKarteHtml() muss die Funktion explizit an window gehängt werden
// (gleiches Muster wie window.login in KLARTEXT_Login.html).
window.chatPartnerWaehlen = chatPartnerWaehlen;
</script>
</body>
