<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KLARTEXT · Schulalltag-Wörterbuch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<script>(function(){try{if(sessionStorage.getItem('klartext_login')!=='true')window.location.href='KLARTEXT_Login.html';}catch(e){}})();</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--m:#1B3A4B;--acc:#6EC6A0;--paper:#F5F0E8;--surface:#fff;--border:#DDD8CE;--ink:#2D2D2D;--muted:#7A7060;}
body{font-family:"DM Sans",sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;}
.header{background:var(--m);height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 clamp(1rem,4vw,2rem);border-bottom:3px solid var(--acc);position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:.6rem;text-decoration:none;}
.logo-mark{width:32px;height:32px;border:2px solid var(--acc);border-radius:6px;display:flex;align-items:center;justify-content:center;}
.logo-mark span{font-family:"Playfair Display",serif;font-size:12px;font-weight:700;color:#fff;}
.logo-text{font-family:"Playfair Display",serif;font-size:1rem;font-weight:700;color:#fff;}
.back-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.3rem .7rem;border:1.5px solid var(--acc);border-radius:20px;color:var(--acc);font-size:.7rem;font-weight:700;text-decoration:none;}
.hero{background:linear-gradient(135deg,var(--m) 0%,#2A5570 100%);padding:1.75rem clamp(1rem,4vw,2rem);text-align:center;}
.hero-icon{font-size:2.2rem;margin-bottom:.4rem;}
.hero-titel{font-family:"Playfair Display",serif;font-size:clamp(1.3rem,3vw,1.8rem);font-weight:700;color:#fff;margin-bottom:.3rem;}
.hero-sub{font-size:.82rem;color:rgba(255,255,255,.6);max-width:560px;margin:0 auto;}
.shell{max-width:640px;margin:0 auto;padding:1.75rem clamp(.75rem,3vw,2rem) 5rem;}

/* Sprachauswahl */
.sprachen-row{display:flex;flex-wrap:wrap;gap:.55rem;justify-content:center;margin-bottom:1.4rem;position:sticky;top:64px;background:var(--paper);padding:.9rem 0;z-index:50;}
.sprachen-btn{display:flex;align-items:center;gap:.4rem;padding:.55rem 1rem;border:2.5px solid var(--border);border-radius:20px;background:var(--surface);color:var(--ink);font-family:inherit;font-size:.85rem;font-weight:700;cursor:pointer;transition:all .15s;}
.sprachen-btn:hover{border-color:var(--acc);}
.sprachen-btn.aktiv{border-color:var(--m);background:var(--m);color:#fff;}
.sprachen-btn .flagge{font-size:1.05rem;}

/* Wörterliste */
.woerter-liste{display:flex;flex-direction:column;gap:.65rem;}
.wort-karte{background:var(--surface);border:2px solid var(--border);border-radius:16px;padding:.9rem 1.1rem;display:flex;align-items:center;gap:.9rem;box-shadow:0 2px 8px rgba(27,58,75,.06);}
.wort-spalte{flex:1;min-width:0;}
.wort-de{font-family:"Playfair Display",serif;font-weight:700;font-size:1rem;color:var(--m);margin-bottom:.15rem;}
.wort-uebersetzung{font-size:.95rem;color:var(--ink);font-weight:600;}
.wort-uebersetzung[dir="rtl"]{text-align:right;}
.sprich-btn{flex-shrink:0;width:38px;height:38px;border-radius:50%;border:2px solid var(--border);background:var(--paper);font-size:1.05rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.sprich-btn:hover{border-color:var(--acc);background:#EAF7F1;}
.sprich-btn.spricht{border-color:var(--acc);background:#EAF7F1;}
</style>
</head>
<body>

<header class="header">
  <a class="logo" href="KLARTEXT_Spiele.html">
    <div class="logo-mark"><span>K</span></div>
    <div class="logo-text">KLARTEXT · Spiele</div>
  </a>
  <a class="back-btn" href="KLARTEXT_Spiele.html">← Spiele</a>
</header>

<div class="hero">
  <div class="hero-icon">🗣️</div>
  <h1 class="hero-titel">Schulalltag-Wörterbuch</h1>
  <p class="hero-sub">Die wichtigsten Wörter für den Schulalltag — in fünf Sprachen. Sprache wählen und durchblättern.</p>
</div>

<div class="shell">
  <div class="sprachen-row" id="sprachen-row"></div>
  <div class="woerter-liste" id="woerter-liste"></div>
</div>

<script>
var SPRACHEN = [
  { code: 'en', label: 'Englisch',   flagge: '🇬🇧', dir: 'ltr', speechLang: 'en-US' },
  { code: 'ar', label: 'Arabisch',   flagge: '🇸🇦', dir: 'rtl', speechLang: 'ar-SA' },
  { code: 'uk', label: 'Ukrainisch', flagge: '🇺🇦', dir: 'ltr', speechLang: 'uk-UA' },
  { code: 'tr', label: 'Türkisch',   flagge: '🇹🇷', dir: 'ltr', speechLang: 'tr-TR' },
  { code: 'ru', label: 'Russisch',   flagge: '🇷🇺', dir: 'ltr', speechLang: 'ru-RU' }
];

var WOERTER = [
  { de: 'Pause', en: 'Break', ar: 'استراحة', uk: 'Перерва', tr: 'Teneffüs', ru: 'Перерыв' },
  { de: 'Toilette', en: 'Toilet', ar: 'الحمام', uk: 'Туалет', tr: 'Tuvalet', ru: 'Туалет' },
  { de: 'Hilfe', en: 'Help', ar: 'مساعدة', uk: 'Допомога', tr: 'Yardım', ru: 'Помощь' },
  { de: 'Hunger', en: 'Hunger', ar: 'جوع', uk: 'Голод', tr: 'Açlık', ru: 'Голод' },
  { de: 'Durst', en: 'Thirst', ar: 'عطش', uk: 'Спрага', tr: 'Susuzluk', ru: 'Жажда' },
  { de: 'Ich verstehe nicht', en: 'I don\'t understand', ar: 'لا أفهم', uk: 'Я не розумію', tr: 'Anlamıyorum', ru: 'Я не понимаю' },
  { de: 'Ich brauche eine Pause', en: 'I need a break', ar: 'أحتاج إلى استراحة', uk: 'Мені потрібна перерва', tr: 'Bir molaya ihtiyacım var', ru: 'Мне нужен перерыв' },
  { de: 'Lehrer/Lehrerin', en: 'Teacher', ar: 'معلم / معلمة', uk: 'Вчитель / Вчителька', tr: 'Öğretmen', ru: 'Учитель / Учительница' },
  { de: 'Freund/Freundin', en: 'Friend', ar: 'صديق / صديقة', uk: 'Друг / Подруга', tr: 'Arkadaş', ru: 'Друг / Подруга' },
  { de: 'Ja', en: 'Yes', ar: 'نعم', uk: 'Так', tr: 'Evet', ru: 'Да' },
  { de: 'Nein', en: 'No', ar: 'لا', uk: 'Ні', tr: 'Hayır', ru: 'Нет' },
  { de: 'Bitte', en: 'Please', ar: 'من فضلك', uk: 'Будь ласка', tr: 'Lütfen', ru: 'Пожалуйста' },
  { de: 'Danke', en: 'Thank you', ar: 'شكراً', uk: 'Дякую', tr: 'Teşekkürler', ru: 'Спасибо' },
  { de: 'Wo ist...?', en: 'Where is...?', ar: 'أين...؟', uk: 'Де...?', tr: '...nerede?', ru: 'Где...?' },
  { de: 'Mir geht es gut', en: 'I\'m fine', ar: 'أنا بخير', uk: 'Я почуваюся добре', tr: 'İyiyim', ru: 'Я в порядке' },
  { de: 'Mir geht es nicht gut', en: 'I\'m not okay', ar: 'أنا لست بخير', uk: 'Мені не дуже добре', tr: 'İyi değilim', ru: 'Мне нехорошо' },
  { de: 'Ich bin müde', en: 'I am tired', ar: 'أنا متعب', uk: 'Я втомився/-лася', tr: 'Yorgunum', ru: 'Я устал(а)' },
  { de: 'Krank', en: 'Sick', ar: 'مريض', uk: 'Хворий/-а', tr: 'Hasta', ru: 'Болен/Больна' },
  { de: 'Schmerzen', en: 'Pain', ar: 'ألم', uk: 'Біль', tr: 'Ağrı', ru: 'Боль' },
  { de: 'Zuhause', en: 'Home', ar: 'المنزل', uk: 'Дім', tr: 'Ev', ru: 'Дом' },
  { de: 'Schule', en: 'School', ar: 'مدرسة', uk: 'Школа', tr: 'Okul', ru: 'Школа' }
];

var aktuelleSprache = SPRACHEN[0];
var ttsVerfuegbar = ('speechSynthesis' in window);

function sprachenRendern(){
  var row = document.getElementById('sprachen-row');
  row.innerHTML = '';
  SPRACHEN.forEach(function(sprache){
    var btn = document.createElement('button');
    btn.className = 'sprachen-btn' + (sprache.code === aktuelleSprache.code ? ' aktiv' : '');
    btn.innerHTML = '<span class="flagge">' + sprache.flagge + '</span><span>' + sprache.label + '</span>';
    btn.addEventListener('click', function(){ spracheWaehlen(sprache.code); });
    row.appendChild(btn);
  });
}

function spracheWaehlen(code){
  aktuelleSprache = SPRACHEN.filter(function(s){ return s.code === code; })[0];
  sprachenRendern();
  woerterRendern();
}

function vorlesen(text, sprache, btn){
  if (!ttsVerfuegbar) return;
  try {
    window.speechSynthesis.cancel();
    var utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = sprache.speechLang;
    btn.classList.add('spricht');
    utterance.onend = function(){ btn.classList.remove('spricht'); };
    utterance.onerror = function(){ btn.classList.remove('spricht'); };
    window.speechSynthesis.speak(utterance);
  } catch(e) {}
}

function woerterRendern(){
  var liste = document.getElementById('woerter-liste');
  liste.innerHTML = '';
  WOERTER.forEach(function(wort){
    var uebersetzung = wort[aktuelleSprache.code];

    var karte = document.createElement('div');
    karte.className = 'wort-karte';

    var spalte = document.createElement('div');
    spalte.className = 'wort-spalte';
    var de = document.createElement('div');
    de.className = 'wort-de';
    de.textContent = wort.de;
    var uebersetzungEl = document.createElement('div');
    uebersetzungEl.className = 'wort-uebersetzung';
    uebersetzungEl.setAttribute('dir', aktuelleSprache.dir);
    uebersetzungEl.setAttribute('lang', aktuelleSprache.code);
    uebersetzungEl.textContent = uebersetzung;
    spalte.appendChild(de);
    spalte.appendChild(uebersetzungEl);
    karte.appendChild(spalte);

    if (ttsVerfuegbar) {
      var sprichBtn = document.createElement('button');
      sprichBtn.className = 'sprich-btn';
      sprichBtn.setAttribute('aria-label', 'Vorlesen');
      sprichBtn.textContent = '🔊';
      sprichBtn.addEventListener('click', function(){ vorlesen(uebersetzung, aktuelleSprache, sprichBtn); });
      karte.appendChild(sprichBtn);
    }

    liste.appendChild(karte);
  });
}

sprachenRendern();
woerterRendern();
</script>

</body>
</html>
