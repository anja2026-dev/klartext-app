<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KLARTEXT · Reizfilter-Regler</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<script>(function(){try{if(sessionStorage.getItem('klartext_login')!=='true')window.location.href='KLARTEXT_Login.html';}catch(e){}})();</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--m:#1B3A4B;--acc:#3B8A68;--paper:#F5F0E8;--surface:#fff;--border:#DDD8CE;--ink:#2D2D2D;--muted:#7A7060;}
body{font-family:"DM Sans",sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;}
.header{background:var(--m);height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 clamp(1rem,4vw,2rem);border-bottom:3px solid var(--acc);position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:.6rem;text-decoration:none;}
.logo-mark{width:32px;height:32px;border:2px solid var(--acc);border-radius:6px;display:flex;align-items:center;justify-content:center;}
.logo-mark span{font-family:"Playfair Display",serif;font-size:12px;font-weight:700;color:#fff;}
.logo-text{font-family:"Playfair Display",serif;font-size:1rem;font-weight:700;color:#fff;}
.back-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.3rem .7rem;border:1.5px solid var(--acc);border-radius:20px;color:var(--acc);font-size:.7rem;font-weight:700;text-decoration:none;}
.hero{background:linear-gradient(135deg,var(--m) 0%,#2A5570 100%);padding:1.75rem clamp(1rem,4vw,2rem);text-align:center;}
.hero-icon{font-size:2.2rem;margin-bottom:.4rem;}
.hero-titel{font-family:"Playfair Display",serif;font-size:clamp(1.3rem,3vw,1.8rem);font-weight:700;color:#fff;margin-bottom:.3rem;}
.hero-sub{font-size:.82rem;color:rgba(255,255,255,.6);max-width:560px;margin:0 auto;}
.shell{max-width:620px;margin:0 auto;padding:1.75rem clamp(.75rem,3vw,2rem) 5rem;transition:background 1s ease;border-radius:0 0 28px 28px;}

/* Reizfilter-Karte */
.reizfilter-card{background:rgba(255,255,255,.94);border:2px solid var(--border);border-radius:24px;padding:2.2rem 1.6rem 1.8rem;box-shadow:0 4px 20px rgba(27,58,75,.1);text-align:center;}
.zustand-chip{display:inline-flex;align-items:center;justify-content:center;width:104px;height:104px;border-radius:50%;margin:0 auto 1rem;transition:background-color .5s ease;}
.gesicht{font-size:3.4rem;line-height:1;}
.stufe-label{font-family:"Playfair Display",serif;font-size:1.3rem;font-weight:700;color:var(--m);margin-bottom:.3rem;}
.stufe-text{font-size:.92rem;color:var(--muted);margin-bottom:1.8rem;min-height:1.3em;}

.slider-wrap{margin-bottom:.5rem;}
.regler{-webkit-appearance:none;appearance:none;width:100%;height:14px;border-radius:10px;background:linear-gradient(90deg,#6EC6A0 0%,#C9D96A 25%,#E8C34D 50%,#E8934D 75%,#D9483D 100%);outline:none;cursor:pointer;}
.regler::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:36px;height:36px;border-radius:50%;background:#fff;border:4px solid var(--m);box-shadow:0 2px 8px rgba(27,58,75,.35);cursor:pointer;}
.regler::-moz-range-thumb{width:36px;height:36px;border-radius:50%;background:#fff;border:4px solid var(--m);box-shadow:0 2px 8px rgba(27,58,75,.35);cursor:pointer;border-width:4px;}
.regler::-moz-range-track{height:14px;border-radius:10px;background:linear-gradient(90deg,#6EC6A0 0%,#C9D96A 25%,#E8C34D 50%,#E8934D 75%,#D9483D 100%);}
.slider-endpunkte{display:flex;justify-content:space-between;font-size:.72rem;font-weight:700;color:var(--muted);margin-top:.5rem;}

.hinweis-box{display:none;text-align:left;background:#FFF4E0;border-radius:14px;padding:1rem 1.1rem;margin-top:1.6rem;}
.hinweis-box.zeigen{display:block;}
.hinweis-titel{font-size:.85rem;font-weight:700;color:#8A5A00;margin-bottom:.5rem;}
.hinweis-liste{list-style:none;display:flex;flex-direction:column;gap:.4rem;}
.hinweis-liste li{font-size:.85rem;color:#6B4600;line-height:1.4;padding-left:1.2rem;position:relative;}
.hinweis-liste li::before{content:"·";position:absolute;left:.3rem;font-weight:900;}

.zuruecksetzen-row{display:flex;justify-content:center;margin-top:1.8rem;}
.zuruecksetzen-btn{display:inline-flex;align-items:center;gap:.4rem;padding:.7rem 1.6rem;border:none;border-radius:22px;background:var(--m);color:#fff;font-weight:700;font-size:.86rem;cursor:pointer;font-family:inherit;}
.zuruecksetzen-btn:hover{opacity:.9;}
</style>
</head>
<body>

<header class="header">
  <a class="logo" href="KLARTEXT_Spiele.html">
    <div class="logo-mark"><span>K</span></div>
    <div class="logo-text">KLARTEXT · Spiele</div>
  </a>
  <a class="back-btn" href="KLARTEXT_Spiele.html">← Spiele</a>
</header>

<div class="hero">
  <div class="hero-icon">🎚️</div>
  <h1 class="hero-titel">Reizfilter-Regler</h1>
  <p class="hero-sub">Zeig, wie viel gerade los ist — ohne Bewertung, ohne Richtig oder Falsch. Nur für diesen Moment.</p>
</div>

<div class="shell" id="shell">
  <div class="reizfilter-card">
    <div class="zustand-chip" id="zustand-chip"><span class="gesicht" id="gesicht"></span></div>
    <div class="stufe-label" id="stufe-label"></div>
    <div class="stufe-text" id="stufe-text"></div>

    <div class="slider-wrap">
      <input type="range" min="0" max="4" step="1" value="2" class="regler" id="regler" aria-label="Wie viel ist gerade los?">
      <div class="slider-endpunkte">
        <span>Ruhig</span>
        <span>Viel zu viel</span>
      </div>
    </div>

    <div class="hinweis-box" id="hinweis-box">
      <div class="hinweis-titel">💡 Vielleicht hilft:</div>
      <ul class="hinweis-liste">
        <li>Kurz rausgehen</li>
        <li>Kopfhörer aufsetzen</li>
        <li>An einen ruhigeren Ort gehen</li>
      </ul>
    </div>

    <div class="zuruecksetzen-row">
      <button class="zuruecksetzen-btn" onclick="reglerZuruecksetzen()">↺ Zurücksetzen</button>
    </div>
  </div>
</div>

<script>
var STUFEN = [
  { emoji: '😌', label: 'Ruhig',        text: 'Alles gut gerade',            chip: '#6EC6A0', wash: 'linear-gradient(180deg,#DCF2E7 0%,#F5F0E8 65%)', hinweis: false },
  { emoji: '🙂', label: 'Locker',       text: 'Es fühlt sich okay an',       chip: '#C9D96A', wash: 'linear-gradient(180deg,#EAF2D2 0%,#F5F0E8 65%)', hinweis: false },
  { emoji: '😐', label: 'Geht so',      text: 'Es ist gerade ein bisschen viel', chip: '#E8C34D', wash: 'linear-gradient(180deg,#FBF0D2 0%,#F5F0E8 65%)', hinweis: false },
  { emoji: '😕', label: 'Viel',         text: 'Es wird gerade eng',          chip: '#E8934D', wash: 'linear-gradient(180deg,#FBE2CB 0%,#F5F0E8 65%)', hinweis: true },
  { emoji: '😖', label: 'Viel zu viel', text: 'Gerade ist es echt viel',     chip: '#D9483D', wash: 'linear-gradient(180deg,#F9D4CE 0%,#F5F0E8 65%)', hinweis: true }
];

var regler = document.getElementById('regler');
var shell = document.getElementById('shell');

function reglerAktualisieren(){
  var stufe = STUFEN[parseInt(regler.value, 10)];

  document.getElementById('gesicht').textContent = stufe.emoji;
  document.getElementById('stufe-label').textContent = stufe.label;
  document.getElementById('stufe-text').textContent = stufe.text;
  document.getElementById('zustand-chip').style.backgroundColor = stufe.chip;
  shell.style.background = stufe.wash;

  document.getElementById('hinweis-box').classList.toggle('zeigen', stufe.hinweis);
}

function reglerZuruecksetzen(){
  regler.value = 2;
  reglerAktualisieren();
}

regler.addEventListener('input', reglerAktualisieren);
reglerAktualisieren();
</script>

</body>
</html>
