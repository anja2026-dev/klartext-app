<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KLARTEXT · Richtig oder Komisch?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--m:#1B3A4B;--acc:#6EC6A0;--paper:#F5F0E8;--surface:#fff;--border:#DDD8CE;--ink:#2D2D2D;--muted:#7A7060;}
body{font-family:"DM Sans",sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;}
.header{background:var(--m);height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 clamp(1rem,4vw,2rem);border-bottom:3px solid var(--acc);position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:.6rem;text-decoration:none;}
.logo-mark{width:32px;height:32px;border:2px solid var(--acc);border-radius:6px;display:flex;align-items:center;justify-content:center;}
.logo-mark span{font-family:"Playfair Display",serif;font-size:12px;font-weight:700;color:#fff;}
.logo-text{font-family:"Playfair Display",serif;font-size:1rem;font-weight:700;color:#fff;}
.back-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.3rem .7rem;border:1.5px solid var(--acc);border-radius:20px;color:var(--acc);font-size:.7rem;font-weight:700;text-decoration:none;}
.hero{background:linear-gradient(135deg,var(--m) 0%,#2A5570 100%);padding:1.75rem clamp(1rem,4vw,2rem);text-align:center;}
.hero-icon{font-size:2.2rem;margin-bottom:.4rem;}
.hero-titel{font-family:"Playfair Display",serif;font-size:clamp(1.3rem,3vw,1.8rem);font-weight:700;color:#fff;margin-bottom:.3rem;}
.hero-sub{font-size:.82rem;color:rgba(255,255,255,.6);max-width:560px;margin:0 auto;}
.shell{max-width:620px;margin:0 auto;padding:1.75rem clamp(.75rem,3vw,2rem) 5rem;}

.fortschritt-wrap{margin-bottom:1.2rem;}
.fortschritt-label{font-size:.74rem;font-weight:700;color:var(--muted);margin-bottom:.4rem;text-align:center;}
.fortschritt-bar{height:10px;background:var(--border);border-radius:20px;overflow:hidden;}
.fortschritt-fill{height:100%;background:var(--acc);border-radius:20px;transition:width .3s ease;}

.karte-card{background:var(--surface);border:2px solid var(--border);border-radius:20px;padding:1.8rem 1.4rem;box-shadow:0 2px 10px rgba(27,58,75,.08);text-align:center;}
.situation-text{font-size:1.15rem;line-height:1.55;color:var(--ink);margin-bottom:1.5rem;min-height:3.4em;display:flex;align-items:center;justify-content:center;}
.antwort-row{display:flex;gap:.9rem;justify-content:center;flex-wrap:wrap;}
.antwort-grossbtn{display:flex;flex-direction:column;align-items:center;gap:.3rem;padding:1.1rem 1.6rem;border:2.5px solid var(--border);border-radius:18px;background:var(--surface);color:var(--ink);font-family:inherit;font-size:1rem;font-weight:700;cursor:pointer;transition:all .15s;min-width:130px;}
.antwort-grossbtn .emoji{font-size:1.8rem;}
.antwort-grossbtn:hover:not(:disabled){border-color:var(--acc);transform:translateY(-2px);}
.antwort-grossbtn:disabled{cursor:default;opacity:.55;}
.antwort-grossbtn.markiert{border-color:var(--acc);background:#EAF7F1;opacity:1;}

.feedback-box{margin-top:1.3rem;padding:.9rem 1.1rem;border-radius:14px;font-size:.9rem;line-height:1.5;display:none;}
.feedback-box.zeigen{display:block;}
.feedback-box.positiv{background:#EAF7F1;color:#2E7D47;}
.feedback-box.hinweis{background:#FFF4E0;color:#8A5A00;}

.ergebnis-card{background:var(--surface);border:2px solid var(--border);border-radius:20px;padding:1.8rem 1.5rem;text-align:center;box-shadow:0 2px 10px rgba(27,58,75,.08);}
.ergebnis-icon{font-size:2.4rem;margin-bottom:.6rem;}
.ergebnis-titel{font-family:"Playfair Display",serif;font-size:1.35rem;font-weight:700;color:var(--m);margin-bottom:.5rem;}
.ergebnis-punkte{font-size:1.05rem;font-weight:700;color:var(--ink);margin-bottom:1rem;}
.brainy-box{display:flex;gap:.7rem;align-items:center;background:var(--paper);border-radius:14px;padding:.8rem 1rem;margin-bottom:1.3rem;text-align:left;}
.brainy-emoji{font-size:1.6rem;flex-shrink:0;}
.brainy-msg{font-size:.85rem;color:var(--ink);line-height:1.5;}
.nochmal-btn{display:inline-flex;align-items:center;gap:.4rem;padding:.7rem 1.6rem;border:none;border-radius:22px;background:var(--acc);color:var(--m);font-weight:700;font-size:.9rem;cursor:pointer;font-family:inherit;}
.nochmal-btn:hover{opacity:.9;}
</style>
</head>
<body>

<header class="header">
  <a class="logo" href="KLARTEXT_Spiele.html">
    <div class="logo-mark"><span>K</span></div>
    <div class="logo-text">KLARTEXT · Spiele</div>
  </a>
  <a class="back-btn" href="KLARTEXT_Spiele.html">← Spiele</a>
</header>

<div class="hero">
  <div class="hero-icon">✅</div>
  <h1 class="hero-titel">Richtig oder Komisch?</h1>
  <p class="hero-sub">12 kurze Situationen — schätze ein, ob das Verhalten fair ist oder eher nicht.</p>
</div>

<div class="shell" id="shell">
  <div id="spiel-bereich">
    <div class="fortschritt-wrap">
      <div class="fortschritt-label" id="fortschritt-label">Karte 1 von 12</div>
      <div class="fortschritt-bar"><div class="fortschritt-fill" id="fortschritt-fill" style="width:8.33%;"></div></div>
    </div>

    <div class="karte-card">
      <div class="situation-text" id="situation-text"></div>
      <div class="antwort-row">
        <button class="antwort-grossbtn" id="btn-richtig" onclick="antwortWaehlen(true)"><span class="emoji">✅</span><span>Richtig</span></button>
        <button class="antwort-grossbtn" id="btn-komisch" onclick="antwortWaehlen(false)"><span class="emoji">😄</span><span>Komisch/Falsch</span></button>
      </div>
      <div class="feedback-box" id="feedback-box"></div>
    </div>
  </div>

  <div id="ergebnis-bereich" style="display:none;">
    <div class="ergebnis-card">
      <div class="ergebnis-icon">🏆</div>
      <div class="ergebnis-titel">Geschafft!</div>
      <div class="ergebnis-punkte" id="ergebnis-punkte"></div>
      <div class="brainy-box">
        <span class="brainy-emoji">🧠</span>
        <span class="brainy-msg" id="brainy-lob"></span>
      </div>
      <button class="nochmal-btn" onclick="nochmalSpielen()">↺ Nochmal spielen</button>
    </div>
  </div>
</div>

<script>
var SITUATIONEN = [
  { text: 'Ich bin wütend — ich atme erst tief durch, bevor ich etwas sage.', richtig: true },
  { text: 'Jemand hat eine andere Meinung als ich — ich schreie ihn an.', richtig: false },
  { text: 'Mein Kollege macht einen Fehler — ich erkläre ihm ruhig wie es geht.', richtig: true },
  { text: 'Ich komme zu spät — ich sage nichts und tue so als wäre nichts.', richtig: false },
  { text: 'Jemand ist traurig — ich frage ob ich helfen kann.', richtig: true },
  { text: 'Ich mag jemanden nicht — ich rede schlecht über ihn hinter seinem Rücken.', richtig: false },
  { text: 'Ich verstehe eine Aufgabe nicht — ich frage nach.', richtig: true },
  { text: 'Ich habe einen Fehler gemacht — ich gebe es zu und entschuldige mich.', richtig: true },
  { text: 'Jemand stört mich — ich stoße ihn weg ohne etwas zu sagen.', richtig: false },
  { text: 'Ich bin gestresst — ich gehe kurz raus und atme durch.', richtig: true },
  { text: 'Mein Chef kritisiert mich — ich höre zu und frage wie ich es besser machen kann.', richtig: true },
  { text: 'Ich bin neidisch auf jemanden — ich sage ihm das er blöd ist.', richtig: false }
];

var FEEDBACK_RICHTIG = 'Genau! Das ist fair und respektvoll 👍';
var FEEDBACK_KOMISCH = 'Hmm, das würde anderen wehtun. Aber du weißt es jetzt besser! 💡';

var aktuelleKarte = 0;
var punkte = 0;
var wartenAufNaechste = false;

function karteAnzeigen(){
  var situation = SITUATIONEN[aktuelleKarte];
  document.getElementById('fortschritt-label').textContent = 'Karte ' + (aktuelleKarte + 1) + ' von ' + SITUATIONEN.length;
  document.getElementById('fortschritt-fill').style.width = ((aktuelleKarte + 1) / SITUATIONEN.length * 100) + '%';
  document.getElementById('situation-text').textContent = situation.text;

  var btnRichtig = document.getElementById('btn-richtig');
  var btnKomisch = document.getElementById('btn-komisch');
  btnRichtig.disabled = false;
  btnKomisch.disabled = false;
  btnRichtig.classList.remove('markiert');
  btnKomisch.classList.remove('markiert');

  var feedback = document.getElementById('feedback-box');
  feedback.classList.remove('zeigen', 'positiv', 'hinweis');
  feedback.textContent = '';

  wartenAufNaechste = false;
}

function antwortWaehlen(nutzerSagtRichtig){
  if (wartenAufNaechste) return;
  wartenAufNaechste = true;

  var situation = SITUATIONEN[aktuelleKarte];
  document.getElementById('btn-richtig').disabled = true;
  document.getElementById('btn-komisch').disabled = true;
  (nutzerSagtRichtig ? document.getElementById('btn-richtig') : document.getElementById('btn-komisch')).classList.add('markiert');

  if (nutzerSagtRichtig === situation.richtig) punkte++;

  var feedback = document.getElementById('feedback-box');
  feedback.textContent = situation.richtig ? FEEDBACK_RICHTIG : FEEDBACK_KOMISCH;
  feedback.classList.add('zeigen', situation.richtig ? 'positiv' : 'hinweis');

  setTimeout(function(){
    if (aktuelleKarte < SITUATIONEN.length - 1) {
      aktuelleKarte++;
      karteAnzeigen();
    } else {
      ergebnisAnzeigen();
    }
  }, 1500);
}

function ergebnisAnzeigen(){
  document.getElementById('ergebnis-punkte').textContent = punkte + ' von ' + SITUATIONEN.length + ' richtig eingeschätzt';

  var lob;
  if (punkte >= 10) {
    lob = 'Fantastisch! Du hast ein super Gespür für respektvolles Verhalten! 🌟';
  } else if (punkte >= 6) {
    lob = 'Gut gemacht! Du bist schon richtig gut unterwegs 👍';
  } else {
    lob = 'Schön, dass du mitgemacht hast! Jede Situation ist eine gute Übung 💚';
  }
  document.getElementById('brainy-lob').textContent = lob;

  document.getElementById('spiel-bereich').style.display = 'none';
  document.getElementById('ergebnis-bereich').style.display = 'block';
}

function nochmalSpielen(){
  aktuelleKarte = 0;
  punkte = 0;
  document.getElementById('spiel-bereich').style.display = 'block';
  document.getElementById('ergebnis-bereich').style.display = 'none';
  karteAnzeigen();
}

karteAnzeigen();
</script>

</body>
</html>
