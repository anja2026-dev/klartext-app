<style>
html,body{margin:0;height:100%;font-family:"DM Sans",sans-serif;background:#F5F0E8;overflow:hidden;}

/* ── NEUE CHAT-NAV ── */
.chat-appnav{
  background:#1B3A4B;height:52px;display:flex;align-items:center;
  padding:0 1rem;gap:.25rem;position:sticky;top:0;z-index:200;
  border-bottom:3px solid #6EC6A0;flex-shrink:0;
}
.chat-appnav-logo{
  font-family:"Playfair Display",serif;font-size:.95rem;font-weight:700;
  color:#fff;margin-right:.75rem;white-space:nowrap;
}
.chat-appnav-links{display:flex;gap:.1rem;flex:1;overflow-x:auto;scrollbar-width:none;}
.chat-appnav-links::-webkit-scrollbar{display:none;}
.nav-link{
  color:rgba(255,255,255,.65);text-decoration:none;font-size:.72rem;font-weight:600;
  padding:.35rem .55rem;border-radius:8px;white-space:nowrap;transition:all .15s;
}
.nav-link:hover,.nav-link.aktiv{background:rgba(255,255,255,.12);color:#fff;}
.nav-link .nav-icon{margin-right:.2rem;}

/* ── LAYOUT ZWEI SPALTEN ── */
.chat-workspace{
  display:flex;height:calc(100vh - 52px);overflow:hidden;
}

/* Spalte Links: Chatliste */
.chat-sidebar{
  width:280px;flex-shrink:0;display:flex;flex-direction:column;
  background:#fff;border-right:1px solid #DDD8CE;
}
.chat-sidebar-header{
  padding:.75rem 1rem;border-bottom:1px solid #DDD8CE;display:flex;
  align-items:center;justify-content:space-between;background:#F5F0E8;
}
.chat-sidebar-titel{font-weight:700;color:#1B3A4B;font-size:.9rem;}
.chat-sidebar-neu{
  color:#1B3A4B;text-decoration:none;font-size:.75rem;font-weight:700;
  border:1.5px solid #1B3A4B;border-radius:14px;padding:.2rem .55rem;
}
.chat-sidebar-liste{flex:1;overflow-y:auto;}

/* Spalte Mitte: Chatfenster */
.chat-main{
  flex:1;display:flex;flex-direction:column;min-width:0;position:relative;
}
.chat-main-leer{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:#6A6878;font-size:.85rem;text-align:center;padding:2rem;gap:.5rem;

.chat-main-header{
  background:#F5F0E8;border-bottom:1px solid #DDD8CE;padding:.7rem 1rem;
  display:flex;align-items:center;gap:.75rem;flex-shrink:0;
}
.chat-main-avatar{
  width:36px;height:36px;border-radius:50%;display:flex;align-items:center;

}
.chat-main-name{font-weight:700;color:#1B3A4B;font-size:.9rem;}
.chat-verlauf{flex:1;overflow-y:auto;padding:.85rem;background:#F5F0E8;display:flex;flex-direction:column;gap:.4rem;}
.chat-eingabe-leiste{
  display:flex;align-items:flex-end;gap:.5rem;padding:.6rem .85rem;
  background:#fff;border-top:1px solid #DDD8CE;flex-shrink:0;
}
.chat-eingabe-feld{
  flex:1;border:1.5px solid #DDD8CE;border-radius:18px;padding:.55rem .9rem;

  background:#F5F0E8;
}
.chat-eingabe-feld:focus{outline:none;border-color:#1B3A4B;}
.chat-senden-btn{
  width:40px;height:40px;border-radius:50%;background:#1B3A4B;color:#fff;

.chat-senden-btn:disabled{background:#DDD8CE;cursor:not-allowed;}

/* Spalte Rechts: Brainy-Panel */
#brainy-panel{

/* ── BRAINY-STICKER PICKER ── */
.sticker-btn{
  width:40px;height:40px;border-radius:50%;background:#fff;color:#1B3A4B;
  border:1.5px solid #DDD8CE;font-size:1.2rem;cursor:pointer;flex-shrink:0;

.sticker-btn:hover{border-color:#6EC6A0;}
#sticker-picker{

  border-radius:14px;box-shadow:0 6px 20px rgba(0,0,0,.12);padding:.6rem;
  display:none;grid-template-columns:repeat(5,1fr);gap:.4rem;z-index:60;
}
#sticker-picker.offen{display:grid;}
#sticker-picker button{

  border-radius:10px;padding:.15rem;
}
#sticker-picker button:hover{background:#F5F0E8;}
.brainy-icon{width:100%;height:100%;display:block;}

#brainy-panel.hidden{display:none;}

#brainy-panel p{font-size:.75rem;color:#6A6878;margin:0;line-height:1.5;}
#brainy-chattext,#brainy-vorschlag{width:100%;height:110px;resize:vertical;font-family:inherit;font-size:.75rem;border:1.5px solid #DDD8CE;border-radius:6px;padding:.4rem;}

.brainy-wink{display:inline-block;animation:wink .6s ease-in-out 1;}

<script>
const aktuellerUser = chatAktuellerUser();
let conversationId = new URLSearchParams(window.location.search).get('cid') || null;
let chatNachrichtenListenerRef = null;
let chatAenderungListenerRef = null;
let chatAktuellerAndereId = null;
let chatAktuelleMitglieder = [];
let kinderNamenCache = {};

// Brainy-Sticker-Token in der Chatliste-Vorschau als lesbares Label statt Klammer-Code zeigen
const BRAINY_LABELS = { freu:'Freu 🧠', top:'Top! 🧠', denk:'Hmm… 🧠', erschoepft:'Erschöpft 🧠', cheer:'Du schaffst das! 🧠' };
function brainyVorschauText(text) {
  const re = /\[\[brainy:(freu|top|denk|erschoepft|cheer)\]\]/g;
  const ersetzt = text.replace(re, function(_, mood){ return BRAINY_LABELS[mood] || '🧠'; }).trim();
  return ersetzt || 'Noch keine Nachrichten';
}

// ── LEICHTGEWICHTIGER HINWEIS BEI NEUEN NACHRICHTEN (kein echtes Push, nur solange der Tab offen ist) ──
let chatLetzteTimestamps = {};
let chatErstesLaden = true;
let chatTitelFlackerInterval = null;
const chatUrsprungsTitel = document.title;

function chatNavBadgeSetzen(sichtbar) {
  const nav = document.querySelector('.gnav-link.aktiv');
  if (!nav) return;
  let dot = nav.querySelector('.gnav-badge-dot');
  if (sichtbar) {
    if (!dot) {
      dot = document.createElement('span');
      dot.className = 'gnav-badge-dot';
      dot.style.cssText = 'display:inline-block;width:7px;height:7px;border-radius:50%;background:#D9453C;margin-left:.3rem;vertical-align:middle;';
      nav.appendChild(dot);
    }
  } else if (dot) {
    dot.remove();
  }
}

function chatTitelFlackerStart(text) {
  if (chatTitelFlackerInterval) return;
  let umschalten = false;
  chatTitelFlackerInterval = setInterval(function(){
    document.title = umschalten ? chatUrsprungsTitel : text;
    umschalten = !umschalten;
  }, 1500);
}
function chatTitelFlackerStopp() {
  if (chatTitelFlackerInterval) { clearInterval(chatTitelFlackerInterval); chatTitelFlackerInterval = null; }
  document.title = chatUrsprungsTitel;
  chatNavBadgeSetzen(false);
}
window.addEventListener('focus', chatTitelFlackerStopp);
document.addEventListener('visibilitychange', function(){ if(!document.hidden) chatTitelFlackerStopp(); });

if ('Notification' in window && Notification.permission === 'default') {
  Notification.requestPermission();
}

function chatPruefeNeueNachrichten(conversations) {
  Object.keys(conversations||{}).forEach(function(cid){
    const conv = conversations[cid];
    const ts = conv.lastTimestamp || 0;
    const vorher = chatLetzteTimestamps[cid] || 0;
    if (!chatErstesLaden && ts > vorher && cid !== conversationId) {
      const name = chatKonversationsName(conv, kinderNamenCache);
      chatNavBadgeSetzen(true);
      if (document.hidden) {
        chatTitelFlackerStart('🔴 Neue Nachricht — KLARapp');
        if ('Notification' in window && Notification.permission === 'granted') {
          new Notification('KLARapp · ' + name, { body: brainyVorschauText(conv.lastMessage||'') });
        }
      }
    }
    chatLetzteTimestamps[cid] = ts;
  });
  chatErstesLaden = false;
}

// ── INGRA-AUSTAUSCH: automatische Mitgliedschaft für alle INGRA-Rollenvarianten ──
const INGRA_GRUPPE_ID = 'ingra-austausch';
const INGRA_ROLLEN = ['ingra','springer_ingra','pool_ingra','vertretung_ingra'];

function ingraGruppeSicherstellen() {
  if (!INGRA_ROLLEN.includes(aktuellerUser.role) || !aktuellerUser.id) return Promise.resolve();
  const ref = db.ref('conversations/' + INGRA_GRUPPE_ID);
  return ref.once('value').then(function(snapshot){
    const bereitsMitglied = snapshot.exists() && snapshot.val().members && snapshot.val().members[aktuellerUser.id];
    if (bereitsMitglied) return;
    const updates = {};
    updates['members/' + aktuellerUser.id] = true;
    updates['memberNames/' + aktuellerUser.id] = aktuellerUser.name;
    updates['memberRoles/' + aktuellerUser.id] = aktuellerUser.role;
    if (!snapshot.exists()) {
      updates['type'] = 'group';
      updates['groupName'] = '💬 INGRA-Austausch';
      updates['lastMessage'] = '';
      updates['lastTimestamp'] = Date.now();
    }
    return ref.update(updates);
  }).catch(function(){ /* stilles Scheitern hier ist ok, Chat funktioniert trotzdem weiter */ });
}

// ── CHATLISTE IN DER SIDEBAR LADEN ──
function renderSidebar(conversations) {
  chatPruefeNeueNachrichten(conversations);
  const liste = document.getElementById('sidebar-liste');
  const ids = Object.keys(conversations || {});
  if (ids.length === 0) {
    liste.innerHTML = '<div style="padding:1.5rem;text-align:center;font-size:.8rem;color:#6A6878;">Noch keine Chats.<br><a href="CHAT_New.html" style="color:#1B3A4B;font-weight:700;">＋ Neue Nachricht</a></div>';
    return;
  }
  ids.sort(function(a,b){ return (conversations[b].lastTimestamp||0)-(conversations[a].lastTimestamp||0); });

  liste.innerHTML = ids.map(function(cid) {
    const conv = conversations[cid];
    const name = chatKonversationsName(conv, kinderNamenCache);
    const initiale = (name||'?').charAt(0).toUpperCase();
    let avatarFarbe = '#6A6878';
    let avatarInhalt = initiale;
    if (conv.type === 'group') {
      avatarFarbe = '#6EC6A0';
      avatarInhalt = '🧠';
    } else {
      const andereId = Object.keys(conv.members||{}).find(function(id){return id!==aktuellerUser.id;});
      if (andereId && conv.memberRoles && conv.memberRoles[andereId]) {
        avatarFarbe = chatRollenfarbe(conv.memberRoles[andereId]);
      }
    }
    const istAktiv = cid === conversationId;
    const vorschauRoh = (conv.lastMessage||'').substring(0,45)||'Noch keine Nachrichten';
    const vorschau = brainyVorschauText(vorschauRoh);
    return `<div class="chat-eintrag${istAktiv?' aktiv-eintrag':''}" onclick="chatOeffnen('${cid}')" style="cursor:pointer;${istAktiv?'background:#EAF0F4;border-left:3px solid #1B3A4B;':''}">
      <div class="chat-avatar" style="background:${avatarFarbe};">${avatarInhalt}</div>
      <div class="chat-eintrag-inhalt">
        <div class="chat-eintrag-kopf">
          <span class="chat-eintrag-name">${name}</span>
          <span class="chat-eintrag-zeit">${chatFormatZeitKurz(conv.lastTimestamp)}</span>
        </div>
        <div class="chat-eintrag-vorschau">${vorschau}</div>
      </div>
    </div>`;
  }).join('');
}

// ── CHAT ÖFFNEN ──
function chatOeffnen(cid) {
  db.ref('conversations/' + cid).once('value').then(function(snapshot){
    const conv = snapshot.val();
    if (!conv || !conv.members || !conv.members[aktuellerUser.id]) {
      showToastFallback('Kein Zugriff auf diese Konversation.');
      return;
    }
    chatOeffnenInner(cid, conv);
  });
}

function showToastFallback(msg) {
  // einfacher Fallback, falls kein eigenes Toast-System vorhanden ist
  try { alert(msg); } catch(e) {}
}

function chatOeffnenInner(cid, conv) {
  chatTitelFlackerStopp();
  // alten Listener sauber abmelden
  if (chatNachrichtenListenerRef) {
    chatNachrichtenListenerRef.off('child_added');
    chatNachrichtenListenerRef = null;
  }
  if (chatAenderungListenerRef) {
    chatAenderungListenerRef.off('child_changed');
    chatAenderungListenerRef = null;
  }

  conversationId = cid;
  history.replaceState(null,'','CHAT_View.html?cid='+cid);

  document.getElementById('chat-leer').style.display = 'none';
  const chatAktiv = document.getElementById('chat-aktiv');
  chatAktiv.style.display = 'flex';

  // Mobile: Sidebar verstecken, Chat zeigen
  document.getElementById('chat-sidebar').classList.add('mobile-versteckt');
  document.getElementById('chat-main').classList.add('mobile-aktiv');

  // Aktiven Chat in der Liste markieren
  document.querySelectorAll('.chat-eintrag').forEach(function(el){
    el.style.background='';el.style.borderLeft='';
  });

  // Konversations-Header (conv liegt bereits vor, kein zweiter Request nötig)
  const name = chatKonversationsName(conv, kinderNamenCache);
  document.getElementById('chat-titel').textContent = name;
  const avatar = document.getElementById('chat-partner-avatar');
  if (conv.type === 'group') {
    // Gruppe: Lese-Status gilt als "gelesen", sobald IRGENDEIN anderes Mitglied gelesen hat
    chatAktuelleMitglieder = Object.keys(conv.members||{}).filter(function(id){ return id !== aktuellerUser.id; });
    chatAktuellerAndereId = null;
    avatar.textContent = '🧠';
    avatar.style.background = '#6EC6A0';
  } else {
    const andereId = Object.keys(conv.members||{}).find(function(id){return id!==aktuellerUser.id;});
    chatAktuellerAndereId = andereId || null;
    chatAktuelleMitglieder = andereId ? [andereId] : [];
    let farbe='#6A6878';
    if (andereId && conv.memberRoles && conv.memberRoles[andereId]) farbe=chatRollenfarbe(conv.memberRoles[andereId]);
    avatar.textContent = (name||'?').charAt(0).toUpperCase();
    avatar.style.background = farbe;
  }

  // Nachrichten laden
  const verlauf = document.getElementById('chat-verlauf');
  verlauf.innerHTML = '';
  let nachrichtenVorhanden = false;

  chatNachrichtenListenerRef = chatLadeNachrichtenLive(cid, function(messageId, nachricht){
    if (!nachrichtenVorhanden) {
      verlauf.innerHTML = '';
      nachrichtenVorhanden = true;
    }
    chatViewNachrichtAnhaengen(messageId, nachricht);
  });

  // Live-Update der Lesebestätigung, wenn readBy sich ändert (z.B. Partner öffnet den Chat)
  chatAenderungListenerRef = db.ref('messages/' + cid);
  chatAenderungListenerRef.on('child_changed', function(snapshot){
    chatAktualisiereLesestatus(snapshot.key, snapshot.val());
  });

  chatMarkiereAlleGelesen(cid);

  setTimeout(function(){
    if (!nachrichtenVorhanden) {
      verlauf.innerHTML='<div class="chat-verlauf-leer">Noch keine Nachrichten. Schreib die erste!</div>';
    }
  }, 800);
}

// Brainy-Sticker-Token im Text sicher als <svg><use> rendern (kein innerHTML mit Nutzertext)
function brainyRenderMessageText(container, text) {
  container.innerHTML = '';
  const re = /\[\[brainy:(freu|top|denk|erschoepft|cheer)\]\]/g;
  const svgNS = 'http://www.w3.org/2000/svg';
  let lastIndex = 0, match;
  while ((match = re.exec(text)) !== null) {
    if (match.index > lastIndex) container.appendChild(document.createTextNode(text.slice(lastIndex, match.index)));
    const svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('class', 'brainy-msg-sticker');
    const use = document.createElementNS(svgNS, 'use');
    use.setAttribute('href', '#brainy-' + match[1]);
    svg.appendChild(use);
    container.appendChild(svg);
    lastIndex = re.lastIndex;
  }
  if (lastIndex < text.length) container.appendChild(document.createTextNode(text.slice(lastIndex)));
}

// prüft, ob mind. ein anderes Mitglied (1:1-Partner oder irgendein Gruppenmitglied) gelesen hat
function chatIstGelesenVonAnderen(readBy) {
  if (!readBy || !chatAktuelleMitglieder.length) return false;
  return chatAktuelleMitglieder.some(function(id){ return !!readBy[id]; });
}

function chatViewNachrichtAnhaengen(messageId, nachricht) {
  const verlauf = document.getElementById('chat-verlauf');
  const istEigene = nachricht.senderId === aktuellerUser.id;
  const farbe = chatRollenfarbe(nachricht.senderRole);
  const zeile = document.createElement('div');
  zeile.className = 'chat-bubble-zeile '+(istEigene?'eigene':'fremde');
  zeile.dataset.msgId = messageId;
  const gelesenVomPartner = chatIstGelesenVonAnderen(nachricht.readBy);
  zeile.innerHTML = `<div class="chat-bubble" style="background:${farbe};">
    ${!istEigene?`<span class="chat-bubble-sender">${nachricht.senderName||nachricht.senderRole}</span>`:''}
    <div class="chat-bubble-text"></div>
    <div class="chat-bubble-zeit">${chatFormatZeit(nachricht.timestamp)}${istEigene?` <span class="lese-haken">${gelesenVomPartner?'✓✓':'✓'}</span>`:''}</div>
  </div>`;
  brainyRenderMessageText(zeile.querySelector('.chat-bubble-text'), nachricht.text||'');
  verlauf.appendChild(zeile);
  verlauf.scrollTop = verlauf.scrollHeight;
  if (!istEigene) chatMarkiereGelesen(conversationId, messageId);
}

// aktualisiert nur den Lese-Haken einer bereits gerenderten eigenen Nachricht
function chatAktualisiereLesestatus(messageId, nachricht) {
  if (nachricht.senderId !== aktuellerUser.id) return; // Haken nur bei eigenen Nachrichten relevant
  const zeile = document.querySelector('.chat-bubble-zeile[data-msg-id="'+messageId+'"]');
  if (!zeile) return;
  const haken = zeile.querySelector('.lese-haken');
  if (!haken) return;
  const gelesenVomPartner = chatIstGelesenVonAnderen(nachricht.readBy);
  haken.textContent = gelesenVomPartner ? '✓✓' : '✓';
  if (gelesenVomPartner) haken.classList.add('haken-gelesen');
}

// ── Sticker-Picker ──
function stickerPickerToggle() {
  document.getElementById('sticker-picker').classList.toggle('offen');
}
function brainyStickerEinfuegen(mood) {
  const feld = document.getElementById('chat-eingabe');
  const token = '[[brainy:'+mood+']] ';
  const start = feld.selectionStart ?? feld.value.length;
  const end = feld.selectionEnd ?? feld.value.length;
  feld.value = feld.value.slice(0,start) + token + feld.value.slice(end);
  feld.focus();
  feld.selectionStart = feld.selectionEnd = start + token.length;
  document.getElementById('sticker-picker').classList.remove('offen');
}
document.addEventListener('click', function(e){
  const picker = document.getElementById('sticker-picker');
  const btn = document.getElementById('sticker-toggle-btn');
  if (picker.classList.contains('offen') && !picker.contains(e.target) && e.target!==btn) {
    picker.classList.remove('offen');
  }
});

function chatViewSenden() {
  const feld = document.getElementById('chat-eingabe');
  const text = feld.value;
  if (!text||!text.trim()||!conversationId) return;
  const btn = document.getElementById('chat-senden-btn');
  btn.disabled = true;
  chatNachrichtSenden(conversationId, text).then(function(){
    feld.value='';feld.style.height='auto';btn.disabled=false;feld.focus();
  }).catch(function(){btn.disabled=false;});
}

// Enter sendet, Shift+Enter = Umbruch
document.getElementById('chat-eingabe').addEventListener('keydown', function(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();chatViewSenden();}
});
document.getElementById('chat-eingabe').addEventListener('input', function(){
  this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px';
});

// Initialisierung
ingraGruppeSicherstellen().then(function(){
  db.ref('children').once('value').then(function(snapshot){
    const kinder=snapshot.val()||{};
    Object.keys(kinder).forEach(function(cid){kinderNamenCache[cid]=kinder[cid].name;});
    chatLadeConversations(renderSidebar);
    if (conversationId) chatOeffnen(conversationId);
  }).catch(function(){
    chatLadeConversations(renderSidebar);
    if (conversationId) chatOeffnen(conversationId);
  });
});

window.addEventListener('beforeunload',function(){
  if(chatNachrichtenListenerRef) chatNachrichtenListenerRef.off('child_added');
  if(chatAenderungListenerRef) chatAenderungListenerRef.off('child_changed');
});
</script>
