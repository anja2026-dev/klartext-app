<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>TK-Landing</title>
  <style>
    body{font-family:Arial,sans-serif;background:#f7f7f7;margin:0;padding:20px;}
    section{background:white;padding:15px;margin-bottom:20px;border-radius:8px;box-shadow:0 0 4px rgba(0,0,0,.1);}
    button{padding:8px 12px;border-radius:6px;border:none;background:#e0e0e0;cursor:pointer;margin-right:6px;}
    button:hover{background:#d5d5d5;}
    .tk-buttons{margin-top:8px;}
    .tk-status{margin-top:8px;font-size:.85rem;font-weight:bold;}
    .tk-progress{width:100%;background:#eee;height:8px;border-radius:4px;margin-top:6px;}
    .tk-progress-bar{height:8px;border-radius:4px;}
    .tk-recruiting-info{font-size:.8rem;color:#555;margin-top:6px;padding:6px 0;border-top:1px solid #eee;}
    #recruiting-form{background:white;padding:15px;border-radius:8px;box-shadow:0 0 4px rgba(0,0,0,.1);margin-top:20px;}
    #recruiting-datum,#recruiting-notiz{width:100%;margin-bottom:10px;padding:8px;border-radius:6px;border:1px solid #ccc;box-sizing:border-box;font-family:inherit;}
    #recruiting-notiz{min-height:70px;resize:vertical;}
    #recruiting-speichern,#recruiting-abbrechen{padding:8px 12px;border-radius:6px;border:none;background:#e0e0e0;cursor:pointer;margin-right:10px;}
    #recruiting-speichern:hover{background:#1A8C8C;color:white;}
  </style>
</head>
<body>

<h1>TK-Landing</h1>

<section id="tk-kinderliste">
  <h2>Alle Kinder (TK)</h2>
  <div id="tk-kinder-output"></div>
</section>

<script>
var TK_BUTTONS = ['Bewerbung','Auswahl','Matching','Gespräch','Dokumente'];

function getTKColor(status) {
  var map = {
    'Bewerbung':'#1A8C8C','Auswahl':'#4CAF50','Matching':'#FFC107',
    'Gespräch':'#2196F3','Dokumente':'#9C27B0'
  };
  return map[status] || '#999';
}

function getTKProgress(status) {
  var map = {
    'Bewerbung':20,'Auswahl':40,'Matching':60,'Gespräch':80,'Dokumente':100
  };
  return map[status] || 0;
}

function loadChildrenTK() {
  try { return JSON.parse(localStorage.getItem('children') || '[]'); } catch(e) { return []; }
}

function saveChildrenTK(kinder) {
  localStorage.setItem('children', JSON.stringify(kinder));
}

function setTKStatus(kindId, status) {
  var kinder = loadChildrenTK();
  kinder.forEach(function(k) {
    if (String(k.id) === String(kindId)) {
      k.tkStatus = status;
    }
  });
  saveChildrenTK(kinder);
  renderChildrenTK();
}

function renderChildrenTK() {
  var kinder    = loadChildrenTK();
  var container = document.getElementById('tk-kinder-output');
  if (!kinder.length) {
    container.innerHTML = '<p style="color:#888;font-style:italic;">Noch keine Kinder angelegt. Bitte in der Kinderverwaltung anlegen.</p>';
    return;
  }

  container.innerHTML = '';
  kinder.forEach(function(k) {
    var div = document.createElement('div');
    div.setAttribute('data-kind-id', k.id);
    div.style.cssText = 'padding:8px 10px;border:1px solid #ddd;border-radius:6px;margin-bottom:8px;background:#fafafa;';
    div.innerHTML =
      '<strong>' + (k.name || '–') + '</strong>' +
      (k.klasse ? ' &nbsp;·&nbsp; Klasse ' + k.klasse : '');

    // Button-Container mit Phase-Highlighting
    var btnContainer = document.createElement('div');
    btnContainer.className = 'tk-buttons';
    TK_BUTTONS.forEach(function(label) {
      var phase = label.toLowerCase().replace('ä','a').replace('ü','u').replace('ö','o');
      var istAktiv = (k.tkStatus === label);
      var btn = document.createElement('button');
      btn.textContent = label;
      btn.setAttribute('data-kind-id', k.id);
      if (istAktiv) {
        btn.style.background = getTKColor(label);
        btn.style.color      = 'white';
      }
      btn.onclick = (function(id, lbl, ph) {
        return function() {
          setTKStatus(id, lbl);
          openRecruitingForm(id, ph);
        };
      })(k.id, label, phase);
      btnContainer.appendChild(btn);
    });

    // Status-Anzeige + Fortschrittsbalken
    var statusDiv = document.createElement('div');
    statusDiv.className = 'tk-status';
    statusDiv.style.color = getTKColor(k.tkStatus);
    statusDiv.textContent = 'Status: ' + (k.tkStatus || 'Noch kein Schritt gewählt');

    var progressWrap = document.createElement('div');
    progressWrap.className = 'tk-progress';
    var progressBar = document.createElement('div');
    progressBar.className = 'tk-progress-bar';
    progressBar.style.width  = getTKProgress(k.tkStatus) + '%';
    progressBar.style.background = getTKColor(k.tkStatus);
    progressWrap.appendChild(progressBar);

    div.appendChild(btnContainer);
    div.appendChild(statusDiv);
    div.appendChild(progressWrap);

    // Recruiting-Info-Block
    var infoDiv = document.createElement('div');
    infoDiv.className = 'tk-recruiting-info';
    var aktPhase = k.tkStatus
      ? k.tkStatus.toLowerCase().replace('ä','a').replace('ü','u').replace('ö','o')
      : null;
    var recruiting = k.recruiting && aktPhase && k.recruiting[aktPhase];
    if (recruiting && recruiting.datum) {
      infoDiv.innerHTML =
        '<strong>' + (PHASE_LABEL_MAP[aktPhase] || aktPhase) + ':</strong> ' +
        recruiting.datum +
        (recruiting.notiz ? ' – ' + recruiting.notiz : '');
    } else {
      infoDiv.textContent = 'Keine Recruiting-Daten hinterlegt';
    }
    div.appendChild(infoDiv);
    container.appendChild(div);
  });
}

document.addEventListener('DOMContentLoaded', renderChildrenTK);

// ── Recruiting-Basis ───────────────────────────────────────
var RECRUITING_PHASEN = ['bewerbung','auswahl','matching','gespraech','dokumente'];

function initRecruiting(child) {
  if (!child.recruiting) {
    child.recruiting = {};
    RECRUITING_PHASEN.forEach(function(p) {
      child.recruiting[p] = { datum: '', notiz: '' };
    });
  }
  return child;
}

function setRecruitingData(kindId, phase, datum, notiz) {
  var kinder = loadChildrenTK();
  kinder.forEach(function(k) {
    if (String(k.id) === String(kindId)) {
      initRecruiting(k);
      k.recruiting[phase].datum = datum;
      k.recruiting[phase].notiz = notiz;
    }
  });
  saveChildrenTK(kinder);
}

// ── Recruiting-Formular ────────────────────────────────────
var currentRecruitingId    = null;
var currentRecruitingPhase = null;

var PHASE_LABEL_MAP = {
  'bewerbung':'Bewerbung','auswahl':'Auswahl','matching':'Matching',
  'gespraech':'Gespräch','dokumente':'Dokumente'
};

function openRecruitingForm(kindId, phase) {
  currentRecruitingId    = kindId;
  currentRecruitingPhase = phase;
  document.getElementById('recruiting-form-title').textContent =
    'Recruiting – ' + (PHASE_LABEL_MAP[phase] || phase);
  var kinder = loadChildrenTK();
  var kind   = kinder.find(function(k) { return String(k.id) === String(kindId); });
  var daten  = (kind && kind.recruiting && kind.recruiting[phase]) || { datum:'', notiz:'' };
  document.getElementById('recruiting-datum').value = daten.datum || '';
  document.getElementById('recruiting-notiz').value = daten.notiz || '';
  document.getElementById('recruiting-form').style.display = 'block';
  document.getElementById('recruiting-form').scrollIntoView({ behavior:'smooth' });
}

function resetRecruitingForm() {
  document.getElementById('recruiting-datum').value = '';
  document.getElementById('recruiting-notiz').value = '';
  document.getElementById('recruiting-form').style.display = 'none';
  currentRecruitingId    = null;
  currentRecruitingPhase = null;
}

document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('recruiting-speichern').addEventListener('click', function() {
    var datum = document.getElementById('recruiting-datum').value;
    var notiz = document.getElementById('recruiting-notiz').value.trim();
    if (!datum) { alert('Bitte ein Datum auswählen.'); return; }
    if (!notiz) { alert('Bitte eine Notiz eingeben.'); return; }
    setRecruitingData(currentRecruitingId, currentRecruitingPhase, datum, notiz);
    resetRecruitingForm();
    renderChildrenTK();
  });

  document.getElementById('recruiting-abbrechen').addEventListener('click', function() {
    resetRecruitingForm();
  });
});
</script>

<section id="recruiting-form" style="display:none;">
  <h2 id="recruiting-form-title"></h2>
  <input id="recruiting-datum" type="date">
  <textarea id="recruiting-notiz" placeholder="Notiz zur Phase"></textarea>
  <button id="recruiting-speichern">Speichern</button>
  <button id="recruiting-abbrechen">Abbrechen</button>
</section>

</body>
</html>
