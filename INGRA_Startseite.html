<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>INGRA Startseite</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --navy:#1B3A4B;--acc:#6EC6A0;--paper:#F5F0E8;--surface:#fff;
      --border:#DDD8CE;--muted:#6A6878;--ink:#2D2D2D;
      --r-sm:8px;--r-md:14px;--shadow:0 2px 8px rgba(27,58,75,.10);
    }
    body{font-family:"DM Sans",Arial,sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;}

    /* Header */
    .kt-header{
      background:var(--navy);height:56px;display:flex;align-items:center;
      justify-content:space-between;padding:0 1.25rem;position:sticky;top:0;z-index:100;
      border-bottom:3px solid var(--acc);
    }
    .kt-logo{font-family:"Playfair Display",serif;font-size:1.05rem;font-weight:700;color:#fff;}
    .kt-logo span{color:var(--acc);font-size:.62rem;display:block;font-family:"DM Sans",sans-serif;font-weight:400;}
    .back-btn{color:var(--acc);text-decoration:none;font-size:.72rem;font-weight:700;border:1.5px solid var(--acc);border-radius:20px;padding:.25rem .65rem;}

    main{max-width:900px;margin:0 auto;padding:1.4rem 1rem 4rem;}

    /* Karten */
    .karte{background:var(--surface);border-radius:var(--r-md);padding:1.2rem 1.3rem;margin-bottom:1.1rem;box-shadow:var(--shadow);}
    .karte h2{font-family:"Playfair Display",serif;font-size:1rem;color:var(--navy);margin-bottom:.9rem;display:flex;align-items:center;gap:.4rem;}

    /* Kinderkarte */
    .kind-karte{
      border:1.5px solid var(--border);border-radius:var(--r-sm);
      padding:.75rem 1rem;margin-bottom:.75rem;background:var(--paper);
    }
    .kind-karte-name{font-weight:700;font-size:.9rem;color:var(--navy);margin-bottom:.2rem;}
    .kind-karte-meta{font-size:.72rem;color:var(--muted);margin-bottom:.65rem;}
    .kind-karte-leer{font-size:.8rem;color:var(--muted);font-style:italic;}

    /* INGRA-Buttons */
    .ingra-buttons{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.5rem;}
    .ingra-btn{
      display:inline-flex;align-items:center;gap:.3rem;
      font-size:.72rem;font-weight:700;padding:.35rem .75rem;border-radius:16px;
      cursor:pointer;border:1.5px solid var(--navy);background:var(--surface);
      color:var(--navy);font-family:"DM Sans",sans-serif;
      box-shadow:var(--shadow);
    }
    .ingra-btn:hover{background:var(--navy);color:#fff;}

    /* Schnellzugriff */
    .sz-karte{
      border:1.5px solid var(--border);border-radius:var(--r-sm);
      padding:.75rem 1rem;margin-bottom:.75rem;background:var(--paper);
    }
    .sz-name{font-weight:700;font-size:.88rem;color:var(--navy);margin-bottom:.5rem;}
    .sz-grid{display:grid;grid-template-columns:1fr 1fr;gap:.3rem .8rem;}
    .sz-zeile{font-size:.76rem;color:var(--ink);}
    .sz-zeile .label{color:var(--muted);font-weight:500;}
    .sz-zeile .wert{color:var(--ink);}

    /* Navigation */
    .nav-bereich{
      padding:1.1rem 1.2rem;background:var(--paper);
      border-top:1.5px solid var(--border);border-radius:var(--r-md);
      margin-bottom:1.1rem;
    }
    .nav-label{font-size:.66rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.6rem;}
    .nav-buttons{display:flex;flex-wrap:wrap;gap:.5rem;}
    .nav-btn{
      display:inline-flex;align-items:center;gap:.4rem;
      padding:.45rem .9rem;border-radius:var(--r-sm);
      background:var(--surface);border:1.5px solid var(--border);
      color:var(--navy);font-size:.8rem;font-weight:700;
      font-family:"DM Sans",sans-serif;cursor:pointer;
    }
    .nav-btn:hover{border-color:var(--navy);}

    @media(max-width:520px){.sz-grid{grid-template-columns:1fr;}.ingra-buttons{gap:.3rem;}}
  </style>
</head>
<body>

<header class="kt-header">
  <div class="kt-logo">KLARTEXT <span>INGRA · Startseite</span></div>
  <a class="back-btn" href="DASHBOARD.html">← Dashboard</a>
</header>

<main>

  <!-- NAVIGATION -->
  <div class="nav-bereich">
    <div class="nav-label">Navigation</div>
    <div class="nav-buttons">
      <button class="nav-btn" onclick="navigateTo('dashboard')">🏠 Zurück zum Dashboard</button>
      <button class="nav-btn" onclick="navigateTo('tk')">🗂️ Zur TK-Landing</button>
      <button class="nav-btn" onclick="navigateTo('kinder')">👶 Zur Kinderverwaltung</button>
    </div>
  </div>

  <!-- KINDERLISTE -->
  <div class="karte" id="kinderliste">
    <h2>👶 Kinderliste</h2>
    <div id="kinder-container"></div>
  </div>

  <!-- SCHNELLZUGRIFF -->
  <div class="karte" id="schnellzugriff">
    <h2>⚡ Schnellzugriff</h2>
    <div id="schnellzugriff-container"></div>
  </div>

</main>

<script>
// ── Zentrale Kinderquelle ──────────────────────────────────
function ladeKinder() {
  try { return JSON.parse(localStorage.getItem('children')) || []; } catch(e) { return []; }
}

function ladeLS(key) {
  try { return JSON.parse(localStorage.getItem(key)) || []; } catch(e) { return []; }
}

// ── Kinderliste + INGRA-Buttons ────────────────────────────
var INGRA_MODULE = [
  { label:'📘 Tagesjournal',   href:'KLARTEXT_Tagesjournal.html' },
  { label:'🌡️ Barometer',      href:'KLARTEXT_Barometer.html' },
  { label:'📝 Notizblock',     href:'KLARTEXT_Notizblock.html' },
  { label:'✅ To-dos',         href:'KLARTEXT_Listen.html' },
  { label:'📋 Formulare',      href:'KLARTEXT_Formulare.html' },
  { label:'📌 Maßnahmen',      href:'FM_Massnahmen_DB.html' }
];

function renderKinderliste() {
  var kinder = ladeKinder();
  var container = document.getElementById('kinder-container');
  if (!kinder.length) {
    container.innerHTML = '<div class="kind-karte-leer">Noch keine Kinder angelegt. Bitte im TK-Bereich anlegen.</div>';
    return;
  }
  container.innerHTML = '';
  kinder.forEach(function(k) {
    var meta = [k.klasse ? 'Klasse ' + k.klasse : '', k.geburtsdatum || ''].filter(Boolean).join(' · ');
    var div = document.createElement('div');
    div.className = 'kind-karte';
    div.innerHTML =
      '<div class="kind-karte-name">' + esc(k.name) + '</div>' +
      (meta ? '<div class="kind-karte-meta">' + esc(meta) + '</div>' : '') +
      '<div class="ingra-buttons"></div>';
    var btnContainer = div.querySelector('.ingra-buttons');
    INGRA_MODULE.forEach(function(m) {
      var btn = document.createElement('button');
      btn.className = 'ingra-btn';
      btn.textContent = m.label;
      btn.onclick = function() {
        if (m.href) window.location.href = m.href;
      };
      btnContainer.appendChild(btn);
    });
    container.appendChild(div);
  });
}

// ── Schnellzugriff ─────────────────────────────────────────
function renderSchnellzugriff() {
  var kinder = ladeKinder();
  var container = document.getElementById('schnellzugriff-container');
  if (!kinder.length) {
    container.innerHTML = '<div class="kind-karte-leer">Keine Kinder vorhanden.</div>';
    return;
  }

  var journal    = ladeLS('kt_tagesjournal');
  var barometer  = ladeLS('kt_barometer');
  var notizen    = ladeLS('kt_notizen');
  var massnahmen = ladeLS('fm-actions');

  function letzter(liste, kindId, feld) {
    var treffer = liste.filter(function(e) { return e.childId === kindId || e.kindId === kindId; });
    if (!treffer.length) return 'Kein Eintrag';
    var letzter = treffer[treffer.length - 1];
    return letzter[feld] || 'Kein Eintrag';
  }

  container.innerHTML = '';
  kinder.forEach(function(k) {
    var div = document.createElement('div');
    div.className = 'sz-karte';
    div.innerHTML =
      '<div class="sz-name">' + esc(k.name) + '</div>' +
      '<div class="sz-grid">' +
        '<div class="sz-zeile"><span class="label">📘 Journal </span><span class="wert">' + esc(letzter(journal,    k.id, 'notiz'))       + '</span></div>' +
        '<div class="sz-zeile"><span class="label">🌡️ Barometer </span><span class="wert">' + esc(letzter(barometer, k.id, 'barometerFarbe')) + '</span></div>' +
        '<div class="sz-zeile"><span class="label">📝 Notiz </span><span class="wert">' + esc(letzter(notizen,    k.id, 'text'))         + '</span></div>' +
        '<div class="sz-zeile"><span class="label">📌 Maßnahme </span><span class="wert">' + esc(letzter(massnahmen, k.id, 'massnahme'))    + '</span></div>' +
      '</div>';
    container.appendChild(div);
  });
}

// ── Navigation (Platzhalter) ───────────────────────────────
function navigateTo(target) {
  // Platzhalter – Navigation wird später ergänzt
}

// ── Hilfsfunktion ─────────────────────────────────────────
function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Aliase für Kompatibilität mit anderen KLARTEXT-Modulen
function addIngraButtons() { renderKinderliste(); }
function initINGRAStart()  { renderKinderliste(); renderSchnellzugriff(); }

// ── Init ──────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  renderKinderliste();
  renderSchnellzugriff();
});
</script>
</body>
</html>
