<!DOCTYPE html>
<html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>HPG-Checkliste – Wochenbericht · KLARTEXT-Mentoring</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#F0EDE8;padding:14px;}
@media print{.no-print{display:none!important;}body{background:white;padding:0;}@page{margin:8mm;size:A4;}}
input[type=text],textarea{
  font-family:Arial,sans-serif;font-size:12px;padding:6px 7px;border:1.5px solid #ddd;border-radius:6px;color:#1a2e44;width:100%;background:white;
}
.krit-card{background:#F9F8F6;border-radius:10px;padding:14px 16px;margin-bottom:12px;border:1.5px solid #eee;}
.krit-bereich{font-size:11.5px;font-weight:800;color:#5D3A7A;text-transform:uppercase;letter-spacing:.4px;}
.krit-beschreibung{font-size:12.5px;color:#1a2e44;margin:3px 0 10px;}
.radio-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:10px;}
.radio-row label{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:700;color:#1a2e44;cursor:pointer;}
.radio-row input{width:auto;accent-color:#1a2e44;}
.krit-card.ans-ja{border-color:#1d9e75;background:#F3FBF7;}
.krit-card.ans-teilweise{border-color:#F1C40F;background:#FFFBEF;}
.krit-card.ans-nein{border-color:#E74C3C;background:#FDF3F2;}
#toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:#1a2e44;color:white;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;
  opacity:0;transition:opacity .25s ease, transform .25s ease;pointer-events:none;z-index:999;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
<script>(function(){try{if(sessionStorage.getItem('klartext_login')!=='true')window.location.href='KLARTEXT_Login.html';}catch(e){}})();</script>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1B3A4B">
</head>
<body>

<div style="max-width:820px;margin:0 auto 10px;display:flex;gap:8px;" class="no-print">
  <a href="KLARTEXT_Downloads.html#kd" style="display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;padding:7px 14px;border-radius:14px;background:white;border:1.5px solid #1a2e44;color:#1a2e44;text-decoration:none;">← Downloads</a>
</div>

<div style="max-width:820px;margin:0 auto;">

  <div style="background:#1a2e44;border-radius:12px;padding:20px 24px;margin-bottom:16px;display:flex;align-items:center;gap:16px;">
    <img src="brainy.png" style="width:52px;height:52px;object-fit:contain;" alt="">
    <div>
      <div style="font-size:19px;font-weight:900;color:white;">✅ HPG-Checkliste – Wochenbericht</div>
      <div style="font-size:12px;color:rgba(255,255,255,0.55);margin-top:3px;">Ausführliche Checkliste für Wochenberichte und Hilfeplanung</div>
    </div>
  </div>

  <div style="background:white;border-radius:14px;padding:20px;box-shadow:0 1px 10px rgba(0,0,0,0.08);margin-bottom:16px;">

    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px;">
      <div><label style="font-size:11px;font-weight:700;color:#5D3A7A;">Name</label><input type="text" id="f-name"></div>
      <div><label style="font-size:11px;font-weight:700;color:#5D3A7A;">Woche</label><input type="text" id="f-woche" placeholder="z.B. KW 29"></div>
      <div><label style="font-size:11px;font-weight:700;color:#5D3A7A;">Klasse</label><input type="text" id="f-klasse"></div>
    </div>

    <div id="kriterienListe"></div>

    <div class="no-print" style="display:flex;gap:10px;margin-top:8px;flex-wrap:wrap;">
      <button id="saveBtn" style="font-size:13px;font-weight:700;padding:10px 20px;border-radius:14px;background:#1a2e44;color:white;border:none;cursor:pointer;">💾 Speichern</button>
      <a href="HPG_Checkliste_Wochenbericht.pdf" download style="display:inline-flex;align-items:center;font-size:13px;font-weight:700;padding:10px 20px;border-radius:14px;background:#1d9e75;color:white;text-decoration:none;">📄 PDF herunterladen</a>
    </div>
  </div>

  <div style="text-align:center;font-size:10px;color:#999;margin-top:8px;">Formular ursprünglich entwickelt von Daniel Mann (INGRA) für KLARTEXT · Klar. Warm. Menschlich.</div>

</div>

<div id="toast">Gespeichert ✓</div>

<script>
const kriterien = [
  { bereich: "Eigenverantwortung", text: "Übernimmt Verantwortung für eigenes Handeln und Lernen" },
  { bereich: "Zuverlässigkeit", text: "Hält Absprachen, Termine und Vereinbarungen ein" },
  { bereich: "Selbstorganisation", text: "Nutzt Schulplaner, Checklisten oder Wochenplanung" },
  { bereich: "Arbeitsverhalten", text: "Beginnt Aufgaben selbstständig und beendet diese" },
  { bereich: "Konzentration", text: "Kann über einen angemessenen Zeitraum konzentriert arbeiten" },
  { bereich: "Motivation", text: "Zeigt Eigeninitiative und Interesse an Aufgaben" },
  { bereich: "Kommunikation", text: "Beteiligt sich aktiv an Gesprächen und formuliert Anliegen" },
  { bereich: "Konfliktfähigkeit", text: "Kann Konflikte angemessen ansprechen und lösen" },
  { bereich: "Teamfähigkeit", text: "Arbeitet konstruktiv mit anderen zusammen" },
  { bereich: "Soziale Teilhabe", text: "Pflegt Kontakte zu Gleichaltrigen" },
  { bereich: "Belastbarkeit", text: "Bleibt bei schwierigen Aufgaben handlungsfähig" },
  { bereich: "Berufsorientierung", text: "Beschäftigt sich mit Berufen, Praktika oder Ausbildung" },
  { bereich: "Zukunftsorientierung", text: "Formuliert eigene Ziele und Zukunftswünsche" },
  { bereich: "Reflexionsfähigkeit", text: "Kann Erfolge und Schwierigkeiten benennen" },
  { bereich: "Wochenziel", text: "Hat das vereinbarte Wochenziel verfolgt oder erreicht" }
];

function baueKriterienListe(){
  const container = document.getElementById("kriterienListe");
  let html = "";
  kriterien.forEach((k, i) => {
    html += `
      <div class="krit-card" id="karte-${i}">
        <div class="krit-bereich">${k.bereich}</div>
        <div class="krit-beschreibung">${k.text}</div>
        <div class="radio-row">
          <label><input type="radio" name="krit-${i}" value="ja"> Ja</label>
          <label><input type="radio" name="krit-${i}" value="teilweise"> Teilweise</label>
          <label><input type="radio" name="krit-${i}" value="nein"> Nein</label>
        </div>
        <input type="text" class="beispiel-input" data-index="${i}" placeholder="Konkretes Beispiel / Beobachtung der Woche">
      </div>`;
  });
  container.innerHTML = html;

  document.querySelectorAll('input[type=radio]').forEach(radio => {
    radio.addEventListener("change", () => faerbeKarte(radio));
  });
}

function faerbeKarte(radio){
  const idx = radio.name.split("-")[1];
  const karte = document.getElementById("karte-" + idx);
  karte.classList.remove("ans-ja","ans-teilweise","ans-nein");
  karte.classList.add("ans-" + radio.value);
}

function showToast(){
  const toast = document.getElementById("toast");
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 2000);
}

function sammleDaten(){
  const antworten = {};
  kriterien.forEach((k, i) => {
    const gewaehlt = document.querySelector(`input[name="krit-${i}"]:checked`);
    const beispiel = document.querySelector(`.beispiel-input[data-index="${i}"]`).value;
    antworten[i] = { bewertung: gewaehlt ? gewaehlt.value : "", beispiel };
  });
  return {
    kopf: {
      name: document.getElementById("f-name").value,
      woche: document.getElementById("f-woche").value,
      klasse: document.getElementById("f-klasse").value
    },
    antworten
  };
}

function ladeDaten(){
  let data;
  try{ data = JSON.parse(localStorage.getItem("hpg_checkliste_data")); }catch(e){ data = null; }
  if (!data) return;

  if (data.kopf){
    document.getElementById("f-name").value = data.kopf.name || "";
    document.getElementById("f-woche").value = data.kopf.woche || "";
    document.getElementById("f-klasse").value = data.kopf.klasse || "";
  }
  if (data.antworten){
    kriterien.forEach((k, i) => {
      const eintrag = data.antworten[i];
      if (!eintrag) return;
      if (eintrag.bewertung){
        const radio = document.querySelector(`input[name="krit-${i}"][value="${eintrag.bewertung}"]`);
        if (radio){ radio.checked = true; faerbeKarte(radio); }
      }
      if (eintrag.beispiel){
        document.querySelector(`.beispiel-input[data-index="${i}"]`).value = eintrag.beispiel;
      }
    });
  }
}

baueKriterienListe();
ladeDaten();

document.getElementById("saveBtn").addEventListener("click", () => {
  localStorage.setItem("hpg_checkliste_data", JSON.stringify(sammleDaten()));
  showToast();
});
</script>

</body>
</html>
