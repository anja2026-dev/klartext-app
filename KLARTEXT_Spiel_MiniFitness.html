<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KLARTEXT · Mini-Fitness</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<script>(function(){try{if(sessionStorage.getItem('klartext_login')!=='true')window.location.href='KLARTEXT_Login.html';}catch(e){}})();</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--m:#1B3A4B;--acc:#3B8A68;--paper:#F5F0E8;--surface:#fff;--border:#DDD8CE;--ink:#2D2D2D;--muted:#7A7060;}
body{font-family:"DM Sans",sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;}
.header{background:var(--m);height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 clamp(1rem,4vw,2rem);border-bottom:3px solid var(--acc);position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:.6rem;text-decoration:none;}
.logo-mark{width:32px;height:32px;border:2px solid var(--acc);border-radius:6px;display:flex;align-items:center;justify-content:center;}
.logo-mark span{font-family:"Playfair Display",serif;font-size:12px;font-weight:700;color:#fff;}
.logo-text{font-family:"Playfair Display",serif;font-size:1rem;font-weight:700;color:#fff;}
.back-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.3rem .7rem;border:1.5px solid var(--acc);border-radius:20px;color:var(--acc);font-size:.7rem;font-weight:700;text-decoration:none;}
.hero{background:linear-gradient(135deg,var(--m) 0%,#2A5570 100%);padding:1.75rem clamp(1rem,4vw,2rem);text-align:center;}
.hero-icon{font-size:2.2rem;margin-bottom:.4rem;}
.hero-titel{font-family:"Playfair Display",serif;font-size:clamp(1.3rem,3vw,1.8rem);font-weight:700;color:#fff;margin-bottom:.3rem;}
.hero-sub{font-size:.82rem;color:rgba(255,255,255,.6);max-width:560px;margin:0 auto;}
.shell{max-width:620px;margin:0 auto;padding:1.75rem clamp(.75rem,3vw,2rem) 5rem;transition:background 1s ease;border-radius:0 0 28px 28px;}

.fitness-card{background:rgba(255,255,255,.94);border:2px solid var(--border);border-radius:24px;padding:2.2rem 1.6rem 1.8rem;box-shadow:0 4px 20px rgba(27,58,75,.1);text-align:center;}

.ring-wrap{position:relative;width:150px;height:150px;margin:0 auto 1.1rem;}
.ring-svg{width:150px;height:150px;transform:rotate(-90deg);}
.ring-hintergrund{fill:none;stroke:var(--border);stroke-width:9;}
.ring-fortschritt{fill:none;stroke:#3B8A68;stroke-width:9;stroke-linecap:round;transition:stroke .3s ease;}
.ring-mitte{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ring-emoji{font-size:2.8rem;line-height:1;}
.ring-sekunden{font-size:.78rem;font-weight:700;color:var(--muted);margin-top:.15rem;}

.uebung-titel{font-family:"Playfair Display",serif;font-size:1.35rem;font-weight:700;color:var(--m);margin-bottom:.4rem;min-height:1.6rem;}
.uebung-text{font-size:.9rem;color:var(--muted);line-height:1.5;margin-bottom:1.6rem;min-height:2.7em;}

.start-btn{display:inline-flex;align-items:center;gap:.5rem;padding:.9rem 2.2rem;border:none;border-radius:26px;background:var(--m);color:#fff;font-weight:700;font-size:1rem;cursor:pointer;font-family:inherit;}
.start-btn:hover{opacity:.9;}

.zaehler{font-size:.82rem;color:var(--muted);margin-top:1.3rem;display:none;}
.zaehler.zeigen{display:block;}
.zaehler strong{color:var(--m);}
</style>
</head>
<body>

<header class="header">
  <a class="logo" href="KLARTEXT_Spiele.html">
    <div class="logo-mark"><span>K</span></div>
    <div class="logo-text">KLARTEXT · Spiele</div>
  </a>
  <a class="back-btn" href="KLARTEXT_Spiele.html">← Spiele</a>
</header>

<div class="hero">
  <div class="hero-icon">🤸</div>
  <h1 class="hero-titel">Mini-Fitness</h1>
  <p class="hero-sub">Kurze Bewegungspause zwischendurch — eine Übung, ein bisschen Zeit, dann weiter.</p>
</div>

<div class="shell" id="shell">
  <div class="fitness-card">
    <div class="ring-wrap">
      <svg class="ring-svg" viewBox="0 0 150 150">
        <circle class="ring-hintergrund" cx="75" cy="75" r="54"></circle>
        <circle class="ring-fortschritt" id="ring-fortschritt" cx="75" cy="75" r="54" stroke-dasharray="339.29" stroke-dashoffset="339.29"></circle>
      </svg>
      <div class="ring-mitte">
        <span class="ring-emoji" id="ring-emoji">🤸</span>
        <span class="ring-sekunden" id="ring-sekunden"></span>
      </div>
    </div>

    <div class="uebung-titel" id="uebung-titel">Bereit?</div>
    <div class="uebung-text" id="uebung-text">Drück auf Los geht's, dann zeigt dir Brainy eine Übung.</div>

    <button class="start-btn" id="aktion-btn" onclick="aktionAusloesen()">▶ Los geht's</button>

    <div class="zaehler" id="zaehler"></div>
  </div>
</div>

<script>
var UEBUNGEN = [
  { name: 'Kniebeugen',       text: 'Langsam in die Hocke gehen und wieder hochkommen. Rücken gerade! 5–10 × wiederholen.', farbe: '#1d9e75', emoji: '🦵', dauer: 20 },
  { name: 'Seitneigung',      text: 'Einen Arm nach oben strecken, zur Seite neigen. 10 Sekunden halten. Dann die andere Seite.', farbe: '#185fa5', emoji: '🙆', dauer: 20 },
  { name: 'Nacken kreisen',   text: 'Den Kopf langsam im Kreis drehen — erst links, dann rechts. 3 × jede Richtung.', farbe: '#c8860a', emoji: '🔄', dauer: 20 },
  { name: 'Zehenstand',       text: 'Auf die Zehenspitzen stellen, oben kurz halten, langsam absenken. 10 × wiederholen.', farbe: '#7b5ea7', emoji: '🦶', dauer: 20 },
  { name: 'Schulterdrücken',  text: 'Schultern hochziehen, kurz halten, loslassen. Dann Schultern nach hinten kreisen.', farbe: '#c8541a', emoji: '🤷', dauer: 15 },
  { name: 'Hampelmann',       text: 'Beine spreizen und zusammen, gleichzeitig Arme hoch und runter. 10 × rhythmisch.', farbe: '#c2185b', emoji: '🤸', dauer: 20 },
  { name: 'Rückenstrecker',   text: 'Auf dem Stuhl sitzen. Arme nach oben, in die Länge strecken. Tief einatmen.', farbe: '#1d9e75', emoji: '🙌', dauer: 15 },
  { name: 'Wechselschritt',   text: 'Im Stehen: linkes Knie heben, rechte Hand tippt es an — dann Seite wechseln. 10 ×', farbe: '#185fa5', emoji: '🚶', dauer: 20 }
];

var RING_UMFANG = 339.29;

var shell = document.getElementById('shell');
var ringFortschritt = document.getElementById('ring-fortschritt');
var ringEmoji = document.getElementById('ring-emoji');
var ringSekunden = document.getElementById('ring-sekunden');
var uebungTitel = document.getElementById('uebung-titel');
var uebungText = document.getElementById('uebung-text');
var aktionBtn = document.getElementById('aktion-btn');
var zaehlerEl = document.getElementById('zaehler');

var letzteUebung = null;
var timerId = null;
var geschafft = 0;

function zufaelligeUebung(){
  var auswahl = UEBUNGEN;
  if (letzteUebung && UEBUNGEN.length > 1) {
    auswahl = UEBUNGEN.filter(function(u){ return u.name !== letzteUebung.name; });
  }
  return auswahl[Math.floor(Math.random() * auswahl.length)];
}

function aktionAusloesen(){
  var uebung = zufaelligeUebung();
  letzteUebung = uebung;
  uebungStarten(uebung);
}

function uebungStarten(uebung){
  uebungTitel.textContent = uebung.name;
  uebungText.textContent = uebung.text;
  ringEmoji.textContent = uebung.emoji;
  ringFortschritt.style.stroke = uebung.farbe;
  shell.style.background = 'linear-gradient(180deg,' + uebung.farbe + '18 0%, ' + 'var(--paper) 65%)';

  aktionBtn.style.display = 'none';
  zaehlerEl.classList.remove('zeigen');

  var start = Date.now();
  var dauerMs = uebung.dauer * 1000;

  if (timerId) clearInterval(timerId);
  timerId = setInterval(function(){
    var vergangen = Date.now() - start;
    var restSek = Math.max(0, Math.ceil((dauerMs - vergangen) / 1000));
    var anteil = Math.min(1, vergangen / dauerMs);

    ringFortschritt.setAttribute('stroke-dashoffset', RING_UMFANG * (1 - anteil));
    ringSekunden.textContent = restSek > 0 ? restSek + ' s' : '';

    if (vergangen >= dauerMs) {
      clearInterval(timerId);
      timerId = null;
      uebungAbgeschlossen();
    }
  }, 100);
}

function uebungAbgeschlossen(){
  geschafft += 1;
  ringSekunden.textContent = '✓';

  aktionBtn.textContent = '▶ Nächste Übung';
  aktionBtn.style.display = 'inline-flex';

  zaehlerEl.innerHTML = 'Du hast heute schon <strong>' + geschafft + (geschafft === 1 ? ' Übung' : ' Übungen') + '</strong> gemacht.';
  zaehlerEl.classList.add('zeigen');
}
</script>

</body>
</html>
