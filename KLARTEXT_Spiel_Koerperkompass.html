<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KLARTEXT · Körper-Kompass</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<script>(function(){try{if(sessionStorage.getItem('klartext_login')!=='true')window.location.href='KLARTEXT_Login.html';}catch(e){}})();</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--m:#1B3A4B;--acc:#3B8A68;--paper:#F5F0E8;--surface:#fff;--border:#DDD8CE;--ink:#2D2D2D;--muted:#7A7060;}
body{font-family:"DM Sans",sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;}
.header{background:var(--m);height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 clamp(1rem,4vw,2rem);border-bottom:3px solid var(--acc);position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:.6rem;text-decoration:none;}
.logo-mark{width:32px;height:32px;border:2px solid var(--acc);border-radius:6px;display:flex;align-items:center;justify-content:center;}
.logo-mark span{font-family:"Playfair Display",serif;font-size:12px;font-weight:700;color:#fff;}
.logo-text{font-family:"Playfair Display",serif;font-size:1rem;font-weight:700;color:#fff;}
.back-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.3rem .7rem;border:1.5px solid var(--acc);border-radius:20px;color:var(--acc);font-size:.7rem;font-weight:700;text-decoration:none;}
.hero{background:linear-gradient(135deg,var(--m) 0%,#2A5570 100%);padding:1.75rem clamp(1rem,4vw,2rem);text-align:center;}
.hero-icon{font-size:2.2rem;margin-bottom:.4rem;}
.hero-titel{font-family:"Playfair Display",serif;font-size:clamp(1.3rem,3vw,1.8rem);font-weight:700;color:#fff;margin-bottom:.3rem;}
.hero-sub{font-size:.82rem;color:rgba(255,255,255,.6);max-width:560px;margin:0 auto;}
.shell{max-width:620px;margin:0 auto;padding:1.75rem clamp(.75rem,3vw,2rem) 5rem;}

.kompass-card{background:rgba(255,255,255,.94);border:2px solid var(--border);border-radius:24px;padding:1.8rem 1.6rem;box-shadow:0 4px 20px rgba(27,58,75,.1);text-align:center;}

.figur-wrap{display:flex;justify-content:center;margin-bottom:1.2rem;}
.figur-svg{width:100%;max-width:220px;height:auto;}
.region{fill:#EFE9DD;stroke:var(--m);stroke-width:2;cursor:pointer;transition:fill .25s ease;}
.region:hover{fill:#E1D9C6;}
.region.markiert:hover{filter:brightness(1.05);}
.region.aktiv-region{stroke:var(--acc);stroke-width:4;}
.figur-deko{fill:#EFE9DD;stroke:var(--m);stroke-width:2;pointer-events:none;}

.hinweis-anleitung{font-size:.85rem;color:var(--muted);margin-bottom:1.2rem;}

.panel{background:var(--paper);border:1.5px solid var(--border);border-radius:16px;padding:1.1rem 1.2rem;text-align:left;margin-bottom:1.2rem;}
.panel-titel{font-family:"Playfair Display",serif;font-size:1.1rem;font-weight:700;color:var(--m);margin-bottom:.7rem;}
.panel-label{font-size:.7rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem;}
.intensitaet-row{display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap;}
.intensitaet-btn{flex:1;min-width:80px;padding:.55rem .5rem;border:2px solid var(--border);border-radius:12px;background:#fff;color:var(--ink);font-family:inherit;font-size:.82rem;font-weight:700;cursor:pointer;transition:all .15s;}
.intensitaet-btn[data-stufe="leicht"].aktiv{background:#E8C34D;border-color:#E8C34D;color:#5A4300;}
.intensitaet-btn[data-stufe="mittel"].aktiv{background:#E8934D;border-color:#E8934D;color:#5A2E00;}
.intensitaet-btn[data-stufe="stark"].aktiv{background:#D9483D;border-color:#D9483D;color:#fff;}
.wort-row{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:.9rem;}
.wort-chip{padding:.4rem .85rem;border:1.5px solid var(--border);border-radius:20px;background:#fff;color:var(--muted);font-family:inherit;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .15s;}
.wort-chip.aktiv{background:var(--m);border-color:var(--m);color:#fff;}
.region-leeren-btn{background:none;border:none;color:var(--muted);font-size:.75rem;text-decoration:underline;cursor:pointer;font-family:inherit;padding:0;}

.zusammenfassung{text-align:left;margin-bottom:1.2rem;}
.zusammenfassung-titel{font-size:.7rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem;}
.zusammenfassung-liste{list-style:none;display:flex;flex-direction:column;gap:.4rem;}
.zusammenfassung-liste li{font-size:.85rem;color:var(--ink);line-height:1.4;padding:.4rem .7rem;border-radius:10px;background:var(--paper);border-left:4px solid var(--border);}
.zusammenfassung-liste li strong{color:var(--m);}
.zusammenfassung-leer{font-size:.82rem;color:var(--muted);font-style:italic;}

.zuruecksetzen-row{display:flex;justify-content:center;}
.zuruecksetzen-btn{display:inline-flex;align-items:center;gap:.4rem;padding:.7rem 1.6rem;border:none;border-radius:22px;background:var(--m);color:#fff;font-weight:700;font-size:.86rem;cursor:pointer;font-family:inherit;}
.zuruecksetzen-btn:hover{opacity:.9;}
</style>
</head>
<body>

<header class="header">
  <a class="logo" href="KLARTEXT_Spiele.html">
    <div class="logo-mark"><span>K</span></div>
    <div class="logo-text">KLARTEXT · Spiele</div>
  </a>
  <a class="back-btn" href="KLARTEXT_Spiele.html">← Spiele</a>
</header>

<div class="hero">
  <div class="hero-icon">🧭</div>
  <h1 class="hero-titel">Körper-Kompass</h1>
  <p class="hero-sub">Tipp an, wo im Körper sich gerade etwas bemerkbar macht — ohne Bewertung, ohne Richtig oder Falsch. Nur für diesen Moment.</p>
</div>

<div class="shell">
  <div class="kompass-card">
    <div class="figur-wrap">
      <svg class="figur-svg" viewBox="0 0 200 320" role="img" aria-label="Körperumriss zum Antippen">
        <!-- Arme (dekorativ, nicht antippbar) -->
        <rect class="figur-deko" x="16" y="88" width="26" height="88" rx="13"></rect>
        <rect class="figur-deko" x="158" y="88" width="26" height="88" rx="13"></rect>
        <!-- Hals (dekorativ) -->
        <rect class="figur-deko" x="88" y="66" width="24" height="16"></rect>

        <!-- Kopf -->
        <circle class="region" id="region-kopf" data-region="kopf" cx="100" cy="40" r="32"></circle>
        <!-- Schultern -->
        <rect class="region" id="region-schultern" data-region="schultern" x="44" y="82" width="112" height="24" rx="12"></rect>
        <!-- Brust/Herz -->
        <rect class="region" id="region-brust" data-region="brust" x="62" y="108" width="76" height="46" rx="14"></rect>
        <!-- Bauch -->
        <rect class="region" id="region-bauch" data-region="bauch" x="62" y="156" width="76" height="46" rx="14"></rect>
        <!-- Hände -->
        <circle class="region" id="region-hand-links" data-region="hand-links" cx="29" cy="188" r="18"></circle>
        <circle class="region" id="region-hand-rechts" data-region="hand-rechts" cx="171" cy="188" r="18"></circle>
        <!-- Beine -->
        <rect class="region" id="region-bein-links" data-region="bein-links" x="64" y="204" width="30" height="100" rx="15"></rect>
        <rect class="region" id="region-bein-rechts" data-region="bein-rechts" x="106" y="204" width="30" height="100" rx="15"></rect>
      </svg>
    </div>

    <p class="hinweis-anleitung" id="hinweis-anleitung">Tipp auf eine Körperstelle, um sie zu markieren.</p>

    <div class="panel" id="panel" style="display:none;">
      <div class="panel-titel" id="panel-titel"></div>

      <div class="panel-label">Wie stark?</div>
      <div class="intensitaet-row" id="intensitaet-row">
        <button type="button" class="intensitaet-btn" data-stufe="leicht" onclick="intensitaetSetzen('leicht')">leicht</button>
        <button type="button" class="intensitaet-btn" data-stufe="mittel" onclick="intensitaetSetzen('mittel')">mittel</button>
        <button type="button" class="intensitaet-btn" data-stufe="stark" onclick="intensitaetSetzen('stark')">stark</button>
      </div>

      <div class="panel-label">Wie fühlt es sich an? (optional)</div>
      <div class="wort-row" id="wort-row"></div>

      <button type="button" class="region-leeren-btn" onclick="regionLeeren()">Diese Stelle leeren</button>
    </div>

    <div class="zusammenfassung">
      <div class="zusammenfassung-titel">Übersicht</div>
      <ul class="zusammenfassung-liste" id="zusammenfassung-liste"></ul>
    </div>

    <div class="zuruecksetzen-row">
      <button class="zuruecksetzen-btn" onclick="allesZuruecksetzen()">↺ Zurücksetzen</button>
    </div>
  </div>
</div>

<script>
var REGIONEN = {
  'kopf':        'Kopf',
  'schultern':   'Schultern',
  'brust':       'Brust/Herz',
  'bauch':       'Bauch',
  'hand-links':  'Hand (links)',
  'hand-rechts': 'Hand (rechts)',
  'bein-links':  'Bein (links)',
  'bein-rechts': 'Bein (rechts)'
};
var INTENSITAET_FARBE = { leicht: '#E8C34D', mittel: '#E8934D', stark: '#D9483D' };
var INTENSITAET_LABEL = { leicht: 'leicht', mittel: 'mittel', stark: 'stark' };
var WOERTER = ['kribbelig', 'eng', 'schwer', 'zittrig', 'warm'];

var zustand = {};
Object.keys(REGIONEN).forEach(function(r){ zustand[r] = { intensitaet: null, woerter: [] }; });

var aktiveRegion = null;

function regionAntippen(region){
  aktiveRegion = region;
  document.querySelectorAll('.region').forEach(function(el){
    el.classList.toggle('aktiv-region', el.dataset.region === region);
  });
  panelRendern();
}

function panelRendern(){
  var panel = document.getElementById('panel');
  var anleitung = document.getElementById('hinweis-anleitung');
  if (!aktiveRegion) { panel.style.display = 'none'; anleitung.style.display = 'block'; return; }
  anleitung.style.display = 'none';
  panel.style.display = 'block';

  document.getElementById('panel-titel').textContent = REGIONEN[aktiveRegion];

  var z = zustand[aktiveRegion];
  document.querySelectorAll('#intensitaet-row .intensitaet-btn').forEach(function(btn){
    btn.classList.toggle('aktiv', btn.dataset.stufe === z.intensitaet);
  });

  var wortRow = document.getElementById('wort-row');
  wortRow.innerHTML = WOERTER.map(function(w){
    var aktiv = z.woerter.indexOf(w) !== -1;
    return '<button type="button" class="wort-chip' + (aktiv ? ' aktiv' : '') + '" onclick="wortUmschalten(\'' + w + '\')">' + w + '</button>';
  }).join('');
}

function intensitaetSetzen(stufe){
  if (!aktiveRegion) return;
  var z = zustand[aktiveRegion];
  z.intensitaet = (z.intensitaet === stufe) ? null : stufe;
  svgAktualisieren();
  panelRendern();
  zusammenfassungRendern();
}

function wortUmschalten(wort){
  if (!aktiveRegion) return;
  var z = zustand[aktiveRegion];
  var idx = z.woerter.indexOf(wort);
  if (idx === -1) z.woerter.push(wort); else z.woerter.splice(idx, 1);
  panelRendern();
  zusammenfassungRendern();
}

function regionLeeren(){
  if (!aktiveRegion) return;
  zustand[aktiveRegion] = { intensitaet: null, woerter: [] };
  svgAktualisieren();
  panelRendern();
  zusammenfassungRendern();
}

function svgAktualisieren(){
  Object.keys(zustand).forEach(function(r){
    var el = document.getElementById('region-' + r);
    if (!el) return;
    var stufe = zustand[r].intensitaet;
    el.style.fill = stufe ? INTENSITAET_FARBE[stufe] : '';
    el.classList.toggle('markiert', !!stufe);
  });
}

function zusammenfassungRendern(){
  var liste = document.getElementById('zusammenfassung-liste');
  var eintraege = Object.keys(REGIONEN).filter(function(r){ return zustand[r].intensitaet; });

  if (!eintraege.length) {
    liste.innerHTML = '<li class="zusammenfassung-leer" style="background:none;border:none;padding:0;">Noch keine Körperstelle markiert.</li>';
    return;
  }

  liste.innerHTML = eintraege.map(function(r){
    var z = zustand[r];
    var woerterText = z.woerter.length ? ' · ' + z.woerter.join(', ') : '';
    return '<li style="border-left-color:' + INTENSITAET_FARBE[z.intensitaet] + ';"><strong>' + REGIONEN[r] + ':</strong> ' + INTENSITAET_LABEL[z.intensitaet] + woerterText + '</li>';
  }).join('');
}

function allesZuruecksetzen(){
  Object.keys(REGIONEN).forEach(function(r){ zustand[r] = { intensitaet: null, woerter: [] }; });
  aktiveRegion = null;
  document.querySelectorAll('.region').forEach(function(el){ el.classList.remove('aktiv-region'); });
  svgAktualisieren();
  panelRendern();
  zusammenfassungRendern();
}

document.querySelectorAll('.region').forEach(function(el){
  el.addEventListener('click', function(){ regionAntippen(el.dataset.region); });
});

zusammenfassungRendern();
</script>

</body>
</html>
