<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KLARTEXT · Autismus verstehen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<script>(function(){try{if(sessionStorage.getItem('klartext_login')!=='true')window.location.href='KLARTEXT_Login.html';}catch(e){}})();</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--m:#1B3A4B;--acc:#3B8A68;--paper:#F5F0E8;--surface:#fff;--border:#DDD8CE;--ink:#2D2D2D;--muted:#7A7060;}
body{font-family:"DM Sans",sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;}
.header{background:var(--m);height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 clamp(1rem,4vw,2rem);border-bottom:3px solid var(--acc);position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:.6rem;text-decoration:none;}
.logo-mark{width:32px;height:32px;border:2px solid var(--acc);border-radius:6px;display:flex;align-items:center;justify-content:center;}
.logo-mark span{font-family:"Playfair Display",serif;font-size:12px;font-weight:700;color:#fff;}
.logo-text{font-family:"Playfair Display",serif;font-size:1rem;font-weight:700;color:#fff;}
.back-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.3rem .7rem;border:1.5px solid var(--acc);border-radius:20px;color:var(--acc);font-size:.7rem;font-weight:700;text-decoration:none;}
.hero{background:linear-gradient(135deg,var(--m) 0%,#2A5570 100%);padding:1.75rem clamp(1rem,4vw,2rem);text-align:center;}
.hero-icon{font-size:2.2rem;margin-bottom:.4rem;}
.hero-titel{font-family:"Playfair Display",serif;font-size:clamp(1.3rem,3vw,1.8rem);font-weight:700;color:#fff;margin-bottom:.3rem;}
.hero-sub{font-size:.82rem;color:rgba(255,255,255,.6);max-width:560px;margin:0 auto;}
.shell{max-width:620px;margin:0 auto;padding:1.75rem clamp(.75rem,3vw,2rem) 5rem;}

/* Szenario-Auswahl */
.szenario-grid{display:flex;flex-direction:column;gap:1rem;}
.szenario-kachel{display:flex;align-items:center;gap:1rem;background:var(--surface);border:2.5px solid var(--border);border-radius:18px;padding:1.2rem 1.4rem;cursor:pointer;text-align:left;font-family:inherit;transition:all .15s;}
.szenario-kachel:hover{border-color:var(--acc);transform:translateY(-2px);box-shadow:0 4px 16px rgba(27,58,75,.1);}
.szenario-emoji{font-size:2.2rem;flex-shrink:0;}
.szenario-titel{font-family:"Playfair Display",serif;font-size:1.1rem;font-weight:700;color:var(--m);margin-bottom:.2rem;}
.szenario-sub{font-size:.8rem;color:var(--muted);}

/* Spiel-Bereich */
.fortschritt-wrap{margin-bottom:1.2rem;}
.fortschritt-label{font-size:.74rem;font-weight:700;color:var(--muted);margin-bottom:.4rem;text-align:center;}
.fortschritt-bar{height:10px;background:var(--border);border-radius:20px;overflow:hidden;}
.fortschritt-fill{height:100%;background:var(--acc);border-radius:20px;transition:width .3s ease;}

.hinweis-banner{background:#FFF4E0;color:#8A5A00;border-radius:12px;padding:.7rem .9rem;font-size:.82rem;font-weight:600;text-align:center;margin-bottom:1rem;}

.szene-card{background:var(--surface);border:2px solid var(--border);border-radius:20px;padding:1.6rem 1.4rem;box-shadow:0 2px 10px rgba(27,58,75,.08);}
.szene-text{font-size:1.02rem;line-height:1.6;color:var(--ink);margin-bottom:1.3rem;}
.szene-text.konsequenz{font-style:italic;color:#2E6E52;}
.option-grid{display:flex;flex-direction:column;gap:.7rem;}
.option-btn{display:block;width:100%;text-align:left;padding:.9rem 1.1rem;border:2.5px solid var(--border);border-radius:16px;background:var(--surface);color:var(--ink);font-family:inherit;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .15s;line-height:1.4;}
.option-btn:hover{border-color:var(--acc);transform:translateY(-1px);}
.weiter-solo-btn{display:inline-flex;align-items:center;gap:.4rem;padding:.75rem 1.7rem;border:none;border-radius:22px;background:var(--m);color:#fff;font-weight:700;font-size:.9rem;cursor:pointer;font-family:inherit;}
.weiter-solo-row{display:flex;justify-content:center;}

/* Ende-Bildschirm */
.ende-card{background:var(--surface);border:2px solid var(--border);border-radius:20px;padding:1.8rem 1.5rem;text-align:center;box-shadow:0 2px 10px rgba(27,58,75,.08);}
.ende-sterne{font-size:1.8rem;margin-bottom:.7rem;}
.ende-text{font-size:.95rem;line-height:1.6;color:var(--ink);margin-bottom:1.1rem;}
.brainy-box{display:flex;gap:.7rem;align-items:center;background:var(--paper);border-radius:14px;padding:.8rem 1rem;margin-bottom:1.3rem;text-align:left;}
.brainy-emoji{font-size:1.6rem;flex-shrink:0;}
.brainy-msg{font-size:.85rem;color:var(--ink);line-height:1.5;}
.ende-knopf-row{display:flex;gap:.7rem;justify-content:center;flex-wrap:wrap;}
.ende-btn{display:inline-flex;align-items:center;gap:.4rem;padding:.7rem 1.5rem;border:none;border-radius:22px;font-weight:700;font-size:.86rem;cursor:pointer;font-family:inherit;}
.ende-btn.nochmal{background:var(--acc);color:#fff;}
.ende-btn.anderes{background:var(--surface);color:var(--m);border:1.5px solid var(--border);}
.ende-btn:hover{opacity:.9;}

.verwandtes-tool{display:block;text-align:center;margin-top:1.4rem;font-size:.78rem;color:var(--muted);text-decoration:none;}
.verwandtes-tool strong{color:var(--m);}
.verwandtes-tool:hover strong{color:var(--acc);}
</style>
</head>
<body>

<header class="header">
  <a class="logo" href="KLARTEXT_Spiele.html">
    <div class="logo-mark"><span>K</span></div>
    <div class="logo-text">KLARTEXT · Spiele</div>
  </a>
  <a class="back-btn" href="KLARTEXT_Spiele.html">← Spiele</a>
</header>

<div class="hero">
  <div class="hero-icon">🔵</div>
  <h1 class="hero-titel">Autismus verstehen</h1>
  <p class="hero-sub">Für INGRAs und Lehrkräfte: typische Situationen mit autistischen Kindern erkennen und passend reagieren.</p>
</div>

<div class="shell" id="shell">

  <div id="auswahl-bereich">
    <div class="szenario-grid" id="szenario-grid"></div>
    <a class="verwandtes-tool" href="KLARTEXT_Spiel_Reizfilter.html">🎚️ Verwandtes Tool: <strong>Reizfilter-Regler</strong></a>
  </div>

  <div id="spiel-bereich" style="display:none;">
    <div class="fortschritt-wrap">
      <div class="fortschritt-label" id="fortschritt-label">Schritt 1 von 4</div>
      <div class="fortschritt-bar"><div class="fortschritt-fill" id="fortschritt-fill" style="width:25%;"></div></div>
    </div>
    <div class="hinweis-banner" id="hinweis-banner" style="display:none;"></div>
    <div class="szene-card">
      <div class="szene-text" id="szene-text"></div>
      <div class="option-grid" id="option-grid"></div>
      <div class="weiter-solo-row" id="weiter-solo-row" style="display:none;">
        <button class="weiter-solo-btn" id="weiter-solo-btn">Weiter →</button>
      </div>
    </div>
  </div>

  <div id="ende-bereich" style="display:none;">
    <div class="ende-card">
      <div class="ende-sterne" id="ende-sterne"></div>
      <div class="ende-text" id="ende-text"></div>
      <div class="brainy-box">
        <span class="brainy-emoji">🧠</span>
        <span class="brainy-msg" id="ende-brainy"></span>
      </div>
      <div class="ende-knopf-row">
        <button class="ende-btn nochmal" onclick="nochmalSpielen()">↺ Nochmal</button>
        <button class="ende-btn anderes" onclick="zurZurAuswahl()">🔵 Anderes Szenario</button>
      </div>
    </div>
  </div>

</div>

<script>
var SZENARIEN = [
  {
    id: 's1', emoji: '🔄', titel: 'Plötzliche Planänderung', sub: 'Der Stundenplan ändert sich kurzfristig …',
    knoten: {
      start: {
        text: 'Ben hat sich den ganzen Vormittag auf die Kunststunde gefreut. Kurzfristig fällt sie aus und wird durch Sport ersetzt. Ben wirkt sofort sehr angespannt.',
        optionen: [
          { label: 'Ich sage kurz „Plan geändert, wir machen jetzt Sport" und gehe weiter', ziel: 'stufe2a' },
          { label: 'Ich nehme mir einen Moment, erkläre ruhig was sich ändert und warum, und gebe ihm Zeit, sich umzustellen', ziel: 'endeAplus' },
          { label: 'Ich sage ihm, er solle sich nicht so anstellen, andere Kinder kommen doch auch klar', ziel: 'endeC' }
        ]
      },
      stufe2a: {
        text: 'Ben wird zunehmend unruhiger und kann sich kaum auf die Sportstunde einlassen.',
        optionen: [
          { label: 'Ich nehme mir jetzt doch die Zeit, die Änderung in Ruhe zu erklären', ziel: 'endeB' },
          { label: 'Ich erwarte, dass er sich einfach anpasst', ziel: 'endeC' }
        ]
      }
    },
    enden: {
      endeC: { text: 'Ben bleibt den Rest der Stunde aus dem Gleichgewicht. Die kurzfristige Änderung hat ihn stärker belastet, als nötig gewesen wäre.', brainy: 'Übergänge und Planänderungen sind für autistische Kinder oft schwer — sie brauchen Ankündigung und Vorbereitung, keine Erwartung an schnelle Anpassung.', bewertung: 'schlecht' },
      endeB: { text: 'Die späte Erklärung hilft Ben, sich etwas zu beruhigen — auch wenn der erste Moment schon stressig war.', brainy: 'Gut, dass du es doch noch erklärt hast. Am besten wirkt es aber vorher: Übergänge ankündigen, bevor sie passieren.', bewertung: 'mittel' },
      endeAplus: { text: 'Ben braucht einen Moment, aber dann kann er sich auf die neue Situation einstellen — die Anspannung löst sich sichtbar.', brainy: 'Genau richtig: klare, direkte Sprache und ein bisschen Zeit für den Übergang machen für autistische Kinder oft den entscheidenden Unterschied.', bewertung: 'sehr gut' }
    }
  },
  {
    id: 's2', emoji: '🔊', titel: 'Laute Pausenhalle', sub: 'Zu viele Reize auf einmal …',
    knoten: {
      start: {
        text: 'In der lauten, hektischen Pausenhalle hält sich Mia die Ohren zu und wirkt zunehmend überfordert.',
        optionen: [
          { label: 'Ich sage ihr, dass es doch gar nicht so laut ist', ziel: 'stufe2a' },
          { label: 'Ich biete ihr einen ruhigeren Ort an, wo sie kurz durchatmen kann', ziel: 'endeAplus' },
          { label: 'Ich lasse sie erstmal in der Halle stehen, das wird schon vorbeigehen', ziel: 'endeC' }
        ]
      },
      stufe2a: {
        text: 'Mia zieht sich weiter in sich zurück und reagiert kaum noch auf Ansprache.',
        optionen: [
          { label: 'Ich biete ihr jetzt doch einen ruhigen Rückzugsort an', ziel: 'endeB' },
          { label: 'Ich gehe weiter davon aus, dass es kein echtes Problem ist', ziel: 'endeC' }
        ]
      }
    },
    enden: {
      endeC: { text: 'Mia bleibt überfordert und ist für den Rest der Pause kaum ansprechbar.', brainy: 'Autistische Kinder nehmen Geräusche, Licht und andere Reize oft viel intensiver wahr — die Welt kann schnell zu viel werden. Das ernst zu nehmen ist kein Verwöhnen.', bewertung: 'schlecht' },
      endeB: { text: 'Der Rückzugsort hilft Mia, sich zu beruhigen — auch wenn es eine Weile gedauert hat, bis sie ihn bekommen hat.', brainy: 'Gut, dass du reagiert hast. Reizarme Rückzugsmöglichkeiten wirken am besten, bevor die Überforderung sich aufbaut.', bewertung: 'mittel' },
      endeAplus: { text: 'An dem ruhigeren Ort kann Mia sich schnell wieder sammeln und danach entspannter in den Unterricht zurückkehren.', brainy: 'Genau richtig reagiert: Sinnesreize ernst nehmen und reizarme Rückzugsmöglichkeiten anbieten, bevor es zu viel wird.', bewertung: 'sehr gut' }
    }
  },
  {
    id: 's3', emoji: '🚂', titel: 'Der Spezialinteresse-Moment', sub: 'Mitten in der Aufgabe geht es plötzlich nur noch um Züge …',
    knoten: {
      start: {
        text: 'Die Klasse arbeitet an einer Aufgabe. Lukas beginnt plötzlich, ausführlich und mit großer Begeisterung von Zügen zu erzählen — seinem Spezialinteresse.',
        optionen: [
          { label: 'Ich unterbreche ihn sofort scharf: „Das gehört hier nicht her"', ziel: 'endeC' },
          { label: 'Ich höre ihm kurz zu, zeige Interesse — und führe ihn dann klar und direkt zurück zur Aufgabe', ziel: 'endeAplus' },
          { label: 'Ich lasse ihn einfach weiterreden, ohne einzugreifen', ziel: 'stufe2a' }
        ]
      },
      stufe2a: {
        text: 'Lukas redet weiter über Züge, während die Zeit für die eigentliche Aufgabe knapp wird.',
        optionen: [
          { label: 'Ich führe ihn jetzt klar und direkt zur Aufgabe zurück', ziel: 'endeB' },
          { label: 'Ich hoffe, dass er von selbst aufhört', ziel: 'endeC' }
        ]
      }
    },
    enden: {
      endeC: { text: 'Entweder fühlt sich Lukas abgewiesen, oder die Aufgabe bleibt liegen — beides ist nicht ideal.', brainy: 'Intensive Spezialinteressen sind Teil vieler autistischer Kinder — sie verdienen Wertschätzung. Gleichzeitig hilft klare, direkte Sprache mehr als schroffes Abbrechen oder vages Gewähren­lassen.', bewertung: 'schlecht' },
      endeB: { text: 'Die späte, aber klare Rückführung funktioniert — Lukas kehrt zur Aufgabe zurück.', brainy: 'Gut gelöst. Noch wirksamer ist es, das Interesse kurz anzuerkennen und direkt im Anschluss klar zur Aufgabe zu leiten.', bewertung: 'mittel' },
      endeAplus: { text: 'Lukas fühlt sich gesehen und kann danach ohne Widerstand zur Aufgabe zurückkehren.', brainy: 'Genau die richtige Balance: das Spezialinteresse wertschätzen und trotzdem klar und direkt sagen, was jetzt ansteht — keine Andeutungen, keine Abwertung.', bewertung: 'sehr gut' }
    }
  },
  {
    id: 's4', emoji: '💬', titel: 'Unklares soziales Signal', sub: 'Eine ironische Bemerkung sorgt für Verwirrung …',
    knoten: {
      start: {
        text: 'Du machst in der Gruppe eine ironische Bemerkung. Alle lachen — nur Tom schaut verwirrt und fragt nach, was du eigentlich gemeint hast.',
        optionen: [
          { label: 'Ich reagiere genervt, weil er „immer alles wörtlich nimmt"', ziel: 'endeC' },
          { label: 'Ich erkläre ihm kurz und direkt, was ich eigentlich gemeint habe', ziel: 'endeAplus' },
          { label: 'Ich winke ab: „Ach, nicht so wichtig"', ziel: 'stufe2a' }
        ]
      },
      stufe2a: {
        text: 'Tom bleibt sichtlich unsicher und wirkt den Rest der Situation abwesend.',
        optionen: [
          { label: 'Ich erkläre es ihm jetzt doch direkt', ziel: 'endeB' },
          { label: 'Ich lasse es dabei bewenden', ziel: 'endeC' }
        ]
      }
    },
    enden: {
      endeC: { text: 'Tom bleibt mit der Unsicherheit allein zurück. Ironie und Andeutungen sind für ihn schwer zu entschlüsseln.', brainy: 'Soziale Signale wie Ironie sind für autistische Kinder nicht immer klar lesbar. Klare, direkte Sprache statt Andeutungen hilft — und ist kein Umweg, sondern der direkte Weg.', bewertung: 'schlecht' },
      endeB: { text: 'Die nachträgliche Erklärung nimmt Tom die Unsicherheit — auch wenn es eine Weile gedauert hat.', brainy: 'Gut, dass du es erklärt hast. Am hilfreichsten ist eine direkte Erklärung im Moment selbst.', bewertung: 'mittel' },
      endeAplus: { text: 'Tom wirkt sofort erleichtert, als die Bemerkung direkt erklärt wird — die Verwirrung ist aufgelöst.', brainy: 'Genau richtig: klare, direkte Sprache statt Andeutungen ist eine der wichtigsten Unterstützungen, die du autistischen Kindern geben kannst.', bewertung: 'sehr gut' }
    }
  },
  {
    id: 's5', emoji: '🧭', titel: 'Jedes Kind ist anders', sub: 'Eine Kollegin will ein bewährtes Rezept übernehmen …',
    knoten: {
      start: {
        text: 'Eine neue Kollegin sagt: „Ich hatte schon mal ein autistisches Kind in meiner Gruppe, ich weiß genau, was hier hilft" — und möchte bei Emma dieselbe feste Methode anwenden wie beim letzten Kind, obwohl Emma ganz anders reagiert.',
        optionen: [
          { label: 'Ich stimme zu — Erfahrung ist schließlich Erfahrung', ziel: 'endeC' },
          { label: 'Ich schlage vor, Emma erstmal in Ruhe zu beobachten, weil jedes autistische Kind unterschiedlich ist', ziel: 'endeAplus' },
          { label: 'Ich sage nichts, um keinen Konflikt zu provozieren', ziel: 'stufe2a' }
        ]
      },
      stufe2a: {
        text: 'Die Kollegin wendet die Methode an — sie passt aber sichtlich nicht zu Emma.',
        optionen: [
          { label: 'Ich spreche es jetzt doch an und schlage vor, Emma individuell zu beobachten', ziel: 'endeB' },
          { label: 'Ich lasse es weiterlaufen', ziel: 'endeC' }
        ]
      }
    },
    enden: {
      endeC: { text: 'Die übernommene Methode passt nicht zu Emma — sie reagiert zunehmend gestresst, ohne dass jemand das Muster hinterfragt.', brainy: 'Kein autistisches Kind ist gleich. Autismus zeigt sich sehr unterschiedlich — die Intensität und die betroffenen Bereiche variieren stark von Kind zu Kind. Eine Schablone hilft nie allen gleich gut.', bewertung: 'schlecht' },
      endeB: { text: 'Der späte Einwand sorgt noch dafür, dass Emma individueller begleitet wird.', brainy: 'Gut, dass du es angesprochen hast. Am wertvollsten ist es, gleich am Anfang zu betonen: jedes Kind einzeln beobachten, keine Schablone anlegen.', bewertung: 'mittel' },
      endeAplus: { text: 'Die Kollegin nimmt den Hinweis auf und beobachtet Emma erstmal individuell — die Begleitung passt sich ihr an.', brainy: 'Genau richtig: kein autistisches Kind ist wie das andere. Immer das einzelne Kind beobachten, statt ein Schema von anderswo zu übertragen.', bewertung: 'sehr gut' }
    }
  }
];

var STERNE_NACH_BEWERTUNG = { schlecht: '⭐', mittel: '⭐⭐', gut: '⭐⭐', 'sehr gut': '⭐⭐⭐' };

var aktuellesSzenario = null;
var aktuellerKnoten = null;
var schrittZaehler = 1;
var ausstehenderHinweis = null;

function szenarioAuswahlRendern(){
  var grid = document.getElementById('szenario-grid');
  grid.innerHTML = '';
  SZENARIEN.forEach(function(sz){
    var btn = document.createElement('button');
    btn.className = 'szenario-kachel';
    btn.innerHTML = '<span class="szenario-emoji">' + sz.emoji + '</span>' +
      '<span><span class="szenario-titel" style="display:block;">' + sz.titel + '</span>' +
      '<span class="szenario-sub">' + sz.sub + '</span></span>';
    btn.addEventListener('click', function(){ szenarioStarten(sz.id); });
    grid.appendChild(btn);
  });
}

function szenarioStarten(id){
  aktuellesSzenario = SZENARIEN.filter(function(s){ return s.id === id; })[0];
  aktuellerKnoten = 'start';
  schrittZaehler = 1;
  ausstehenderHinweis = null;

  document.getElementById('auswahl-bereich').style.display = 'none';
  document.getElementById('ende-bereich').style.display = 'none';
  document.getElementById('spiel-bereich').style.display = 'block';

  knotenRendern();
}

function knotenRendern(){
  document.getElementById('fortschritt-label').textContent = 'Schritt ' + schrittZaehler + ' von 3';
  document.getElementById('fortschritt-fill').style.width = Math.min(schrittZaehler / 3 * 100, 100) + '%';

  var hinweisBanner = document.getElementById('hinweis-banner');
  if (ausstehenderHinweis) {
    hinweisBanner.textContent = '💡 ' + ausstehenderHinweis;
    hinweisBanner.style.display = 'block';
    ausstehenderHinweis = null;
  } else {
    hinweisBanner.style.display = 'none';
  }

  var knoten = aktuellesSzenario.knoten[aktuellerKnoten];
  var szeneText = document.getElementById('szene-text');
  szeneText.textContent = knoten.text;
  szeneText.classList.toggle('konsequenz', aktuellerKnoten !== 'start' || schrittZaehler > 1);

  var optionGrid = document.getElementById('option-grid');
  var weiterRow = document.getElementById('weiter-solo-row');
  optionGrid.innerHTML = '';

  if (knoten.optionen) {
    weiterRow.style.display = 'none';
    knoten.optionen.forEach(function(opt){
      var btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.textContent = opt.label;
      btn.addEventListener('click', function(){ zuKnotenWechseln(opt.ziel, opt.hinweisFuerZiel); });
      optionGrid.appendChild(btn);
    });
  } else {
    weiterRow.style.display = 'flex';
    var weiterBtn = document.getElementById('weiter-solo-btn');
    weiterBtn.onclick = function(){ zuKnotenWechseln(knoten.ziel, knoten.hinweisFuerZiel); };
  }
}

function zuKnotenWechseln(ziel, hinweis){
  schrittZaehler++;
  ausstehenderHinweis = hinweis || null;

  if (ziel.indexOf('ende') === 0) {
    endeAnzeigen(ziel);
    return;
  }
  aktuellerKnoten = ziel;
  knotenRendern();
}

function endeAnzeigen(endeId){
  var ende = aktuellesSzenario.enden[endeId];
  document.getElementById('ende-sterne').textContent = STERNE_NACH_BEWERTUNG[ende.bewertung] || '⭐';
  document.getElementById('ende-text').textContent = ende.text;
  document.getElementById('ende-brainy').textContent = ende.brainy;

  document.getElementById('spiel-bereich').style.display = 'none';
  document.getElementById('ende-bereich').style.display = 'block';
}

function nochmalSpielen(){
  szenarioStarten(aktuellesSzenario.id);
}

function zurZurAuswahl(){
  aktuellesSzenario = null;
  document.getElementById('ende-bereich').style.display = 'none';
  document.getElementById('spiel-bereich').style.display = 'none';
  document.getElementById('auswahl-bereich').style.display = 'block';
}

szenarioAuswahlRendern();
</script>

</body>
</html>
