<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KLARTEXT · Sehbehinderung im Alltag</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<script>(function(){try{if(sessionStorage.getItem('klartext_login')!=='true')window.location.href='KLARTEXT_Login.html';}catch(e){}})();</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--m:#1B3A4B;--acc:#3B8A68;--paper:#F5F0E8;--surface:#fff;--border:#DDD8CE;--ink:#2D2D2D;--muted:#7A7060;}
body{font-family:"DM Sans",sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;}
.header{background:var(--m);height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 clamp(1rem,4vw,2rem);border-bottom:3px solid var(--acc);position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:.6rem;text-decoration:none;}
.logo-mark{width:32px;height:32px;border:2px solid var(--acc);border-radius:6px;display:flex;align-items:center;justify-content:center;}
.logo-mark span{font-family:"Playfair Display",serif;font-size:12px;font-weight:700;color:#fff;}
.logo-text{font-family:"Playfair Display",serif;font-size:1rem;font-weight:700;color:#fff;}
.back-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.3rem .7rem;border:1.5px solid var(--acc);border-radius:20px;color:var(--acc);font-size:.7rem;font-weight:700;text-decoration:none;}
.hero{background:linear-gradient(135deg,var(--m) 0%,#2A5570 100%);padding:1.75rem clamp(1rem,4vw,2rem);text-align:center;}
.hero-icon{font-size:2.2rem;margin-bottom:.4rem;}
.hero-titel{font-family:"Playfair Display",serif;font-size:clamp(1.3rem,3vw,1.8rem);font-weight:700;color:#fff;margin-bottom:.3rem;}
.hero-sub{font-size:.82rem;color:rgba(255,255,255,.6);max-width:560px;margin:0 auto;}
.shell{max-width:620px;margin:0 auto;padding:1.75rem clamp(.75rem,3vw,2rem) 5rem;}

/* Szenario-Auswahl */
.szenario-grid{display:flex;flex-direction:column;gap:1rem;}
.szenario-kachel{display:flex;align-items:center;gap:1rem;background:var(--surface);border:2.5px solid var(--border);border-radius:18px;padding:1.2rem 1.4rem;cursor:pointer;text-align:left;font-family:inherit;transition:all .15s;}
.szenario-kachel:hover{border-color:var(--acc);transform:translateY(-2px);box-shadow:0 4px 16px rgba(27,58,75,.1);}
.szenario-emoji{font-size:2.2rem;flex-shrink:0;}
.szenario-titel{font-family:"Playfair Display",serif;font-size:1.1rem;font-weight:700;color:var(--m);margin-bottom:.2rem;}
.szenario-sub{font-size:.8rem;color:var(--muted);}

/* Spiel-Bereich */
.fortschritt-wrap{margin-bottom:1.2rem;}
.fortschritt-label{font-size:.74rem;font-weight:700;color:var(--muted);margin-bottom:.4rem;text-align:center;}
.fortschritt-bar{height:10px;background:var(--border);border-radius:20px;overflow:hidden;}
.fortschritt-fill{height:100%;background:var(--acc);border-radius:20px;transition:width .3s ease;}

.hinweis-banner{background:#FFF4E0;color:#8A5A00;border-radius:12px;padding:.7rem .9rem;font-size:.82rem;font-weight:600;text-align:center;margin-bottom:1rem;}

.szene-card{background:var(--surface);border:2px solid var(--border);border-radius:20px;padding:1.6rem 1.4rem;box-shadow:0 2px 10px rgba(27,58,75,.08);}
.szene-text{font-size:1.02rem;line-height:1.6;color:var(--ink);margin-bottom:1.3rem;}
.szene-text.konsequenz{font-style:italic;color:#2E6E52;}
.option-grid{display:flex;flex-direction:column;gap:.7rem;}
.option-btn{display:block;width:100%;text-align:left;padding:.9rem 1.1rem;border:2.5px solid var(--border);border-radius:16px;background:var(--surface);color:var(--ink);font-family:inherit;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .15s;line-height:1.4;}
.option-btn:hover{border-color:var(--acc);transform:translateY(-1px);}
.weiter-solo-btn{display:inline-flex;align-items:center;gap:.4rem;padding:.75rem 1.7rem;border:none;border-radius:22px;background:var(--m);color:#fff;font-weight:700;font-size:.9rem;cursor:pointer;font-family:inherit;}
.weiter-solo-row{display:flex;justify-content:center;}

/* Ende-Bildschirm */
.ende-card{background:var(--surface);border:2px solid var(--border);border-radius:20px;padding:1.8rem 1.5rem;text-align:center;box-shadow:0 2px 10px rgba(27,58,75,.08);}
.ende-sterne{font-size:1.8rem;margin-bottom:.7rem;}
.ende-text{font-size:.95rem;line-height:1.6;color:var(--ink);margin-bottom:1.1rem;}
.brainy-box{display:flex;gap:.7rem;align-items:center;background:var(--paper);border-radius:14px;padding:.8rem 1rem;margin-bottom:1.3rem;text-align:left;}
.brainy-emoji{font-size:1.6rem;flex-shrink:0;}
.brainy-msg{font-size:.85rem;color:var(--ink);line-height:1.5;}
.ende-knopf-row{display:flex;gap:.7rem;justify-content:center;flex-wrap:wrap;}
.ende-btn{display:inline-flex;align-items:center;gap:.4rem;padding:.7rem 1.5rem;border:none;border-radius:22px;font-weight:700;font-size:.86rem;cursor:pointer;font-family:inherit;}
.ende-btn.nochmal{background:var(--acc);color:#fff;}
.ende-btn.anderes{background:var(--surface);color:var(--m);border:1.5px solid var(--border);}
.ende-btn:hover{opacity:.9;}
</style>
</head>
<body>

<header class="header">
  <a class="logo" href="KLARTEXT_Spiele.html">
    <div class="logo-mark"><span>K</span></div>
    <div class="logo-text">KLARTEXT · Spiele</div>
  </a>
  <a class="back-btn" href="KLARTEXT_Spiele.html">← Spiele</a>
</header>

<div class="hero">
  <div class="hero-icon">👁️</div>
  <h1 class="hero-titel">Sehbehinderung im Alltag</h1>
  <p class="hero-sub">Für INGRAs und Lehrkräfte: typische Situationen mit blinden und sehbehinderten Kindern erkennen und passend reagieren.</p>
</div>

<div class="shell" id="shell">

  <div id="auswahl-bereich">
    <div class="szenario-grid" id="szenario-grid"></div>
  </div>

  <div id="spiel-bereich" style="display:none;">
    <div class="fortschritt-wrap">
      <div class="fortschritt-label" id="fortschritt-label">Schritt 1 von 3</div>
      <div class="fortschritt-bar"><div class="fortschritt-fill" id="fortschritt-fill" style="width:33%;"></div></div>
    </div>
    <div class="hinweis-banner" id="hinweis-banner" style="display:none;"></div>
    <div class="szene-card">
      <div class="szene-text" id="szene-text"></div>
      <div class="option-grid" id="option-grid"></div>
      <div class="weiter-solo-row" id="weiter-solo-row" style="display:none;">
        <button class="weiter-solo-btn" id="weiter-solo-btn">Weiter →</button>
      </div>
    </div>
  </div>

  <div id="ende-bereich" style="display:none;">
    <div class="ende-card">
      <div class="ende-sterne" id="ende-sterne"></div>
      <div class="ende-text" id="ende-text"></div>
      <div class="brainy-box">
        <span class="brainy-emoji">🧠</span>
        <span class="brainy-msg" id="ende-brainy"></span>
      </div>
      <div class="ende-knopf-row">
        <button class="ende-btn nochmal" onclick="nochmalSpielen()">↺ Nochmal</button>
        <button class="ende-btn anderes" onclick="zurZurAuswahl()">👁️ Anderes Szenario</button>
      </div>
    </div>
  </div>

</div>

<script>
var SZENARIEN = [
  {
    id: 's1', emoji: '🦯', titel: 'Der Langstock', sub: 'Ein Hilfsmittel wird kurz beiseitegestellt …',
    knoten: {
      start: {
        text: 'Ein Schüler mit Sehbehinderung hat seinen Langstock kurz an die Wand gelehnt, während er sich hinsetzt. Du möchtest helfen und würdest ihn gern woanders hinstellen, damit er nicht im Weg steht.',
        optionen: [
          { label: 'Ich nehme den Stock und stelle ihn an einen anderen Platz', ziel: 'endeC' },
          { label: 'Ich frage ihn erst, ob und wie ich helfen kann, bevor ich den Stock berühre', ziel: 'endeAplus' },
          { label: 'Ich sage nichts und lasse alles wie es ist', ziel: 'stufe2a' }
        ]
      },
      stufe2a: {
        text: 'Kurz darauf stolpert ein anderes Kind fast über den Stock.',
        optionen: [
          { label: 'Ich frage jetzt den Schüler, ob ich helfen darf', ziel: 'endeB' },
          { label: 'Ich räume den Stock schnell selbst weg', ziel: 'endeC' }
        ]
      }
    },
    enden: {
      endeC: { text: 'Der Stock landet an einem Ort, den der Schüler nicht kennt — er muss ihn erst wieder suchen.', brainy: 'Hilfsmittel wie der Langstock dürfen nie ohne Erlaubnis angefasst oder bewegt werden. Der Stock ist Teil der Orientierung — kein Gegenstand, der einfach im Weg steht.', bewertung: 'schlecht' },
      endeB: { text: 'Die Nachfrage kommt spät, aber der Schüler kann selbst entscheiden, wie ihm geholfen wird.', brainy: 'Gut, dass du gefragt hast, bevor du gehandelt hast. Am besten wirkt das gleich am Anfang.', bewertung: 'mittel' },
      endeAplus: { text: 'Der Schüler freut sich über die Nachfrage und sagt genau, wie er es gern hätte.', brainy: 'Genau richtig: nie einfach anfassen oder verändern, sondern fragen. „Darf ich dich begleiten?" gilt genauso für Hilfsmittel wie den Langstock.', bewertung: 'sehr gut' }
    }
  },
  {
    id: 's2', emoji: '📚', titel: 'Ordnung ist Orientierung', sub: 'Beim Aufräumen wird ein Regal neu sortiert …',
    knoten: {
      start: {
        text: 'Beim Aufräumen fällt dir auf, dass das Regal einer blinden Schülerin aus deiner Sicht ziemlich durcheinander wirkt. Du überlegst, es „ordentlicher" einzuräumen.',
        optionen: [
          { label: 'Ich räume alles nach meinem eigenen System um — das sieht doch viel ordentlicher aus', ziel: 'endeC' },
          { label: 'Ich frage sie erst, wie sie ihre Sachen sortiert hat, und räume nur mit ihr gemeinsam auf', ziel: 'endeAplus' },
          { label: 'Ich räume nur einen Teil um, ohne mit ihr zu sprechen', ziel: 'stufe2a' }
        ]
      },
      stufe2a: {
        text: 'Später sucht die Schülerin vergeblich nach einem Gegenstand, der jetzt woanders liegt.',
        optionen: [
          { label: 'Ich erkläre ihr, was ich verändert habe, und räume es mit ihr zusammen wieder ein', ziel: 'endeB' },
          { label: 'Ich sage nichts und hoffe, sie findet es von selbst', ziel: 'endeC' }
        ]
      }
    },
    enden: {
      endeC: { text: 'Die Schülerin verliert die Orientierung über ihre eigenen Sachen — etwas, das vorher zuverlässig funktioniert hat.', brainy: 'Gegenstände gehören immer dorthin zurück, wo sie waren. Ordnung ist für blinde und sehbehinderte Kinder Orientierung — eigene Systeme nie ohne Rücksprache verändern.', bewertung: 'schlecht' },
      endeB: { text: 'Die nachträgliche Erklärung hilft der Schülerin, sich wieder zurechtzufinden.', brainy: 'Gut, dass du es erklärt hast. Am besten ist es, gar nicht erst ohne Rücksprache umzuräumen.', bewertung: 'mittel' },
      endeAplus: { text: 'Gemeinsam entsteht eine Ordnung, die für die Schülerin weiterhin Sinn ergibt — nichts geht verloren.', brainy: 'Genau richtig: die eigene Ordnung respektieren und nie umsortieren ohne Rücksprache. Für sehbehinderte Kinder ist das ein wichtiges Stück Sicherheit.', bewertung: 'sehr gut' }
    }
  },
  {
    id: 's3', emoji: '📊', titel: 'Tafelbild ohne Erklärung', sub: '„Hier ist das, und da drüben ist das …"',
    knoten: {
      start: {
        text: 'Du zeichnest während des Unterrichts eine Grafik an die Tafel und erklärst sie mit Gesten: „Hier ist das, und da drüben ist das."',
        optionen: [
          { label: 'Ich mache weiter wie gewohnt — die anderen Kinder verstehen es ja auch so', ziel: 'endeC' },
          { label: 'Ich beschreibe die Grafik zusätzlich in Worten, konkret statt mit „da drüben"', ziel: 'endeAplus' },
          { label: 'Ich zeige es nach der Stunde noch einmal kurz in Ruhe', ziel: 'stufe2a' }
        ]
      },
      stufe2a: {
        text: 'Die Schülerin konnte dem Tafelbild während der Stunde kaum folgen und hat einiges verpasst.',
        optionen: [
          { label: 'Ich beschreibe die Grafik jetzt auch verbal, damit sie folgen kann', ziel: 'endeB' },
          { label: 'Ich denke mir, es hat ja am Ende doch noch geklappt', ziel: 'endeC' }
        ]
      }
    },
    enden: {
      endeC: { text: 'Die Schülerin verpasst wichtige Inhalte, weil das Tafelbild nur mit Gesten erklärt wurde.', brainy: 'Räumliche Beschreibungen statt Zeigen: nicht „da drüben", sondern „an der Wand, zweites Regal". Tafelbilder sollten verbal beschrieben oder fotografiert und vorgelesen werden.', bewertung: 'schlecht' },
      endeB: { text: 'Die nachträgliche Beschreibung hilft, aber die Schülerin hat während der Stunde selbst wichtige Momente verpasst.', brainy: 'Gut, dass du es nachgeholt hast. Am wirksamsten ist die verbale Beschreibung direkt während der Erklärung.', bewertung: 'mittel' },
      endeAplus: { text: 'Die Schülerin kann der Erklärung genauso gut folgen wie alle anderen — nichts geht verloren.', brainy: 'Genau richtig: alles benennen, was du tust, und räumliche Beschreibungen statt Zeigen verwenden. Das hilft nicht nur beim Tafelbild, sondern in jeder Unterrichtssituation.', bewertung: 'sehr gut' }
    }
  },
  {
    id: 's4', emoji: '😮‍💨', titel: 'Nach der Seharbeit erschöpft', sub: 'Nach viel Lesen lässt die Konzentration nach …',
    knoten: {
      start: {
        text: 'Nach einer langen Arbeitsphase mit viel Lesen wirkt eine Schülerin mit Sehbehinderung zunehmend erschöpft und unkonzentriert.',
        optionen: [
          { label: 'Ich erwarte, dass sie wie die anderen einfach weiterarbeitet', ziel: 'endeC' },
          { label: 'Ich biete ihr gezielt eine kurze Pause an, bevor die nächste Aufgabe beginnt', ziel: 'endeAplus' },
          { label: 'Ich mache nur die übliche Pause für alle, ohne besonders auf sie einzugehen', ziel: 'stufe2a' }
        ]
      },
      stufe2a: {
        text: 'Die übliche Pause reicht nicht — die Schülerin bleibt danach weiterhin erschöpft.',
        optionen: [
          { label: 'Ich biete ihr jetzt eine zusätzliche kurze Erholung an', ziel: 'endeB' },
          { label: 'Ich gehe davon aus, dass sie sich einfach mehr anstrengen muss', ziel: 'endeC' }
        ]
      }
    },
    enden: {
      endeC: { text: 'Die Schülerin bleibt erschöpft und kann sich für den Rest der Stunde kaum noch konzentrieren.', brainy: 'Intensives Sehen kostet Kraft — Seherschöpfung ist real. Nach Seharbeit sollten gezielt Pausen eingeplant werden, nicht nur die übliche Pause für alle.', bewertung: 'schlecht' },
      endeB: { text: 'Die zusätzliche Erholung hilft, auch wenn sie erst spät angeboten wurde.', brainy: 'Gut, dass du reagiert hast. Am besten ist es, Seherschöpfung schon vorher einzuplanen, bevor sie sich zeigt.', bewertung: 'mittel' },
      endeAplus: { text: 'Die gezielte Pause hilft der Schülerin, sich zu erholen — danach kann sie wieder gut mitarbeiten.', brainy: 'Genau richtig: Sehen, Hören und Verarbeiten gleichzeitig ist sehr anstrengend. Das Tempo anzupassen und Pausen nach Seharbeit einzuplanen macht den Unterschied.', bewertung: 'sehr gut' }
    }
  },
  {
    id: 's5', emoji: '🚶', titel: 'Selbstständig oder abhängig?', sub: 'Ein Schüler möchte den Weg allein gehen …',
    knoten: {
      start: {
        text: 'Ein Schüler mit Sehbehinderung möchte den Weg innerhalb des Schulgebäudes allein gehen. Eine Kollegin findet, man solle ihn lieber immer begleiten, „zur Sicherheit".',
        optionen: [
          { label: 'Ich stimme zu und begleite ihn ab jetzt überallhin', ziel: 'endeC' },
          { label: 'Ich lasse ihn den Weg selbst gehen und biete Begleitung nur an, wenn er sie möchte', ziel: 'endeAplus' },
          { label: 'Ich sage nichts dazu und lasse die Kollegin entscheiden', ziel: 'stufe2a' }
        ]
      },
      stufe2a: {
        text: 'Der Schüler wird fortan bei jedem Weg begleitet, obwohl er darum nicht gebeten hat.',
        optionen: [
          { label: 'Ich spreche es jetzt an und schlage vor, ihn selbst entscheiden zu lassen', ziel: 'endeB' },
          { label: 'Ich lasse es weiterlaufen, wie es sich eingespielt hat', ziel: 'endeC' }
        ]
      }
    },
    enden: {
      endeC: { text: 'Der Schüler verliert die Möglichkeit, Selbstständigkeit zu üben — obwohl er sie eigentlich wollte.', brainy: 'Mach das Kind sicher — nicht abhängig. Wege selbst gehen lassen und nur begleiten, wenn es gewünscht ist, ist eine der wichtigsten Formen der Unterstützung.', bewertung: 'schlecht' },
      endeB: { text: 'Der späte Einwand sorgt noch dafür, dass der Schüler wieder selbst entscheiden kann.', brainy: 'Gut, dass du es angesprochen hast. Am besten ist es, gleich von Anfang an nach dem Wunsch des Kindes zu fragen statt „zur Sicherheit" zu entscheiden.', bewertung: 'mittel' },
      endeAplus: { text: 'Der Schüler geht den Weg sicher allein — und weiß, dass er jederzeit um Begleitung bitten kann.', brainy: 'Genau richtig: jede Selbstständigkeit, die du ermöglichst, ist ein Geschenk fürs Leben. Sicherheit entsteht nicht durch Abhängigkeit, sondern durch Vertrauen.', bewertung: 'sehr gut' }
    }
  }
];

var STERNE_NACH_BEWERTUNG = { schlecht: '⭐', mittel: '⭐⭐', gut: '⭐⭐', 'sehr gut': '⭐⭐⭐' };

var aktuellesSzenario = null;
var aktuellerKnoten = null;
var schrittZaehler = 1;
var ausstehenderHinweis = null;

function szenarioAuswahlRendern(){
  var grid = document.getElementById('szenario-grid');
  grid.innerHTML = '';
  SZENARIEN.forEach(function(sz){
    var btn = document.createElement('button');
    btn.className = 'szenario-kachel';
    btn.innerHTML = '<span class="szenario-emoji">' + sz.emoji + '</span>' +
      '<span><span class="szenario-titel" style="display:block;">' + sz.titel + '</span>' +
      '<span class="szenario-sub">' + sz.sub + '</span></span>';
    btn.addEventListener('click', function(){ szenarioStarten(sz.id); });
    grid.appendChild(btn);
  });
}

function szenarioStarten(id){
  aktuellesSzenario = SZENARIEN.filter(function(s){ return s.id === id; })[0];
  aktuellerKnoten = 'start';
  schrittZaehler = 1;
  ausstehenderHinweis = null;

  document.getElementById('auswahl-bereich').style.display = 'none';
  document.getElementById('ende-bereich').style.display = 'none';
  document.getElementById('spiel-bereich').style.display = 'block';

  knotenRendern();
}

function knotenRendern(){
  document.getElementById('fortschritt-label').textContent = 'Schritt ' + schrittZaehler + ' von 3';
  document.getElementById('fortschritt-fill').style.width = Math.min(schrittZaehler / 3 * 100, 100) + '%';

  var hinweisBanner = document.getElementById('hinweis-banner');
  if (ausstehenderHinweis) {
    hinweisBanner.textContent = '💡 ' + ausstehenderHinweis;
    hinweisBanner.style.display = 'block';
    ausstehenderHinweis = null;
  } else {
    hinweisBanner.style.display = 'none';
  }

  var knoten = aktuellesSzenario.knoten[aktuellerKnoten];
  var szeneText = document.getElementById('szene-text');
  szeneText.textContent = knoten.text;
  szeneText.classList.toggle('konsequenz', aktuellerKnoten !== 'start' || schrittZaehler > 1);

  var optionGrid = document.getElementById('option-grid');
  var weiterRow = document.getElementById('weiter-solo-row');
  optionGrid.innerHTML = '';

  if (knoten.optionen) {
    weiterRow.style.display = 'none';
    knoten.optionen.forEach(function(opt){
      var btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.textContent = opt.label;
      btn.addEventListener('click', function(){ zuKnotenWechseln(opt.ziel, opt.hinweisFuerZiel); });
      optionGrid.appendChild(btn);
    });
  } else {
    weiterRow.style.display = 'flex';
    var weiterBtn = document.getElementById('weiter-solo-btn');
    weiterBtn.onclick = function(){ zuKnotenWechseln(knoten.ziel, knoten.hinweisFuerZiel); };
  }
}

function zuKnotenWechseln(ziel, hinweis){
  schrittZaehler++;
  ausstehenderHinweis = hinweis || null;

  if (ziel.indexOf('ende') === 0) {
    endeAnzeigen(ziel);
    return;
  }
  aktuellerKnoten = ziel;
  knotenRendern();
}

function endeAnzeigen(endeId){
  var ende = aktuellesSzenario.enden[endeId];
  document.getElementById('ende-sterne').textContent = STERNE_NACH_BEWERTUNG[ende.bewertung] || '⭐';
  document.getElementById('ende-text').textContent = ende.text;
  document.getElementById('ende-brainy').textContent = ende.brainy;

  document.getElementById('spiel-bereich').style.display = 'none';
  document.getElementById('ende-bereich').style.display = 'block';
}

function nochmalSpielen(){
  szenarioStarten(aktuellesSzenario.id);
}

function zurZurAuswahl(){
  aktuellesSzenario = null;
  document.getElementById('ende-bereich').style.display = 'none';
  document.getElementById('spiel-bereich').style.display = 'none';
  document.getElementById('auswahl-bereich').style.display = 'block';
}

szenarioAuswahlRendern();
</script>

</body>
</html>
